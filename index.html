                            const STAGES = 3;
                            const STEP_DUR = 160;
                            const STEP_HOLD = 120; // 9 steps × 440ms = 3960ms（4秒以内）
                            const STEP_TOTAL = STEP_DUR * 2 + STEP_HOLD;
                            const totalSteps = ARROW_LOOPS * STAGES;
                            const totalDuration = STEP_TOTAL * totalSteps;

                            // 文字が読めるようにズームイン → ラベル消滅と同期して通常に戻す
                            const ZOOM_IN = 4.2;
                            const ZOOM_BACK = 2.7;
                            const prevZoom = this.cameras.main.zoom;
                            this.cameras.main.zoomTo(ZOOM_IN, 600, 'Sine.easeInOut');

                            const baseAstro = this.astronaut;
                            const labelImg = this.add.image(
                                baseAstro.x + offsetX, labelY, 'label_returnship'
                            ).setOrigin(originX, 0.5).setDepth(12).setAlpha(0).setScale(this._labelDisplayScale || 0.25);
                            // 吹き出し枠：中心から左右に開くアニメ（scaleX 0→1）
                            const bubble2 = this.makeGuideBubble(
                                baseAstro.x + offsetX, labelY, arrowY, labelImg, isRight, 0x88ffaa, 11.5
                            ).setScale(0, 1);
                            this.tweens.add({ targets: labelImg, alpha: 1, duration: 250, ease: 'Sine.easeOut' });
                            this.tweens.add({ targets: bubble2, scaleX: 1, duration: 300, ease: 'Sine.easeOut' });

                            // >, >>, >>> サイクルは残す。ただし位置は固定（プレイヤー移動に追従しない）
                            const fixedAnchorX2 = baseAstro.x + offsetX;
                            // 矢印は makeLabelSVG の左右 padding (8px in canvas → 表示 2px) 分内側に寄せて、
                            // ラベルのテキスト端と矢印端を揃える
                            const arrowAnchorX2 = fixedAnchorX2 + (isRight ? 1 : -1) * 8 * (this._labelDisplayScale || 0.25);
                            let step = 0;
                            const showArrow2 = () => {
                                if (step >= totalSteps) return;
                                const count = (step % STAGES) + 1;
                                const group = this.makeArrowGroup(
                                    arrowAnchorX2, arrowY, count, isRight, 12, (this._labelDisplayScale || 0.25) / 6
                                );
                                this.tweens.add({
                                    targets: group, alpha: 1, duration: STEP_DUR, yoyo: true, hold: STEP_HOLD,
                                    onComplete: () => { group.forEach(a => a.destroy()); step++; showArrow2(); }
                                });
                            };
                            showArrow2();

                            this.time.delayedCall(totalDuration + 100, () => {
                                this.tweens.add({
                                    targets: labelImg, alpha: 0, duration: 300, ease: 'Sine.easeIn',
                                    onComplete: () => labelImg.destroy()
                                });
                                // 枠は中心へ閉じる
                                this.tweens.add({
                                    targets: bubble2, scaleX: 0, duration: 300, ease: 'Sine.easeIn',
                                    onComplete: () => bubble2.destroy()
                                });
                                // ラベル消えるのと同時に元のズームへ戻す
                                this.cameras.main.zoomTo(ZOOM_BACK, 600, 'Sine.easeInOut');
                            });
                        }
                    });
                }

                // 仲間：P→C1→C2 と鎖状に追従（各自が前走者を追う＝自然な時差）
                // 仲間を連れて宇宙船に戻ったら、2人が先に乗り込み、プレイヤーは最後
                if (!this.returningToShip && this.crewFollowing && this.crews.length > 0
                    && this.spaceship && Math.abs(this.astronaut.x - this.spaceship.x) < 20) {
                    this.returningToShip = true;
                    this.crewFollowing = false;
                    // 「早く登れ」の指示音（仲間がハシゴを登り始める前）
                    if (this.climbSound) this.climbSound.play();
                    const ladderX = this.spaceship.x - 5;
                    const ladderTop = this.spaceship.y + 10; // 宇宙船の内部から伸ばす
                    const ladderBottom = this.spaceship.y + 56; // プレイヤー足元の少し上まで
                    const crews = this.crews.slice();
                    // 待機列の方向（アストロノート進行方向と反対側）
                    const queueDir = this.astronautFacing === 'right' ? -1 : 1;
                    const queueSpacing = 13;
                    const queueY = this.groundFeetY; // ハシゴの根元（地面）まで移動してから登る
                    // 仲間を順にハシゴ下まで移動→登って船内へ
                    crews.forEach((c, idx) => {
                        this.time.delayedCall(idx * 900, () => {
                            if (this.astronautGameOver) return;
                            const face = ladderX < c.x ? 'L' : 'R';
                            // 歩行アニメでハシゴへ
                            c.setFlipX(face === 'R');
                            c.anims.play('crew_walk');
                            this.tweens.add({
                                targets: c,
                                x: ladderX,
                                y: queueY,
                                duration: 400,
                                ease: 'Sine.easeInOut',
                                onComplete: () => {
                                    if (this.astronautGameOver) return;
                                    c.anims.stop();
                                    c.setFlipX(false);
                                    c.setTexture('crew');
                                    // 振り向き：正面 → (FL/FR) → (L/R) → (BL/BR)
                                    c.anims.play('crew_turn_to_back_' + face);
                                    c.once('animationcomplete-crew_turn_to_back_' + face, () => {
                                        if (this.astronautGameOver) return;
                                        c.setTexture('crew_B');
                                        // 影を登りに合わせてフェードアウト
                                        if (c.shadow) {
                                            const sh = c.shadow;
                                            c.shadow = null;
                                            this.tweens.add({ targets: sh, alpha: 0, duration: 1500, ease: 'Sine.easeInOut', onComplete: () => sh.destroy() });
                                        }
                                        steppedClimb(this, c, ladderTop, 8, 100, 70, () => c.setVisible(false), 1);
                                    });
                                }
                            });
                            // 後続の仲間は1つ前の待機スロットへシフト
                            for (let j = idx + 1; j < crews.length; j++) {
                                const t = crews[j];
                                const slot = j - idx; // 1,2,3...（ハシゴ直後の位置から）
                                const tx = ladderX + queueDir * queueSpacing * slot;
                                const faceJ = tx < t.x ? 'L' : 'R';
                                t.setFlipX(faceJ === 'R');
                                if (!t.anims.isPlaying || t.anims.currentAnim.key !== 'crew_walk') t.anims.play('crew_walk');
                                this.tweens.add({
                                    targets: t,
                                    x: tx,
                                    y: queueY,
                                    duration: 400,
                                    ease: 'Sine.easeInOut',
                                    onComplete: () => {
                                        t.anims.stop();
                                        t.setFlipX(false);
                                        t.setTexture('crew');
                                    }
                                });
                            }
                        });
                    });
                    // 2人が乗り込んだ後、プレイヤーがハシゴを登る
                    const playerStart = crews.length * 900 + 1400;
                    this.time.delayedCall(playerStart, () => {
                        // 捕獲されている場合は登らない（地中から復活してしまうバグ対策）
                        if (this.astronautGameOver) return;
                        this.playerClimbing = true;
                        this.beamGaugeBg.setVisible(false);
                        this.beamGaugeFill.setVisible(false);
                        this.beamHoldStart = null;
                        this.chargeAllowed = false;
                        if (this.beamTameSound.isPlaying) this.beamTameSound.stop();
                        this.astronaut.anims.stop();
                        this.astronaut.setFlipX(false);
                        // ハシゴまで歩いて移動（横向き歩行アニメ）
                        const face = ladderX < this.astronaut.x ? 'L' : 'R';
                        this.astronaut.setFlipX(face === 'R');
                        this.astronaut.anims.play('astronaut_walk');
                        this.tweens.add({
                            targets: this.astronaut,
                            x: ladderX,
                            duration: 400,
                            ease: 'Sine.easeInOut',
                            onComplete: () => {
                                this.astronaut.anims.stop();
                                this.astronaut.setFlipX(false);
                                // 振り向きアニメ：正面→(L or R)→後ろ、降りた時と同じ方向
                                this.astronaut.setTexture('spaceman');
                                const turnDir = this.astronautTurnDir || 'L';
                                this.astronaut.anims.play('astronaut_turn_to_back_' + turnDir);
                                // 振り向き完了後に登り開始
                                this.astronaut.once('animationcomplete-astronaut_turn_to_back_' + turnDir, () => {
                                    this.astronaut.setTexture('spaceman_B');
                                    // 影を登りに合わせてフェードアウト（上に行くほど薄く）
                                    if (this.astronaut.shadow) {
                                        const sh = this.astronaut.shadow;
                                        this.astronaut.shadow = null;
                                        this.tweens.add({ targets: sh, alpha: 0, duration: 1500, ease: 'Sine.easeInOut', onComplete: () => sh.destroy() });
                                    }
                                    steppedClimb(this, this.astronaut, ladderTop, 8, 100, 70, () => {
                                        this.astronaut.setVisible(false);
                                        // 登り終えたら徐々にズームアウト（ポッド上昇中も続く）
                                        this.tweens.add({
                                            targets: this.cameras.main,
                                            zoom: 1.8,
                                            duration: 5000,
                                            ease: 'Sine.easeInOut'
                                        });
                                        // 発射前2秒：ハッチ開
                                        this.sound.play('hatchopen', { volume: 0.25 });
                                        // 2秒後：宇宙船上部からポッド打ち上げ
                                        this.time.delayedCall(2000, () => {
                                            // 脱出音：点火とジェットを同時再生
                                            this.sound.play('escape-injection', { volume: 0.8 });
                                            this.escapeJetSound = this.sound.add('escape-jet', { loop: true, volume: 0.6 });
                                            this.escapeJetSound.play();
                                            const podX = this.spaceship.x;
                                            const podY = this.spaceship.y - 10;
                                            const pod = this.add.image(podX, podY, 'pod');
                                            pod.setDisplaySize(24, 24);
                                            pod.setDepth(3); // 宇宙船(5)より下のレイヤーから出現

                                            // エイリアンたちは地中へ散り散りに退却
                                            this.enemiesRetreating = true;
                                            this.enemies.forEach(e => {
                                                e.setMask(this.groundMask);
                                                const rx = e.x + Phaser.Math.Between(-140, 140);
                                                this.tweens.add({
                                                    targets: e,
                                                    x: rx,
                                                    duration: Phaser.Math.Between(1400, 2200),
                                                    ease: 'Sine.easeInOut'
                                                });
                                                this.tweens.add({
                                                    targets: e,
                                                    y: e.y + e.displayHeight + 20,
                                                    delay: Phaser.Math.Between(200, 1000),
                                                    duration: Phaser.Math.Between(900, 1400),
                                                    ease: 'Sine.easeIn',
                                                    onComplete: () => {
                                                        if (e.shadow) e.shadow.destroy();
                                                        e.destroy();
                                                    }
                                                });
                                                // 影をフェードアウト
                                                if (e.shadow) {
                                                    this.tweens.add({ targets: e.shadow, alpha: 0, duration: 800, ease: 'Sine.easeInOut' });
                                                }
                                            });
                                            this.enemies = [];

                                            // 発射マズル：着陸粉塵と同じ要領で左右へ舞い上がる煙
                                            const muzzle = this.add.particles('dustLarge');
                                            muzzle.setDepth(3); // 宇宙船(5)の背後
                                            const makeSide = (sx, angleRange) => muzzle.createEmitter({
                                                x: sx,
                                                y: podY + 2,
                                                speed: { min: 40, max: 160 },
                                                angle: angleRange,
                                                scale: { start: 0.25, end: 2.2 },
                                                alpha: { start: 0.7, end: 0 },
                                                tint: [0xffffff, 0xeeeeee, 0xdddddd],
                                                lifespan: { min: 700, max: 1400 },
                                                quantity: 1,
                                                on: false
                                            });
                                            const leftEm = makeSide(podX - 10, { min: 155, max: 205 });
                                            const rightEm = makeSide(podX + 10, { min: -25, max: 25 });
                                            leftEm.explode(26);
                                            rightEm.explode(26);
                                            // 炎のチラッとした赤味（少量）
                                            const flame = this.add.particles('jetParticle');
                                            flame.setDepth(3); // 宇宙船(5)の背後
                                            const flameL = flame.createEmitter({
                                                x: podX - 8, y: podY + 2,
                                                speed: { min: 80, max: 200 },
                                                angle: { min: 165, max: 195 },
                                                scale: { start: 0.5, end: 0 },
                                                alpha: { start: 0.9, end: 0 },
                                                tint: [0xff4422, 0xff8833, 0xffcc44],
                                                lifespan: { min: 200, max: 400 },
                                                on: false
                                            });
                                            const flameR = flame.createEmitter({
                                                x: podX + 8, y: podY + 2,
                                                speed: { min: 80, max: 200 },
                                                angle: { min: -15, max: 15 },
                                                scale: { start: 0.5, end: 0 },
                                                alpha: { start: 0.9, end: 0 },
                                                tint: [0xff4422, 0xff8833, 0xffcc44],
                                                lifespan: { min: 200, max: 400 },
                                                on: false
                                            });
                                            flameL.explode(10);
                                            flameR.explode(10);
                                            this.time.delayedCall(1800, () => { muzzle.destroy(); flame.destroy(); });

                                            // 下部の噴射ノズル炎（ポッドに追従し、上昇中は常時噴射）
                                            const nozzle = this.add.graphics();
                                            nozzle.setDepth(3); // 宇宙船(5)の背後
                                            const drawNozzle = () => {
                                                nozzle.clear();
                                                const nx = pod.x;
                                                const ny = pod.y + 12;
                                                const flick = Phaser.Math.FloatBetween(0.8, 1.2);
                                                // 外炎（オレンジ）
                                                nozzle.fillStyle(0xff8822, 0.9);
                                                nozzle.fillTriangle(nx - 5, ny, nx + 5, ny, nx, ny + 14 * flick);
                                                // 内炎（黄）
                                                nozzle.fillStyle(0xffee66, 0.95);
                                                nozzle.fillTriangle(nx - 3, ny, nx + 3, ny, nx, ny + 9 * flick);
                                                // 芯（白）
                                                nozzle.fillStyle(0xffffff, 1);
                                                nozzle.fillTriangle(nx - 1.5, ny, nx + 1.5, ny, nx, ny + 5 * flick);
                                            };
                                            const nozzleTimer = this.time.addEvent({
                                                delay: 30,
                                                loop: true,
                                                callback: drawNozzle
                                            });

                                            // カメラも上昇（ポッドより遅い。消えた後もスーッと余韻で減速）
                                            this.cameraRising = true;
                                            this.tweens.add({
                                                targets: this.cameras.main,
                                                scrollY: this.cameras.main.scrollY - 700,
                                                duration: 3000,
                                                ease: 'Cubic.easeIn',
                                                onComplete: () => {
                                                    this.tweens.add({
                                                        targets: this.cameras.main,
                                                        scrollY: this.cameras.main.scrollY - 180,
                                                        duration: 1600,
                                                        ease: 'Cubic.easeOut',
                                                        onComplete: () => {
                                                            // カメラ停止後にエンディングメッセージ表示 → Enterでタイトルへ
                                                            const camW = this.cameras.main.width;
                                                            const camH = this.cameras.main.height;
                                                            // 文字間に hair space (U+200A) を挟んで字間を空ける
                                                            // (Phaser 3.55 の Text は letterSpacing 未対応で context 直設定もリセットされるため)
                                                            const spaceText = (str) => str;  // 字間挿入は廃止（Helvetica は標準字間で良いため）
                                                            const toBeContinued = this.add.text(camW / 2, camH / 2, spaceText('Other crew are still out there...'), {
                                                                fontSize: '32px',
                                                                fill: '#FFF',
                                                                fontFamily: "Helvetica, Arial, sans-serif"
                                                            }).setOrigin(0.5).setScrollFactor(0).setDepth(100).setAlpha(0);
                                                            const pressEnter = this.add.text(camW / 2, camH / 2 + 50, spaceText('Press ENTER to return to title'), {
                                                                fontSize: '18px',
                                                                fill: '#AAA',
                                                                fontFamily: "Helvetica, Arial, sans-serif"
                                                            }).setOrigin(0.5).setScrollFactor(0).setDepth(100).setAlpha(0);
                                                            this.tweens.add({
                                                                targets: [toBeContinued, pressEnter],
                                                                alpha: 1,
                                                                duration: 1500,
                                                                ease: 'Sine.easeIn',
                                                                onComplete: () => {
                                                                    this.input.keyboard.once('keydown-ENTER', () => {
                                                                        playthroughCount++;
                                                                        this.scene.restart();
                                                                    });
                                                                }
                                                            });
                                                        }
                                                    });
                                                }
                                            });

                                            this.tweens.add({
                                                targets: pod,
                                                y: pod.y - 1050,
                                                duration: 3000,
                                                ease: 'Cubic.easeIn',
                                                onComplete: () => {
                                                    pod.destroy();
                                                    nozzleTimer.remove();
                                                    nozzle.destroy();
                                                    if (this.escapeJetSound) fadeStopSound(this, this.escapeJetSound, 0.6, 300);
                                                }
                                            });
                                        });
                                }, 1);
                                });
                            }
                        });
                    });
                }

                if (this.crewFollowing && this.crews.length) {
                    const yOffset = this.astronaut.displayHeight / 2;
                    const backDir = this.astronautFacing === 'left' ? 1 : (this.astronautFacing === 'right' ? -1 : -1);

                    this.crews.forEach((c, idx) => {
                        // 既に捕まった／破棄済みの仲間はスキップ
                        if (!c.active || c.captured) return;
                        // 前走者：最初はプレイヤー、以降は一つ前の生きてる仲間
                        let leaderX = this.astronaut.x;
                        for (let k = idx - 1; k >= 0; k--) {
                            const prev = this.crews[k];
                            if (prev && prev.active && !prev.captured) { leaderX = prev.x; break; }
                        }
                        const targetX = leaderX + backDir * 13;
                        const prevX = c.x;
                        c.x = Phaser.Math.Linear(c.x, targetX, 0.06);
                        // Y方向：ジャンプは別途 delayedCall で c.vy を設定。ここは重力で落下のみ
                        if (c.vy === undefined) c.vy = 0;
                        c.vy += 200 * dt;
                        c.y += c.vy * dt;
                        if (c.y >= this.groundFeetY) {
                            c.y = this.groundFeetY;
                            c.vy = 0;
                        }
                        const dx = c.x - prevX;
                        const moving = Math.abs(dx) > 0.15;
                        const airborne = c.y < this.groundFeetY - 0.5;
                        const playingTurn = c.anims.isPlaying && c.anims.currentAnim && c.anims.currentAnim.key.startsWith('crew_turn_');
                        if (airborne) {
                            // 空中（車降り中など）：開脚ポーズ（L2）で固定
                            if (c.anims.isPlaying) c.anims.stop();
                            if (c.texture.key !== 'crew_L2') c.setTexture('crew_L2');
                        } else if (playingTurn) {
                            // 振り向きアニメ再生中は触らない
                        } else if (moving) {
                            const newFacing = dx > 0 ? 'right' : 'left';
                            if (c.facing && c.facing !== newFacing) {
                                // 方向転換：FL/FR を挟む flip アニメを再生
                                c.setFlipX(newFacing === 'right');
                                const flipAnim = newFacing === 'right' ? 'crew_turn_flip_LtoR' : 'crew_turn_flip_RtoL';
                                c.anims.play(flipAnim);
                            } else {
                                c.setFlipX(newFacing === 'right'); // 元画像は左向き
                                if (!c.anims.isPlaying || c.anims.currentAnim.key !== 'crew_walk') {
                                    c.anims.play('crew_walk');
                                }
                            }
                            c.facing = newFacing;
                        } else {
                            if (c.anims.isPlaying && c.anims.currentAnim.key === 'crew_walk') c.anims.stop();
                            if (c.texture.key !== 'crew_0') c.setTexture('crew_0');
                        }
                    });
                }
                // 仲間の影は X方向に追従、可視状態も同期
                if (this.crews) this.crews.forEach(c => {
                    if (c.shadow) {
                        c.shadow.x = c.x;
                        c.shadow.setVisible(c.visible);
                    }
                });

                // カメラを宇宙飛行士に追従（ポッド打ち上げ中・捕獲後はスキップ）
                const cam = this.cameras.main;
                if (!this.cameraRising && !this.astronautGameOver) {
                    const currentX = cam.scrollX + cam.width / 2;
                    const currentY = cam.scrollY + cam.height / 2;
                    cam.centerOn(
                        Phaser.Math.Linear(currentX, this.astronaut.x, 0.04),
                        Phaser.Math.Linear(currentY, this.astronaut.y, 0.04)
                    );
                }

                // デブリは飛び続ける
                const camLeft = cam.worldView.left;
                const camRight = cam.worldView.right;
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;
                    const margin = debris.displayWidth;
                    if (debris.x > camRight + margin) {
                        debris.x = camLeft - margin;
                    } else if (debris.x < camLeft - margin) {
                        debris.x = camRight + margin;
                    }
                });
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.angle += debris.getData('rotationSpeed');
                });
                return;
            }

            if (!gameStarted) {
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);

                // タイトル/降下中もデブリは流れ続ける
                if (this.debrisGroup) {
                    const cam = this.cameras.main;
                    const camLeft = cam.worldView.left;
                    const camRight = cam.worldView.right;
                    this.debrisGroup.getChildren().forEach((debris) => {
                        debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;
                        const margin = debris.displayWidth;
                        if (debris.x > camRight + margin) {
                            debris.x = camLeft - margin;
                        } else if (debris.x < camLeft - margin) {
                            debris.x = camRight + margin;
                        }
                        debris.angle += debris.getData('rotationSpeed');
                    });
                }
                return;
            }

            if (gameStarted) {
                // 宇宙船の速度に基づいてカメラの位置を調整（パララックス効果）
                const maxCameraOffset = 100;
                const offsetX = Phaser.Math.Clamp(-this.spaceship.body.velocity.x / 50, -maxCameraOffset, maxCameraOffset);
                const offsetY = Phaser.Math.Clamp(-this.spaceship.body.velocity.y / 50, -maxCameraOffset, maxCameraOffset);

                // カメラの遅延追従（宇宙船が中心からズレ、カメラが遅れてついてくる）
                const targetX = this.spaceship.x + offsetX;
                const targetY = this.spaceship.y + offsetY;
                const cam = this.cameras.main;
                const currentX = cam.scrollX + cam.width / 2;
                const currentY = cam.scrollY + cam.height / 2;
                const lerpSpeed = 0.04;
                cam.centerOn(
                    Phaser.Math.Linear(currentX, targetX, lerpSpeed),
                    Phaser.Math.Linear(currentY, targetY, lerpSpeed)
                );

                // ズーム効果を設定
                const zoomSpeed = 0.0003 * delta;
                const lowerThirdBoundary = this.game.config.height * (2 / 3);
                let zoomTarget;

                if (this.spaceship.y > lowerThirdBoundary) {
                    zoomTarget = 1.8;
                } else {
                    zoomTarget = 0.8;
                }

                this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, zoomTarget, zoomSpeed));

                // 燃料ゲージを宇宙船の右側に追従させる
                const gaugeX = this.spaceship.x + 35;
                const gaugeY = this.spaceship.y - 25;
                const fuelRatio = this.fuel / 250;
                const fuelHeight = fuelRatio * 48;

                this.fuelGaugeBorder.setPosition(gaugeX, gaugeY);
                this.fuelGauge.clear().fillStyle(0xaf3035).fillRect(1, 1 + (48 - fuelHeight), 6, fuelHeight);
                this.fuelGauge.setPosition(gaugeX, gaugeY);

                
                // ジェット音の再生タイミング（フェードでプチノイズ防止）
                if (cursors.up.isDown || cursors.down.isDown || cursors.left.isDown || cursors.right.isDown) {
                    startSoundCancelFade(jetSound, 0.5);
                } else {
                    fadeStopSound(this, jetSound, 0.5);
                }

                // 燃料を消費
                if ((this.input.keyboard.createCursorKeys().up.isDown ||
                    this.input.keyboard.createCursorKeys().down.isDown ||
                    this.input.keyboard.createCursorKeys().left.isDown ||
                    this.input.keyboard.createCursorKeys().right.isDown) && this.fuel > 0) {
                    this.fuel -= 1;
                }

                // 燃料がなくなったら操作を無効にする
                if (this.fuel <= 0) {
                    this.cursors.up.isDown = false;
                    this.cursors.down.isDown = false;
                    this.cursors.left.isDown = false;
                    this.cursors.right.isDown = false;
                }

                // 燃料が90以下になったら点滅させる
                if (this.fuel <= 90) {
                    const blinkColor = (Math.floor(Date.now() / 400) % 2) === 0 ? 0xaf3035 : 0xffe8f1;
                    const blinkFuelHeight = (this.fuel / 250) * 48;
                    this.fuelGauge.clear().fillStyle(blinkColor).fillRect(1, 1 + (48 - blinkFuelHeight), 6, blinkFuelHeight);

                    // 燃料が90以下でサウンドが再生されていない場合、emptysoundを再生
                    if (!this.emptySound.isPlaying) {
                        this.emptySound.play();
                    }
                }

                if (this.cursors.up.isDown) {
                    this.spaceship.setAccelerationY(-500);
                } else if (this.cursors.down.isDown) {
                    this.spaceship.setAccelerationY(500);
                } else {
                    this.spaceship.setAccelerationY(0);
                }

                if (this.cursors.left.isDown) {
                    this.spaceship.setAccelerationX(-500);
                    this.spaceship.angle = Math.max(this.spaceship.angle - 2, -35); // 左へ最大35度傾ける
                } else if (this.cursors.right.isDown) {
                    this.spaceship.setAccelerationX(500);
                    this.spaceship.angle = Math.min(this.spaceship.angle + 2, 35); // 右へ最大35度傾ける
                } else {
                    this.spaceship.setAccelerationX(0);
                    // 宇宙船の角度を徐々に0度に戻す
                    if (this.spaceship.angle < 0) {
                        this.spaceship.angle = Math.min(this.spaceship.angle + 2, 0);
                    } else if (this.spaceship.angle > 0) {
                        this.spaceship.angle = Math.max(this.spaceship.angle - 2, 0);
                    }
                }

                // ジェット噴射パーティクルの位置更新とon/off
                const sx = this.spaceship.x;
                const sy = this.spaceship.y;
                const hasFuel = this.fuel > 0;

                this.jetParticles.up.setPosition(sx, sy + 25);
                this.jetParticles.down.setPosition(sx, sy - 25);
                this.jetParticles.left.setPosition(sx + 25, sy);
                this.jetParticles.right.setPosition(sx - 25, sy);

                this.jetParticles.up.on = this.cursors.up.isDown && hasFuel;
                this.jetParticles.down.on = this.cursors.down.isDown && hasFuel;
                this.jetParticles.left.on = this.cursors.left.isDown && hasFuel;
                this.jetParticles.right.on = this.cursors.right.isDown && hasFuel;

                // 宇宙船の影の位置を更新（宇宙船の真下、地面の高さ）
                this.spaceshipShadow.x = this.spaceship.x;
                this.spaceshipShadow.y = this.moon.y + 35; // 地面ライン

                // ゴールエリアからの高さを計算
                const heightAboveGoal = Math.max(this.spaceship.y - (this.moon.y - 260), 0);

                // 透明度を計算（高さに応じて0〜1の範囲）
                const shadowAlpha = heightAboveGoal / 260;
                this.spaceshipShadow.alpha = shadowAlpha;

                // 影のサイズを計算（高さに応じて50〜100の範囲）
                const shadowSize = 110 - (heightAboveGoal / 4.6);
                this.spaceshipShadow.setScale(shadowSize / 100); // ベース直径 100 を縮尺

                // 地面に近い＋ジェット噴射中の時だけ粉塵を左右に舞い上がらせる
                const groundDistance = (this.game.config.height - 63) - (this.spaceship.y + 25);
                const isThrusting = this.cursors.up.isDown || this.cursors.down.isDown || this.cursors.left.isDown || this.cursors.right.isDown;
                if (groundDistance < 150 && groundDistance > 0 && isThrusting && this.fuel > 0) {
                    const dustY = this.game.config.height - 65;
                    const intensity = 1 - (groundDistance / 150); // 0(遠い)〜1(地面すれすれ)
                    const freq = Math.max(5, 30 - intensity * 25);
                    const qty = Math.ceil(1 + intensity * 3);
                    const spd = 30 + intensity * 80;

                    const offsets = [-8, -3, 3, 8];
                    this.dustEmitters.forEach((e, i) => {
                        e.setPosition(this.spaceship.x + offsets[i], dustY);
                        e.on = true;
                        e.setFrequency(freq);
                        e.setQuantity(qty);
                        e.setSpeed({ min: spd * 0.5, max: spd });
                    });
                } else {
                    this.dustEmitters.forEach(e => e.on = false);
                }
            }

            // 着陸エリアに接触した時にクリア
            const landingZone = new Phaser.Geom.Rectangle(
                this.moon.x - this.moon.displayWidth / 2,
                this.moon.y + this.moon.displayHeight / 2 - 5 + 5,
                this.moon.displayWidth,
                5
            );

            // ターゲットマークの色フェード（ゴール上空に近づくほど緑→オレンジ）
            const inGoalX = Math.abs(this.spaceship.x - this.moon.x) < this.moon.displayWidth / 2;
            const distY = this.moon.y - this.spaceship.y;
            let markerT = 0; // 0=緑, 1=オレンジ
            if (inGoalX && distY < 300 && distY > 0) {
                markerT = 1 - (distY / 300); // 近いほど1に
            } else if (inGoalX && distY <= 0) {
                markerT = 1;
            }
            // 緑(0x00ff00)→オレンジ(0xff8800)を補間
            const r = Math.round(0x00 + (0xff - 0x00) * markerT);
            const g = Math.round(0xff + (0x88 - 0xff) * markerT);
            const b = Math.round(0x00 + (0x00 - 0x00) * markerT);
            const newColor = (r << 16) | (g << 8) | b;
            if (newColor !== this.currentMarkerColor) {
                this.currentMarkerColor = newColor;
                this.drawLandingMarker(newColor);
            }

            const isLevel = Math.abs(this.spaceship.angle) <= 5; // 水平から±5度以内
            const speed = Math.sqrt(
                this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
            );
            const isSlow = speed < 80; // ゆっくり降下中のみ

            if (isLevel && isSlow && Phaser.Geom.Intersects.RectangleToRectangle(this.spaceship.getBounds(), landingZone)) {
                // コトンと着地：即座に停止して接地感を出す
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);
                this.spaceship.angle = 0;

                this.goalSound.play();

                // ゴール時にjet音を停止（フェード）
                fadeStopSound(this, jetSound, 0.5);

                // エンプティー音を停止
                if (this.emptySound.isPlaying) {
                    this.emptySound.stop();
                }

                // ジェット噴射・粉塵パーティクルを停止
                this.jetParticles.up.on = false;
                this.jetParticles.down.on = false;
                this.jetParticles.left.on = false;
                this.jetParticles.right.on = false;
                this.dustEmitters.forEach(e => e.on = false);

                // 燃料ゲージ・ターゲットマーク・デブリを非表示
                this.fuelGaugeBorder.setVisible(false);
                this.fuelGauge.setVisible(false);
                this.landingMarker.setVisible(false);
                this.debrisGroup.getChildren().forEach(d => d.setVisible(false));

                gameStarted = false; // 操作を無効化

                // ハシゴが出てきて、宇宙飛行士が降りてくる演出
                this.time.delayedCall(1000, () => {
                    // ハシゴを描画（宇宙船の下から伸びる）
                    const ladderX = this.spaceship.x - 5;
                    const ladderTop = this.spaceship.y + 10; // 宇宙船の内部から伸ばす
                    const ladderBottom = this.spaceship.y + 56; // プレイヤー足元の少し上まで
                    const astronautDestY = this.spaceship.y + 50; // 着地中心位置（地面）は据え置き
                    const ladder = this.add.graphics({ lineStyle: { width: 1, color: 0xcccccc } });
                    ladder.setDepth(7);

                    // ハシゴが出てくるタイミングで、宇宙船の足元（ハシゴ付近）にカメラをパン＋ズーム
                    const targetPanX = this.spaceship.x;
                    const targetPanY = this.spaceship.y + 30; // ハシゴ中央あたり
                    this.cameras.main.pan(targetPanX, targetPanY, 1500, 'Sine.easeInOut');
                    this.cameras.main.zoomTo(4.5, 1500, 'Sine.easeInOut');

                    // ハシゴがスッと伸びるアニメーション
                    let ladderProgress = 0;
                    const ladderTween = this.tweens.addCounter({
                        from: 0,
                        to: 1,
                        duration: 800,
                        ease: 'Sine.easeOut',
                        onUpdate: (tween) => {
                            ladderProgress = tween.getValue();
                            const currentBottom = ladderTop + (ladderBottom - ladderTop) * ladderProgress;
                            ladder.clear();
                            ladder.lineStyle(1, 0xcccccc);
                            // 2本の縦線
                            ladder.lineBetween(ladderX - 3, ladderTop, ladderX - 3, currentBottom);
                            ladder.lineBetween(ladderX + 3, ladderTop, ladderX + 3, currentBottom);
                            // 横棒：始端と終端は閉じない（H形）。コマ数 +2
                            const steps = 9;
                            for (let s = 1; s < steps; s++) {
                                const stepY = ladderTop + (currentBottom - ladderTop) * (s / steps);
                                if (stepY <= currentBottom) {
                                    ladder.lineBetween(ladderX - 3, stepY, ladderX + 3, stepY);
                                }
                            }
                        },
                        onComplete: () => {
                            // ハシゴが伸びきったら宇宙飛行士が降りてくる（後ろ向き）
                            const astronaut = this.add.sprite(
                                ladderX,
                                ladderTop,
                                'spaceman_B'
                            );
                            // 元画像は 725x904（縦長、アスペクト比 ~0.8）。アスペクト維持
                            astronaut.setDisplaySize(15, 19);
                            astronaut.setDepth(8);

                            // 影を先に作成し、降下中にフェードイン（着地予定位置に）
                            const destFootY = astronautDestY + 19 / 2;
                            astronaut.shadow = createGroundShadow(this, astronaut.x, destFootY, 14);
                            astronaut.shadow.alpha = 0;
                            this.tweens.add({ targets: astronaut.shadow, alpha: 1, duration: 1500, ease: 'Sine.easeInOut' });

                            steppedClimb(this, astronaut, astronautDestY, 8, 100, 70, () => {
                                    // 故障車の方向を先に決める。振り向きは車と逆方向（自然な視線の動き）
                                    const carDirEarly = Phaser.Math.Between(0, 1) ? 1 : -1;
                                    this.astronautCarDir = carDirEarly;
                                    this.astronautTurnDir = carDirEarly > 0 ? 'L' : 'R';
                                    // 降りきったら振り向いて正面を向く（方向に応じてR/L版）
                                    astronaut.setFlipX(false);
                                    astronaut.anims.play('astronaut_turn_to_front_' + this.astronautTurnDir);
                                    // 正面状態を記録（次の左右移動時に front→FL/FR→L/R アニメを再生）
                                    this.astronautFacing = 'front';
                                    // そのまま操作可能にする（物理不要、手動制御）
                                    this.astronaut = astronaut;
                                    this.astronautGroundY = astronaut.y; // 地面のY座標を記憶
                                    // 影は降下開始時に既に作成済み（フェードイン中）
                                    // 移動範囲を背景画像内にクランプ（ズーム2.75での可視域を背景内に収める）
                                    const bgTex = this.textures.get('background').getSourceImage();
                                    const bgCenterX = this.scale.width / 2;
                                    const camHalfW = this.scale.width / 2.75 / 2;
                                    this.astronautMinX = (bgCenterX - bgTex.width / 2) + camHalfW;
                                    this.astronautMaxX = (bgCenterX + bgTex.width / 2) - camHalfW;
                                    // 仮：移動限界の外側に2001モノリス（立体感あり）
                                    const monoY = this.astronautGroundY + this.astronaut.displayHeight / 2;
                                    const monoW = 20;
                                    const monoH = 140;
                                    const depthX = 6;
                                    const depthY = -4;
                                    const gap = monoW / 2 + this.astronaut.displayWidth / 2;
                                    [
                                        { x: this.astronautMinX - gap, innerDir: 1 },
                                        { x: this.astronautMaxX + gap, innerDir: -1 }
                                    ].forEach(p => {
                                        const g = this.add.graphics();
                                        g.setDepth(7);
                                        const topY = monoY - monoH;
                                        const innerX = p.x + p.innerDir * monoW / 2;
                                        // 側面（プレイヤー側に見える面・わずかに明るく）
                                        g.fillStyle(0x2a2a2a);
                                        g.beginPath();
                                        g.moveTo(innerX, topY);
                                        g.lineTo(innerX + p.innerDir * depthX, topY + depthY);
                                        g.lineTo(innerX + p.innerDir * depthX, monoY + depthY);
                                        g.lineTo(innerX, monoY);
                                        g.closePath();
                                        g.fillPath();
                                        // 上面（蓋）：光が当たるので側面より明るめ
                                        g.fillStyle(0x3a3a3a);
                                        g.beginPath();
                                        g.moveTo(p.x - monoW / 2, topY);
                                        g.lineTo(p.x + monoW / 2, topY);
                                        g.lineTo(p.x + monoW / 2 + p.innerDir * depthX, topY + depthY);
                                        g.lineTo(p.x - monoW / 2 + p.innerDir * depthX, topY + depthY);
                                        g.closePath();
                                        g.fillPath();
                                        // 前面
                                        g.fillStyle(0x000000);
                                        g.fillRect(p.x - monoW / 2, topY, monoW, monoH);
                                        // アウトライン
                                        g.lineStyle(1, 0x111111);
                                        g.strokeRect(p.x - monoW / 2, topY, monoW, monoH);
                                    });
                                    this.astronautVY = 0; // 縦方向の速度
                                    this.astronautFacing = null; // 向き（左右移動後に確定、未確定時は発射不可）
                                    this.lasers = []; // 発射中のレーザー
                                    this.beamEnergy = 100; // ビーム残量（0-100）
                                    this.enemies = []; // 地底人
                                    this.enemyKills = 0;
                                    this.bossesDue = 0;
                                    this.astronautGameOver = false;

                                    // ビーム残量ゲージ（宇宙飛行士上部に追従、小さめ＆コントラスト色）
                                    this.beamGaugeBg = this.add.rectangle(0, 0, 10, 1, 0x000000).setDepth(11);
                                    this.beamGaugeFill = this.add.rectangle(0, 0, 10, 1, 0x00ffcc).setDepth(12);

                                    // 大破した月面探査車（振り向き方向の逆側に配置）
                                    const carDir = this.astronautCarDir;
                                    const carX = astronaut.x + carDir * Phaser.Math.Between(800, 1200);
                                    const carFeetY = astronaut.y + astronaut.displayHeight / 2;
                                    this.moonCar = this.add.image(carX, carFeetY, 'mooncar');
                                    this.moonCar.setOrigin(0.5, 1);
                                    this.moonCar.setDisplaySize(120, 60);
                                    this.moonCar.setDepth(6);

                                    // 仲間の状態管理（2人救出）
                                    this.crewFound = false;
                                    this.crewFollowing = false;
                                    this.crews = []; // 仲間スプライト配列

                                    // 地面マスク（地面より上だけ表示。出現・引きずり込みに使用）
                                    this.groundFeetY = this.astronautGroundY + this.astronaut.displayHeight / 2;
                                    const maskGfx = this.make.graphics();
                                    maskGfx.fillStyle(0xffffff);
                                    maskGfx.fillRect(-2000, -2000, 6000, this.groundFeetY + 2000);
                                    this.groundMask = maskGfx.createGeometryMask();

                                    // 地底人スポーン（地面から頭→体→足の順で這い出す）
                                    this.spawnEnemy = () => {
                                        if (this.astronautGameOver || !this.astronautMode || this.enemiesRetreating) return;
                                        const side = Phaser.Math.Between(0, 1) ? -1 : 1;
                                        const distance = Phaser.Math.Between(160, 360);
                                        const spawnX = this.astronaut.x + side * distance;
                                        const isBoss = this.bossesDue > 0;
                                        if (isBoss) this.bossesDue--;
                                        const dirFace = spawnX < this.astronaut.x ? 'R' : 'L';
                                        const enemyH = isBoss ? 56 : 24;
                                        // 雑魚もボスも sprite で生成（出現中は正面固定）
                                        const enemy = this.add.sprite(spawnX, this.groundFeetY + enemyH, isBoss ? 'alienB_F' : 'alien_F');
                                        enemy.setOrigin(0.5, 1);
                                        if (isBoss) {
                                            // 元画像比率 1100:770 を維持（h=56 → w=80）
                                            enemy.setDisplaySize(80, 56);
                                            enemy.hp = 10;
                                        } else {
                                            // 元画像比率 1000:600 (10:6) を維持（h=24 → w=40）
                                            enemy.setDisplaySize(40, 24);
                                            enemy.hp = 3;
                                        }
                                        enemy.lastDir = dirFace === 'R' ? 1 : -1;
                                        // 出現中は正面固定。emerging 完了後に walk を開始（下の tween onComplete）
                                        enemy.isBoss = isBoss;
                                        // 速度は spawn 時に固定（base ±2 のランダム個体差）
                                        const baseSpeed = isBoss ? 30 : 50;
                                        enemy.speed = baseSpeed + Phaser.Math.Between(-2, 2);
                                        enemy.setDepth(8);
                                        enemy.setMask(this.groundMask);
                                        enemy.emerging = true;
                                        // 影：地中から出てくる瞬間から地面に表示（フェードインで予兆を演出）
                                        enemy.shadow = createGroundShadow(this, enemy.x, this.groundFeetY, isBoss ? 60 : 24, isBoss ? 2 : 0);
                                        enemy.shadow.alpha = 0;
                                        this.tweens.add({ targets: enemy.shadow, alpha: 1, duration: 900, ease: 'Sine.easeOut' });

                                        // 出現時：地面が割れて飛び出すイメージで2種類のパーティクルを同時発射
                                        const groundY = this.groundFeetY;
                                        // 砂埃の最大到達高さ＝エイリアン身長の半分くらい
                                        const dustGravity = 500;
                                        const dustMaxV = Math.sqrt(2 * dustGravity * (enemyH / 2)); // 物理計算で初速を決める

                                        // (1) 砂埃の煙（白ベース＋グレーtintで正確な月面色、地面で消滅）
                                        const dustBurst = this.add.particles('dustWhite');
                                        dustBurst.setDepth(7);
                                        const dustEm = dustBurst.createEmitter({
                                            x: spawnX,
                                            y: groundY - 1, // 地面直前から
                                            speed: { min: dustMaxV * 0.5, max: dustMaxV },
                                            angle: { min: 240, max: 300 },
                                            scale: { start: 0.25, end: 1.0 },
                                            alpha: { start: 0.7, end: 0 },
                                            tint: [0xaaaaaa, 0x999999, 0x888888, 0xbbbbbb],
                                            lifespan: { min: 500, max: 900 },
                                            gravityY: dustGravity,
                                            quantity: 1,
                                            on: false,
                                            // 地面ラインに戻ったら消滅
                                            deathZone: {
                                                type: 'onEnter',
                                                source: new Phaser.Geom.Rectangle(spawnX - 400, groundY, 800, 800)
                                            }
                                        });
                                        const dustCount = isBoss ? 26 : 16;
                                        dustEm.explode(dustCount, spawnX, groundY);
                                        this.time.delayedCall(1200, () => dustBurst.destroy());

                                        // (2) 小石・砂粒（暗めグレーで、出てきた地面位置で消滅）
                                        const stoneBurst = this.add.particles('chargeParticle');
                                        stoneBurst.setDepth(8);
                                        const stoneEm = stoneBurst.createEmitter({
                                            x: spawnX,
                                            y: groundY - 1, // 地面直前から発生（即時消滅を回避）
                                            speed: { min: 25, max: 70 },
                                            angle: { min: 250, max: 290 },
                                            scale: { min: 1, max: 2.5 },
                                            alpha: { start: 1, end: 1 },
                                            tint: [0x666666, 0x888888, 0x555555, 0x777777],
                                            lifespan: { min: 350, max: 700 },
                                            gravityY: 320,
                                            quantity: 1,
                                            on: false,
                                            // 地面ラインに戻ったら即消滅
                                            deathZone: {
                                                type: 'onEnter',
                                                source: new Phaser.Geom.Rectangle(spawnX - 400, groundY, 800, 800)
                                            }
                                        });
                                        const stoneCount = isBoss ? 28 : 18;
                                        stoneEm.explode(stoneCount, spawnX, groundY);
                                        this.time.delayedCall(1500, () => stoneBurst.destroy());
                                        this.tweens.add({
                                            targets: enemy,
                                            y: this.groundFeetY,
                                            duration: 900,
                                            ease: 'Sine.easeOut',
                                            onComplete: () => {
                                                // 出現中にビームで撃破されている可能性あり
                                                if (!enemy.active) return;
                                                enemy.emerging = false;
                                                enemy.clearMask();
                                                // 出現完了 → F→FR/FL で振り向き → walk ループへ
                                                enemy.setFlipX(false); // F/FL/FR は絶対向き
                                                enemy.emergeTransitioning = true;
                                                const animPrefix = enemy.isBoss ? 'bossAlien_' : 'alien_';
                                                const emergeKey = animPrefix + (enemy.lastDir > 0 ? 'emerge_R' : 'emerge_L');
                                                enemy.anims.play(emergeKey);
                                                enemy.once('animationcomplete', () => {
                                                    if (!enemy.active) return;
                                                    enemy.emergeTransitioning = false;
                                                    enemy.setFlipX(enemy.lastDir > 0); // walk フレームは左向き基準
                                                    enemy.anims.play(animPrefix + 'walk');
                                                });
                                            }
                                        });
                                        this.enemies.push(enemy);
                                        this.time.delayedCall(Phaser.Math.Between(700, 1800), this.spawnEnemy);
                                    };
                                    this.time.delayedCall(1500, this.spawnEnemy);

                                    this.astronautMode = true; // 宇宙飛行士操作モード
                                    this.astronautHasMoved = false; // 初回移動で通常ズームへ切り替え
                                    // ズームはハシゴが伸び始める時から既に進行中

                                    // 大破車の方向を >>> で表示＋上に英語ラベル（1週目のみ）
                                    if (this.moonCar && playthroughCount === 0) {
                                        const arrow = this.moonCar.x > astronaut.x ? '>' : '<';
                                        const arrows = [arrow, arrow + arrow, arrow + arrow + arrow];
                                        const isRight = this.moonCar.x > astronaut.x;
                                        const offsetX = (isRight ? 1 : -1) * 25;
                                        const originX = isRight ? 0 : 1; // 右向き=左揃え、左向き=右揃え
                                        const labelY = astronaut.y - 34;
                                        const arrowY = astronaut.y - 26;
                                        const ARROW_LOOPS = 3;
                                        const STAGES = 3;
                                        const STEP_DUR = 160; // フェードイン
                                        const STEP_HOLD = 120; // 9 steps × 440ms = 3960ms（4秒以内）
                                        const STEP_TOTAL = STEP_DUR * 2 + STEP_HOLD; // 1ステップの総時間 (in+hold+out)
                                        const totalSteps = ARROW_LOOPS * STAGES;
                                        const totalDuration = STEP_TOTAL * totalSteps;

                                        // ラベル＆矢印は同じアンカー位置で固定（プレイヤー移動に追従しない）
                                        const fixedAnchorX = astronaut.x + offsetX;
                                        // 0.5秒だけ遅らせて出す（操作開始の直後すぎないように）
                                        this.time.delayedCall(500, () => {
                                            const label = this.add.image(
                                                fixedAnchorX, labelY, 'label_rescue'
                                            ).setOrigin(originX, 0.5).setDepth(12).setAlpha(0).setScale(this._labelDisplayScale || 0.25);
                                            const bubble = this.makeGuideBubble(
                                                fixedAnchorX, labelY, arrowY, label, isRight, 0x88ffaa, 11.5
                                            ).setScale(0, 1);
                                            this.tweens.add({ targets: label, alpha: 1, duration: 250, ease: 'Sine.easeOut' });
                                            this.tweens.add({ targets: bubble, scaleX: 1, duration: 300, ease: 'Sine.easeOut' });
                                            this.time.delayedCall(totalDuration + 100, () => {
                                                this.tweens.add({
                                                    targets: label, alpha: 0, duration: 300, ease: 'Sine.easeIn',
                                                    onComplete: () => label.destroy()
                                                });
                                                this.tweens.add({
                                                    targets: bubble, scaleX: 0, duration: 300, ease: 'Sine.easeIn',
                                                    onComplete: () => bubble.destroy()
                                                });
                                            });
                                        });

                                        // 矢印：>, >>, >>> サイクルは残し、位置は固定（プレイヤー移動に追従しない）
                                        // ラベルの内側 padding 分（表示 2px）を矢印を内側に寄せて端を揃える
                                        const arrowAnchorX = fixedAnchorX + (isRight ? 1 : -1) * 8 * (this._labelDisplayScale || 0.25);
                                        let step = 0;
                                        const showArrow = () => {
                                            if (step >= totalSteps) return;
                                            const count = (step % STAGES) + 1;
                                            const group = this.makeArrowGroup(
                                                arrowAnchorX, arrowY, count, isRight, 12, (this._labelDisplayScale || 0.25) / 6
                                            );
                                            this.tweens.add({
                                                targets: group,
                                                alpha: 1,
                                                duration: STEP_DUR,
                                                yoyo: true,
                                                hold: STEP_HOLD,
                                                onComplete: () => {
                                                    group.forEach(a => a.destroy());
                                                    step++;
                                                    showArrow();
                                                }
                                            });
                                        };
                                        this.time.delayedCall(500, showArrow);
                                    }
                            }, 1);
                        }
                    });
                });
            } else {
                this.goalTimer = 0; // 触れていない場合、タイマーをリセットする
            }

            // 宇宙船が地面に達したかどうかを確認（ゴール成功時は除外）
            if (gameStarted && this.spaceship.y + this.spaceship.displayHeight / 2 >= this.game.config.height - 63) {
                const groundSpeed = Math.sqrt(
                    this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                    this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
                );
                const groundLevel = Math.abs(this.spaceship.angle) <= 5;

                if (groundLevel && groundSpeed < 80) {
                    // ゆっくり水平着地：爆発せずコトンと停止、ミッション失敗
                    this.spaceship.setVelocity(0);
                    this.spaceship.setAcceleration(0);
                    this.spaceship.setGravityY(0);
                    this.spaceship.angle = 0;

                    fadeStopSound(this, jetSound, 0.5);
                    if (this.emptySound.isPlaying) { this.emptySound.stop(); }
                    this.jetParticles.up.on = false;
                    this.jetParticles.down.on = false;
                    this.jetParticles.left.on = false;
                    this.jetParticles.right.on = false;
                    this.dustEmitters.forEach(e => e.on = false);

                    // 成功着地と同様に船にカメラを寄せる
                    this.cameras.main.pan(this.spaceship.x, this.spaceship.y + 30, 1500, 'Sine.easeInOut');
                    this.cameras.main.zoomTo(4.5, 1500, 'Sine.easeInOut');

                    this.add.image(this.spaceship.x, this.spaceship.y - 30, 'label_offtarget').setOrigin(0.5, 0.5).setDepth(11).setScale(this._labelDisplayScale || 0.25);
                    this.endSound.play();
                    gameStarted = false;

                    this.time.delayedCall(3000, () => {
                        restartGame(this);
                    });
                } else {
                    // 速すぎるor傾いている：爆発
                    gameOver(this, '');
                }
            }

            // デブリの移動
            const cam = this.cameras.main;
            const camLeft = cam.worldView.left;
            const camRight = cam.worldView.right;
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;

                // カメラの表示範囲の端から端へ折り返す
                const margin = debris.displayWidth;
                if (debris.x > camRight + margin) {
                    debris.x = camLeft - margin;
                } else if (debris.x < camLeft - margin) {
                    debris.x = camRight + margin;
                }
            });

            // デブリの回転
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.angle += debris.getData('rotationSpeed');
            });

            // 宇宙船とデブリとの衝突をチェック
            this.physics.overlap(this.spaceship, this.debrisGroup, () => {
                gameOver(this, '');
            });

        }

        let explosionPlaying = false;

        // ハシゴをスムーズなトントンで登り降りさせる（ワープせず、短いtweenを連鎖）
        // midOffset: 中間ステップだけYに足すオフセット。最終着地位置は変えない（足がステップに乗るよう微調整）
        function steppedClimb(scene, target, finalY, steps, stepDuration, pauseDuration, onComplete, midOffset = 0) {
            const startY = target.y;
            const stepDist = (finalY - startY) / steps;
            let currentStep = 0;
            const doStep = () => {
                if (currentStep >= steps) { if (onComplete) onComplete(); return; }
                currentStep++;
                const isLast = currentStep === steps;
                scene.tweens.add({
                    targets: target,
                    y: startY + stepDist * currentStep + (isLast ? 0 : midOffset),
                    duration: stepDuration,
                    ease: 'Sine.easeOut',
                    onComplete: () => {
                        if (pauseDuration > 0) scene.time.delayedCall(pauseDuration, doStep);
                        else doStep();
                    }
                });
            };
            doStep();
        }

        // 溶かされた人の緑のシミ（捕獲沈下後に影の替わりに広がる）
        // 月面のシミなので、歩き回るキャラ（敵 depth 8、仲間 7、月面車 6）の全てより下に置く
        // 形・サイズはランダム。複数のランダムな楕円が重なって有機的な形を作る。
        function spawnDissolveStain(scene, x, footY) {
            const g = scene.add.graphics();
            const blobCount = Phaser.Math.Between(3, 6);
            const colors = [0x33dd33, 0x66ee66, 0x88ee55, 0xaaff77];
            for (let i = 0; i < blobCount; i++) {
                const c = Phaser.Math.RND.pick(colors);
                const alpha = Phaser.Math.FloatBetween(0.25, 0.55);
                g.fillStyle(c, alpha);
                // 横長の楕円。中心からランダムにずらして重ねる。
                const w = Phaser.Math.Between(6, 18);
                const h = w * Phaser.Math.FloatBetween(0.25, 0.4);
                const ox = Phaser.Math.Between(-7, 7);
                const oy = Phaser.Math.Between(-2, 2);
                g.fillEllipse(ox, oy, w, h);
            }
            g.x = x;
            g.y = footY + 1;
            g.setDepth(4); // 月面背景より上、月面車・キャラの全てより下
            // インスタンスごとのランダム最大サイズ（0.5〜1.0、現状を1.0=最大とする）
            const maxScale = Phaser.Math.FloatBetween(0.5, 1.0);
            g.setScale(maxScale * 0.2); // 小さく開始
            scene.tweens.add({ targets: g, scaleX: maxScale, scaleY: maxScale, duration: 1800, ease: 'Sine.easeOut' });
            return g;
        }

        // 地上キャラクターの影（多層楕円で疑似ブラー）。深度 6.5 (moon car 6 と crews 7 の間)
        function createGroundShadow(scene, x, footY, width, heightBoost = 0) {
            const g = scene.add.graphics();
            // 外側ほど薄く広く（ぼかし表現）
            g.fillStyle(0x000000, 0.04);
            g.fillEllipse(0, 0, width * 1.5, 4.5 + heightBoost);
            g.fillStyle(0x000000, 0.06);
            g.fillEllipse(0, 0, width * 1.2, 3.6 + heightBoost);
            g.fillStyle(0x000000, 0.08);
            g.fillEllipse(0, 0, width, 3 + heightBoost);
            g.x = x;
            g.y = footY;
            g.setDepth(6.5);
            return g;
        }

        // プチノイズ防止：Web Audio API の setTargetAtTime で指数関数的なエンベロープ減衰
        // 終端に向かって変化速度がゼロに漸近するためクリックが原理的に出ない
        // 重要：fade完了後 gain は 0 のまま放置（瞬時ジャンプを作らない）。次回 play 前に復元。
        function fadeStopSound(scene, sound, originalVolume, duration = 250) {
            if (!sound || !sound.isPlaying) return;
            if (sound._fadeActive) return; // 二重フェード防止

            if (sound.volumeNode && sound.manager && sound.manager.context) {
                const ctx = sound.manager.context;
                const gain = sound.volumeNode.gain;
                const t = ctx.currentTime;
                const timeConstant = duration / 5000; // 5τ で gain≈0.7% (約-43dB) まで減衰
                gain.cancelScheduledValues(t);
                gain.setValueAtTime(gain.value, t);
                gain.setTargetAtTime(0, t, timeConstant);
                sound._fadeActive = true;
                sound._fadeTimer = scene.time.delayedCall(duration + 30, () => {
                    // この時点で gain は -43dB 以下（実質無音）。stop() しても聴感上クリックなし
                    sound.stop();
                    sound._fadeActive = false;
                    sound._fadeTimer = null;
                });
            } else {
                // フォールバック (HTML5 Audio)
                sound._fadeActive = true;
                sound._fadeTween = scene.tweens.add({
                    targets: sound,
                    volume: 0,
                    duration: duration,
                    onComplete: () => {
                        sound.stop();
                        sound.setVolume(originalVolume);
                        sound._fadeActive = false;
                        sound._fadeTween = null;
                    }
                });
            }
        }

        // 再生開始：fade中ならキャンセルして短い ramp で復帰、停止中なら gain を復元してから play
        function startSoundCancelFade(sound, originalVolume) {
            if (sound._fadeActive) {
                if (sound._fadeTimer) { sound._fadeTimer.remove(); sound._fadeTimer = null; }
                if (sound._fadeTween) { sound._fadeTween.stop(); sound._fadeTween = null; }
                if (sound.volumeNode && sound.manager) {
                    const ctx = sound.manager.context;
                    const gain = sound.volumeNode.gain;
                    const t = ctx.currentTime;
                    gain.cancelScheduledValues(t);
                    gain.setValueAtTime(gain.value, t); // 現在値で固定
                    gain.linearRampToValueAtTime(originalVolume, t + 0.05); // 50msで復帰
                } else {
                    sound.setVolume(originalVolume);
                }
                sound._fadeActive = false;
                return; // 既に Playing 状態なので play() 不要
            }
            if (!sound.isPlaying) {
                // play する前に gain を originalVolume に確実にセット（前回 fade で 0 のままになっている）
                if (sound.volumeNode && sound.manager) {
                    const ctx = sound.manager.context;
                    sound.volumeNode.gain.cancelScheduledValues(ctx.currentTime);
                    sound.volumeNode.gain.setValueAtTime(originalVolume, ctx.currentTime);
                }
                sound.play();
            }
        }

        function gameOver(scene, message) {
            // 爆発時にjet音を停止
            if (jetSound.isPlaying) {
                jetSound.stop();
            }

            if (!explosionPlaying) {
                explosionPlaying = true;

                // 爆発アニメーションを作成して再生
                const explosion = scene.add.sprite(scene.spaceship.x, scene.spaceship.y, 'explosion');
                explosion.setDepth(10);
                explosion.play('explode');

                // 爆発音を再生
                scene.explosionSound.play();

                // ジェット噴射・粉塵パーティクルを停止
                scene.jetParticles.up.on = false;
                scene.jetParticles.down.on = false;
                scene.jetParticles.left.on = false;
                scene.jetParticles.right.on = false;
                scene.dustEmitters.forEach(e => e.on = false);

                // 宇宙船・影・ゲージを非表示にする
                scene.spaceship.setVisible(false);
                scene.spaceshipShadow.setVisible(false);
                scene.fuelGaugeBorder.setVisible(false);
                scene.fuelGauge.setVisible(false);

                explosion.on('animationcomplete', () => {
                    explosionPlaying = false;
                    explosion.destroy();
                });

                // ゲームオーバーメッセージ（messageが空ならテキスト表示なし）
                if (message) {
                    setTimeout(() => {
                        const failKeyMap = {
                            'Mission Failed': 'label_missionfailed',
                            'Rescue Failed': 'label_rescuefailed'
                        };
                        const failKey = failKeyMap[message] || 'label_missionfailed';
                        scene.add.image(scene.spaceship.x, scene.spaceship.y - 50, failKey).setOrigin(0.5, 0.5).setDepth(11).setScale((scene._labelDisplayScale || 0.25) * 1.6);
                    }, 1000);
                }

                // ゲームのアップデートを爆発アニメーションが終了してから停止する
                setTimeout(() => {
                    scene.scene.pause();
                }, 3000); // 3000ミリ秒（3秒）後に実行

                // setTimeout(() => {
                //     resetGame(scene);
                // }, 3000);

                gameStarted = false; // ゲームが開始されていない状態に戻す
                setTimeout(() => {
                    scene.scene.restart();
                }, 3000);

                // 爆発時にエンプティー音を停止
                if (scene.emptySound.isPlaying) {
                    scene.emptySound.stop();
                }

            }
        }

    </script>

    <div class="button-container">
        <div class="button-row">
            <div class="button" id="left">　◁　</div>
            <div class="button" id="right">　▷　</div>
            <div class="button" id="up">　△　</div>
            <div class="button" id="down">　▽　</div>
        </div>
    </div>
