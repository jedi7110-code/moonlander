                                                        scrollY: this.cameras.main.scrollY - 180,
                                                        duration: 1600,
                                                        ease: 'Cubic.easeOut',
                                                        onComplete: () => {
                                                            // カメラ停止後に「To be continued in next season...」表示 → Enterでタイトルへ
                                                            const camW = this.cameras.main.width;
                                                            const camH = this.cameras.main.height;
                                                            const toBeContinued = this.add.text(camW / 2, camH / 2, 'To be continued in next season...', {
                                                                fontSize: '32px',
                                                                fill: '#FFF',
                                                                fontStyle: 'italic'
                                                            }).setOrigin(0.5).setScrollFactor(0).setDepth(100).setAlpha(0);
                                                            const pressEnter = this.add.text(camW / 2, camH / 2 + 50, 'Press ENTER to return to title', {
                                                                fontSize: '18px',
                                                                fill: '#AAA'
                                                            }).setOrigin(0.5).setScrollFactor(0).setDepth(100).setAlpha(0);
                                                            this.tweens.add({
                                                                targets: [toBeContinued, pressEnter],
                                                                alpha: 1,
                                                                duration: 1500,
                                                                ease: 'Sine.easeIn',
                                                                onComplete: () => {
                                                                    this.input.keyboard.once('keydown-ENTER', () => {
                                                                        playthroughCount++;
                                                                        this.scene.restart();
                                                                    });
                                                                }
                                                            });
                                                        }
                                                    });
                                                }
                                            });

                                            this.tweens.add({
                                                targets: pod,
                                                y: pod.y - 1050,
                                                duration: 3000,
                                                ease: 'Cubic.easeIn',
                                                onComplete: () => {
                                                    pod.destroy();
                                                    nozzleTimer.remove();
                                                    nozzle.destroy();
                                                    if (this.escapeJetSound) fadeStopSound(this, this.escapeJetSound, 0.6, 300);
                                                }
                                            });
                                        });
                                    }
                                });
                                });
                            }
                        });
                    });
                }

                if (this.crewFollowing && this.crews.length) {
                    const yOffset = this.astronaut.displayHeight / 2;
                    const backDir = this.astronautFacing === 'left' ? 1 : (this.astronautFacing === 'right' ? -1 : -1);

                    this.crews.forEach((c, idx) => {
                        // 前走者：最初はプレイヤー、以降は一つ前の仲間
                        const leaderX = idx === 0 ? this.astronaut.x : this.crews[idx - 1].x;
                        const leaderFeetY = idx === 0 ? this.astronaut.y + yOffset : this.crews[idx - 1].y;
                        const targetX = leaderX + backDir * 13;
                        const prevX = c.x;
                        c.x = Phaser.Math.Linear(c.x, targetX, 0.06);
                        c.y = Phaser.Math.Linear(c.y, leaderFeetY, 0.12);
                        const dx = c.x - prevX;
                        if (dx < -0.15) c.setTexture('crew_L');
                        else if (dx > 0.15) c.setTexture('crew_R');
                        else if (!isMoving && onGround) c.setTexture('crew');
                    });
                }
                // 仲間の影は X方向に追従、可視状態も同期
                if (this.crews) this.crews.forEach(c => {
                    if (c.shadow) {
                        c.shadow.x = c.x;
                        c.shadow.setVisible(c.visible);
                    }
                });

                // カメラを宇宙飛行士に追従（ポッド打ち上げ中・捕獲後はスキップ）
                const cam = this.cameras.main;
                if (!this.cameraRising && !this.astronautGameOver) {
                    const currentX = cam.scrollX + cam.width / 2;
                    const currentY = cam.scrollY + cam.height / 2;
                    cam.centerOn(
                        Phaser.Math.Linear(currentX, this.astronaut.x, 0.04),
                        Phaser.Math.Linear(currentY, this.astronaut.y, 0.04)
                    );
                }

                // デブリは飛び続ける
                const camLeft = cam.worldView.left;
                const camRight = cam.worldView.right;
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;
                    const margin = debris.displayWidth;
                    if (debris.x > camRight + margin) {
                        debris.x = camLeft - margin;
                    } else if (debris.x < camLeft - margin) {
                        debris.x = camRight + margin;
                    }
                });
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.angle += debris.getData('rotationSpeed');
                });
                return;
            }

            if (!gameStarted) {
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);

                // タイトル/降下中もデブリは流れ続ける
                if (this.debrisGroup) {
                    const cam = this.cameras.main;
                    const camLeft = cam.worldView.left;
                    const camRight = cam.worldView.right;
                    this.debrisGroup.getChildren().forEach((debris) => {
                        debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;
                        const margin = debris.displayWidth;
                        if (debris.x > camRight + margin) {
                            debris.x = camLeft - margin;
                        } else if (debris.x < camLeft - margin) {
                            debris.x = camRight + margin;
                        }
                        debris.angle += debris.getData('rotationSpeed');
                    });
                }
                return;
            }

            if (gameStarted) {
                // 宇宙船の速度に基づいてカメラの位置を調整（パララックス効果）
                const maxCameraOffset = 100;
                const offsetX = Phaser.Math.Clamp(-this.spaceship.body.velocity.x / 50, -maxCameraOffset, maxCameraOffset);
                const offsetY = Phaser.Math.Clamp(-this.spaceship.body.velocity.y / 50, -maxCameraOffset, maxCameraOffset);

                // カメラの遅延追従（宇宙船が中心からズレ、カメラが遅れてついてくる）
                const targetX = this.spaceship.x + offsetX;
                const targetY = this.spaceship.y + offsetY;
                const cam = this.cameras.main;
                const currentX = cam.scrollX + cam.width / 2;
                const currentY = cam.scrollY + cam.height / 2;
                const lerpSpeed = 0.04;
                cam.centerOn(
                    Phaser.Math.Linear(currentX, targetX, lerpSpeed),
                    Phaser.Math.Linear(currentY, targetY, lerpSpeed)
                );

                // ズーム効果を設定
                const zoomSpeed = 0.0003 * delta;
                const lowerThirdBoundary = this.game.config.height * (2 / 3);
                let zoomTarget;

                if (this.spaceship.y > lowerThirdBoundary) {
                    zoomTarget = 1.8;
                } else {
                    zoomTarget = 0.8;
                }

                this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, zoomTarget, zoomSpeed));

                // 燃料ゲージを宇宙船の右側に追従させる
                const gaugeX = this.spaceship.x + 35;
                const gaugeY = this.spaceship.y - 25;
                const fuelRatio = this.fuel / 250;
                const fuelHeight = fuelRatio * 48;

                this.fuelGaugeBorder.setPosition(gaugeX, gaugeY);
                this.fuelGauge.clear().fillStyle(0xaf3035).fillRect(1, 1 + (48 - fuelHeight), 6, fuelHeight);
                this.fuelGauge.setPosition(gaugeX, gaugeY);

                
                // ジェット音の再生タイミング（フェードでプチノイズ防止）
                if (cursors.up.isDown || cursors.down.isDown || cursors.left.isDown || cursors.right.isDown) {
                    startSoundCancelFade(jetSound, 0.5);
                } else {
                    fadeStopSound(this, jetSound, 0.5);
                }

                // 燃料を消費
                if ((this.input.keyboard.createCursorKeys().up.isDown ||
                    this.input.keyboard.createCursorKeys().down.isDown ||
                    this.input.keyboard.createCursorKeys().left.isDown ||
                    this.input.keyboard.createCursorKeys().right.isDown) && this.fuel > 0) {
                    this.fuel -= 1;
                }

                // 燃料がなくなったら操作を無効にする
                if (this.fuel <= 0) {
                    this.cursors.up.isDown = false;
                    this.cursors.down.isDown = false;
                    this.cursors.left.isDown = false;
                    this.cursors.right.isDown = false;
                }

                // 燃料が90以下になったら点滅させる
                if (this.fuel <= 90) {
                    const blinkColor = (Math.floor(Date.now() / 400) % 2) === 0 ? 0xaf3035 : 0xffe8f1;
                    const blinkFuelHeight = (this.fuel / 250) * 48;
                    this.fuelGauge.clear().fillStyle(blinkColor).fillRect(1, 1 + (48 - blinkFuelHeight), 6, blinkFuelHeight);

                    // 燃料が90以下でサウンドが再生されていない場合、emptysoundを再生
                    if (!this.emptySound.isPlaying) {
                        this.emptySound.play();
                    }
                }

                if (this.cursors.up.isDown) {
                    this.spaceship.setAccelerationY(-500);
                } else if (this.cursors.down.isDown) {
                    this.spaceship.setAccelerationY(500);
                } else {
                    this.spaceship.setAccelerationY(0);
                }

                if (this.cursors.left.isDown) {
                    this.spaceship.setAccelerationX(-500);
                    this.spaceship.angle = Math.max(this.spaceship.angle - 2, -35); // 左へ最大35度傾ける
                } else if (this.cursors.right.isDown) {
                    this.spaceship.setAccelerationX(500);
                    this.spaceship.angle = Math.min(this.spaceship.angle + 2, 35); // 右へ最大35度傾ける
                } else {
                    this.spaceship.setAccelerationX(0);
                    // 宇宙船の角度を徐々に0度に戻す
                    if (this.spaceship.angle < 0) {
                        this.spaceship.angle = Math.min(this.spaceship.angle + 2, 0);
                    } else if (this.spaceship.angle > 0) {
                        this.spaceship.angle = Math.max(this.spaceship.angle - 2, 0);
                    }
                }

                // ジェット噴射パーティクルの位置更新とon/off
                const sx = this.spaceship.x;
                const sy = this.spaceship.y;
                const hasFuel = this.fuel > 0;

                this.jetParticles.up.setPosition(sx, sy + 25);
                this.jetParticles.down.setPosition(sx, sy - 25);
                this.jetParticles.left.setPosition(sx + 25, sy);
                this.jetParticles.right.setPosition(sx - 25, sy);

                this.jetParticles.up.on = this.cursors.up.isDown && hasFuel;
                this.jetParticles.down.on = this.cursors.down.isDown && hasFuel;
                this.jetParticles.left.on = this.cursors.left.isDown && hasFuel;
                this.jetParticles.right.on = this.cursors.right.isDown && hasFuel;

                // 宇宙船の影の位置を更新（宇宙船の真下、地面の高さ）
                this.spaceshipShadow.x = this.spaceship.x;
                this.spaceshipShadow.y = this.moon.y + 58;

                // ゴールエリアからの高さを計算
                const heightAboveGoal = Math.max(this.spaceship.y - (this.moon.y - 260), 0);

                // 透明度を計算（高さに応じて0〜1の範囲）
                const shadowAlpha = heightAboveGoal / 260;
                this.spaceshipShadow.alpha = shadowAlpha;

                // 影のサイズを計算（高さに応じて50〜100の範囲）
                const shadowSize = 110 - (heightAboveGoal / 4.6);
                this.spaceshipShadow.displayWidth = shadowSize;
                this.spaceshipShadow.displayHeight = shadowSize;

                // 地面に近い＋ジェット噴射中の時だけ粉塵を左右に舞い上がらせる
                const groundDistance = (this.game.config.height - 63) - (this.spaceship.y + 25);
                const isThrusting = this.cursors.up.isDown || this.cursors.down.isDown || this.cursors.left.isDown || this.cursors.right.isDown;
                if (groundDistance < 150 && groundDistance > 0 && isThrusting && this.fuel > 0) {
                    const dustY = this.game.config.height - 65;
                    const intensity = 1 - (groundDistance / 150); // 0(遠い)〜1(地面すれすれ)
                    const freq = Math.max(5, 30 - intensity * 25);
                    const qty = Math.ceil(1 + intensity * 3);
                    const spd = 30 + intensity * 80;

                    const offsets = [-8, -3, 3, 8];
                    this.dustEmitters.forEach((e, i) => {
                        e.setPosition(this.spaceship.x + offsets[i], dustY);
                        e.on = true;
                        e.setFrequency(freq);
                        e.setQuantity(qty);
                        e.setSpeed({ min: spd * 0.5, max: spd });
                    });
                } else {
                    this.dustEmitters.forEach(e => e.on = false);
                }
            }

            // 着陸エリアに接触した時にクリア
            const landingZone = new Phaser.Geom.Rectangle(
                this.moon.x - this.moon.displayWidth / 2,
                this.moon.y + this.moon.displayHeight / 2 - 5 + 5,
                this.moon.displayWidth,
                5
            );

            // ターゲットマークの色フェード（ゴール上空に近づくほど緑→オレンジ）
            const inGoalX = Math.abs(this.spaceship.x - this.moon.x) < this.moon.displayWidth / 2;
            const distY = this.moon.y - this.spaceship.y;
            let markerT = 0; // 0=緑, 1=オレンジ
            if (inGoalX && distY < 300 && distY > 0) {
                markerT = 1 - (distY / 300); // 近いほど1に
            } else if (inGoalX && distY <= 0) {
                markerT = 1;
            }
            // 緑(0x00ff00)→オレンジ(0xff8800)を補間
            const r = Math.round(0x00 + (0xff - 0x00) * markerT);
            const g = Math.round(0xff + (0x88 - 0xff) * markerT);
            const b = Math.round(0x00 + (0x00 - 0x00) * markerT);
            const newColor = (r << 16) | (g << 8) | b;
            if (newColor !== this.currentMarkerColor) {
                this.currentMarkerColor = newColor;
                this.drawLandingMarker(newColor);
            }

            const isLevel = Math.abs(this.spaceship.angle) <= 5; // 水平から±5度以内
            const speed = Math.sqrt(
                this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
            );
            const isSlow = speed < 80; // ゆっくり降下中のみ

            if (isLevel && isSlow && Phaser.Geom.Intersects.RectangleToRectangle(this.spaceship.getBounds(), landingZone)) {
                // コトンと着地：即座に停止して接地感を出す
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);
                this.spaceship.angle = 0;

                this.goalSound.play();

                // ゴール時にjet音を停止（フェード）
                fadeStopSound(this, jetSound, 0.5);

                // エンプティー音を停止
                if (this.emptySound.isPlaying) {
                    this.emptySound.stop();
                }

                // ジェット噴射・粉塵パーティクルを停止
                this.jetParticles.up.on = false;
                this.jetParticles.down.on = false;
                this.jetParticles.left.on = false;
                this.jetParticles.right.on = false;
                this.dustEmitters.forEach(e => e.on = false);

                // 燃料ゲージ・ターゲットマーク・デブリを非表示
                this.fuelGaugeBorder.setVisible(false);
                this.fuelGauge.setVisible(false);
                this.landingMarker.setVisible(false);
                this.debrisGroup.getChildren().forEach(d => d.setVisible(false));

                gameStarted = false; // 操作を無効化

                // ハシゴが出てきて、宇宙飛行士が降りてくる演出
                this.time.delayedCall(1000, () => {
                    // ハシゴを描画（宇宙船の下から伸びる）
                    const ladderX = this.spaceship.x - 5;
                    const ladderTop = this.spaceship.y + 20;
                    const ladderBottom = this.spaceship.y + 45;
                    const ladder = this.add.graphics({ lineStyle: { width: 1, color: 0xcccccc } });
                    ladder.setDepth(7);

                    // ハシゴが出てくるタイミングで、宇宙船の足元（ハシゴ付近）にカメラをパン＋ズーム
                    const targetPanX = this.spaceship.x;
                    const targetPanY = this.spaceship.y + 30; // ハシゴ中央あたり
                    this.cameras.main.pan(targetPanX, targetPanY, 1500, 'Sine.easeInOut');
                    this.cameras.main.zoomTo(4.0, 1500, 'Sine.easeInOut');

                    // ハシゴがスッと伸びるアニメーション
                    let ladderProgress = 0;
                    const ladderTween = this.tweens.addCounter({
                        from: 0,
                        to: 1,
                        duration: 800,
                        ease: 'Sine.easeOut',
                        onUpdate: (tween) => {
                            ladderProgress = tween.getValue();
                            const currentBottom = ladderTop + (ladderBottom - ladderTop) * ladderProgress;
                            ladder.clear();
                            ladder.lineStyle(1, 0xcccccc);
                            // 2本の縦線
                            ladder.lineBetween(ladderX - 3, ladderTop, ladderX - 3, currentBottom);
                            ladder.lineBetween(ladderX + 3, ladderTop, ladderX + 3, currentBottom);
                            // 横棒（3本）
                            const steps = 7;
                            for (let s = 0; s <= steps; s++) {
                                const stepY = ladderTop + (currentBottom - ladderTop) * (s / steps);
                                if (stepY <= currentBottom) {
                                    ladder.lineBetween(ladderX - 3, stepY, ladderX + 3, stepY);
                                }
                            }
                        },
                        onComplete: () => {
                            // ハシゴが伸びきったら宇宙飛行士が降りてくる（後ろ向き）
                            const astronaut = this.add.sprite(
                                ladderX,
                                ladderTop,
                                'spaceman_B'
                            );
                            // 元画像は 725x904（縦長、アスペクト比 ~0.8）。アスペクト維持
                            astronaut.setDisplaySize(15, 19);
                            astronaut.setDepth(8);

                            this.tweens.add({
                                targets: astronaut,
                                y: ladderBottom + 5,
                                duration: 1500,
                                ease: 'Sine.easeInOut',
                                onComplete: () => {
                                    // 故障車の方向を先に決める。振り向きは車と逆方向（自然な視線の動き）
                                    const carDirEarly = Phaser.Math.Between(0, 1) ? 1 : -1;
                                    this.astronautCarDir = carDirEarly;
                                    this.astronautTurnDir = carDirEarly > 0 ? 'L' : 'R';
                                    // 降りきったら振り向いて正面を向く（方向に応じてR/L版）
                                    astronaut.setFlipX(false);
                                    astronaut.anims.play('astronaut_turn_to_front_' + this.astronautTurnDir);
                                    // そのまま操作可能にする（物理不要、手動制御）
                                    this.astronaut = astronaut;
                                    this.astronautGroundY = astronaut.y; // 地面のY座標を記憶
                                    // 足元の影（地面固定、ジャンプしても影は動かない）
                                    astronaut.shadow = createGroundShadow(this, astronaut.x, astronaut.y + astronaut.displayHeight / 2, 14);
                                    // 移動範囲を背景画像内にクランプ（ズーム2.7での可視域を背景内に収める）
                                    const bgTex = this.textures.get('background').getSourceImage();
                                    const bgCenterX = this.scale.width / 2;
                                    const camHalfW = this.scale.width / 2.7 / 2;
                                    this.astronautMinX = (bgCenterX - bgTex.width / 2) + camHalfW;
                                    this.astronautMaxX = (bgCenterX + bgTex.width / 2) - camHalfW;
                                    // 仮：移動限界の外側に2001モノリス（立体感あり）
                                    const monoY = this.astronautGroundY + this.astronaut.displayHeight / 2;
                                    const monoW = 20;
                                    const monoH = 140;
                                    const depthX = 6;
                                    const depthY = -4;
                                    const gap = monoW / 2 + this.astronaut.displayWidth / 2;
                                    [
                                        { x: this.astronautMinX - gap, innerDir: 1 },
                                        { x: this.astronautMaxX + gap, innerDir: -1 }
                                    ].forEach(p => {
                                        const g = this.add.graphics();
                                        g.setDepth(7);
                                        const topY = monoY - monoH;
                                        const innerX = p.x + p.innerDir * monoW / 2;
                                        // 側面（プレイヤー側に見える面・わずかに明るく）
                                        g.fillStyle(0x2a2a2a);
                                        g.beginPath();
                                        g.moveTo(innerX, topY);
                                        g.lineTo(innerX + p.innerDir * depthX, topY + depthY);
                                        g.lineTo(innerX + p.innerDir * depthX, monoY + depthY);
                                        g.lineTo(innerX, monoY);
                                        g.closePath();
                                        g.fillPath();
                                        // 前面
                                        g.fillStyle(0x000000);
                                        g.fillRect(p.x - monoW / 2, topY, monoW, monoH);
                                        // アウトライン
                                        g.lineStyle(1, 0x111111);
                                        g.strokeRect(p.x - monoW / 2, topY, monoW, monoH);
                                    });
                                    this.astronautVY = 0; // 縦方向の速度
                                    this.astronautFacing = null; // 向き（左右移動後に確定、未確定時は発射不可）
                                    this.lasers = []; // 発射中のレーザー
                                    this.beamEnergy = 100; // ビーム残量（0-100）
                                    this.enemies = []; // 地底人
                                    this.enemyKills = 0;
                                    this.bossesDue = 0;
                                    this.astronautGameOver = false;

                                    // ビーム残量ゲージ（宇宙飛行士上部に追従、小さめ＆コントラスト色）
                                    this.beamGaugeBg = this.add.rectangle(0, 0, 10, 1, 0x000000).setDepth(11);
                                    this.beamGaugeFill = this.add.rectangle(0, 0, 10, 1, 0x00ffcc).setDepth(12);

                                    // 大破した月面探査車（振り向き方向の逆側に配置）
                                    const carDir = this.astronautCarDir;
                                    const carX = astronaut.x + carDir * Phaser.Math.Between(800, 1200);
                                    const carFeetY = astronaut.y + astronaut.displayHeight / 2;
                                    this.moonCar = this.add.image(carX, carFeetY, 'mooncar');
                                    this.moonCar.setOrigin(0.5, 1);
                                    this.moonCar.setDisplaySize(120, 60);
                                    this.moonCar.setDepth(6);

                                    // 仲間の状態管理（2人救出）
                                    this.crewFound = false;
                                    this.crewFollowing = false;
                                    this.crews = []; // 仲間スプライト配列

                                    // 地面マスク（地面より上だけ表示。出現・引きずり込みに使用）
                                    this.groundFeetY = this.astronautGroundY + this.astronaut.displayHeight / 2;
                                    const maskGfx = this.make.graphics();
                                    maskGfx.fillStyle(0xffffff);
                                    maskGfx.fillRect(-2000, -2000, 6000, this.groundFeetY + 2000);
                                    this.groundMask = maskGfx.createGeometryMask();

                                    // 地底人スポーン（地面から頭→体→足の順で這い出す）
                                    this.spawnEnemy = () => {
                                        if (this.astronautGameOver || !this.astronautMode || this.enemiesRetreating) return;
                                        const side = Phaser.Math.Between(0, 1) ? -1 : 1;
                                        const distance = Phaser.Math.Between(160, 360);
                                        const spawnX = this.astronaut.x + side * distance;
                                        const isBoss = this.bossesDue > 0;
                                        if (isBoss) this.bossesDue--;
                                        const dirFace = spawnX < this.astronaut.x ? 'R' : 'L';
                                        const initTex = (isBoss ? 'boss_' : 'alien_') + dirFace;
                                        const enemyH = isBoss ? 40 : 24;
                                        const enemy = this.add.image(spawnX, this.groundFeetY + enemyH, initTex);
                                        enemy.setOrigin(0.5, 1);
                                        if (isBoss) {
                                            enemy.setDisplaySize(40, 40);
                                            enemy.hp = 10;
                                        } else {
                                            enemy.setDisplaySize(12, 24);
                                            enemy.hp = 3;
                                        }
                                        enemy.isBoss = isBoss;
                                        enemy.setDepth(8);
                                        enemy.setMask(this.groundMask);
                                        enemy.emerging = true;
                                        // 影：地中から出てくる瞬間から地面に表示（敵が地上に出てくる予兆）
                                        enemy.shadow = createGroundShadow(this, enemy.x, this.groundFeetY, isBoss ? 36 : 12);
                                        this.tweens.add({
                                            targets: enemy,
                                            y: this.groundFeetY,
                                            duration: 900,
                                            ease: 'Sine.easeOut',
                                            onComplete: () => {
                                                enemy.emerging = false;
                                                enemy.clearMask();
                                            }
                                        });
                                        this.enemies.push(enemy);
                                        this.time.delayedCall(Phaser.Math.Between(700, 1800), this.spawnEnemy);
                                    };
                                    this.time.delayedCall(1500, this.spawnEnemy);

                                    this.astronautMode = true; // 宇宙飛行士操作モード
                                    this.astronautHasMoved = false; // 初回移動で通常ズームへ切り替え
                                    // ズームはハシゴが伸び始める時から既に進行中

                                    // 大破車の方向を >>> で表示（2回繰り返し）
                                    if (this.moonCar) {
                                        const arrow = this.moonCar.x > astronaut.x ? '>' : '<';
                                        const arrows = [arrow, arrow + arrow, arrow + arrow + arrow];
                                        let step = 0;
                                        const showArrow = () => {
                                            if (step >= 6) return; // 3段階 × 2回
                                            const txt = arrows[step % 3];
                                            const offsetX = (this.moonCar.x > astronaut.x ? 1 : -1) * 25;
                                            const isRight = this.moonCar.x > astronaut.x;
                                            const originX = isRight ? 0 : 1; // 右向き=左揃え、左向き=右揃え
                                            const a = this.add.text(
                                                astronaut.x + offsetX, astronaut.y - 15,
                                                txt, { fontSize: '8px', fill: '#88ffaa', fontFamily: 'monospace' }
                                            ).setOrigin(originX, 0.5).setDepth(12).setAlpha(0);
                                            this.tweens.add({
                                                targets: a,
                                                alpha: 1,
                                                duration: 200,
                                                yoyo: true,
                                                hold: 150,
                                                onComplete: () => {
                                                    a.destroy();
                                                    step++;
                                                    showArrow();
                                                }
                                            });
                                        };
                                        this.time.delayedCall(1500, showArrow);
                                    }
                                }
                            });
                        }
                    });
                });
            } else {
                this.goalTimer = 0; // 触れていない場合、タイマーをリセットする
            }

            // 宇宙船が地面に達したかどうかを確認（ゴール成功時は除外）
            if (gameStarted && this.spaceship.y + this.spaceship.displayHeight / 2 >= this.game.config.height - 63) {
                const groundSpeed = Math.sqrt(
                    this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                    this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
                );
                const groundLevel = Math.abs(this.spaceship.angle) <= 5;

                if (groundLevel && groundSpeed < 80) {
                    // ゆっくり水平着地：爆発せずコトンと停止、ミッション失敗
                    this.spaceship.setVelocity(0);
                    this.spaceship.setAcceleration(0);
                    this.spaceship.setGravityY(0);
                    this.spaceship.angle = 0;

                    fadeStopSound(this, jetSound, 0.5);
                    if (this.emptySound.isPlaying) { this.emptySound.stop(); }
                    this.jetParticles.up.on = false;
                    this.jetParticles.down.on = false;
                    this.jetParticles.left.on = false;
                    this.jetParticles.right.on = false;
                    this.dustEmitters.forEach(e => e.on = false);

                    this.add.text(this.spaceship.x, this.spaceship.y - 50, 'Mission Failed', { fontSize: '32px', fill: '#FFF' }).setOrigin(0.5, 0.5).setDepth(11);
                    this.endSound.play();
                    gameStarted = false;

                    this.time.delayedCall(3000, () => {
                        restartGame(this);
                    });
                } else {
                    // 速すぎるor傾いている：爆発
                    gameOver(this, 'Mission Failed');
                }
            }

            // デブリの移動
            const cam = this.cameras.main;
            const camLeft = cam.worldView.left;
            const camRight = cam.worldView.right;
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;

                // カメラの表示範囲の端から端へ折り返す
                const margin = debris.displayWidth;
                if (debris.x > camRight + margin) {
                    debris.x = camLeft - margin;
                } else if (debris.x < camLeft - margin) {
                    debris.x = camRight + margin;
                }
            });

            // デブリの回転
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.angle += debris.getData('rotationSpeed');
            });

            // 宇宙船とデブリとの衝突をチェック
            this.physics.overlap(this.spaceship, this.debrisGroup, () => {
                gameOver(this, 'Craaaash!');
            });

        }

        let explosionPlaying = false;

        // 地上キャラクターの影（多層楕円で疑似ブラー）。深度 6.5 (moon car 6 と crews 7 の間)
        function createGroundShadow(scene, x, footY, width) {
            const g = scene.add.graphics();
            // 外側ほど薄く広く（ぼかし表現）
            g.fillStyle(0x000000, 0.04);
            g.fillEllipse(0, 0, width * 1.5, 4.5);
            g.fillStyle(0x000000, 0.06);
            g.fillEllipse(0, 0, width * 1.2, 3.6);
            g.fillStyle(0x000000, 0.08);
            g.fillEllipse(0, 0, width, 3);
            g.x = x;
            g.y = footY + 1;
            g.setDepth(6.5);
            return g;
        }

        // プチノイズ防止：Web Audio API の setTargetAtTime で指数関数的なエンベロープ減衰
        // 終端に向かって変化速度がゼロに漸近するためクリックが原理的に出ない
        // 重要：fade完了後 gain は 0 のまま放置（瞬時ジャンプを作らない）。次回 play 前に復元。
        function fadeStopSound(scene, sound, originalVolume, duration = 250) {
            if (!sound || !sound.isPlaying) return;
            if (sound._fadeActive) return; // 二重フェード防止

            if (sound.volumeNode && sound.manager && sound.manager.context) {
                const ctx = sound.manager.context;
                const gain = sound.volumeNode.gain;
                const t = ctx.currentTime;
                const timeConstant = duration / 5000; // 5τ で gain≈0.7% (約-43dB) まで減衰
                gain.cancelScheduledValues(t);
                gain.setValueAtTime(gain.value, t);
                gain.setTargetAtTime(0, t, timeConstant);
                sound._fadeActive = true;
                sound._fadeTimer = scene.time.delayedCall(duration + 30, () => {
                    // この時点で gain は -43dB 以下（実質無音）。stop() しても聴感上クリックなし
                    sound.stop();
                    sound._fadeActive = false;
                    sound._fadeTimer = null;
                });
            } else {
                // フォールバック (HTML5 Audio)
                sound._fadeActive = true;
                sound._fadeTween = scene.tweens.add({
                    targets: sound,
                    volume: 0,
                    duration: duration,
                    onComplete: () => {
                        sound.stop();
                        sound.setVolume(originalVolume);
                        sound._fadeActive = false;
                        sound._fadeTween = null;
                    }
                });
            }
        }

        // 再生開始：fade中ならキャンセルして短い ramp で復帰、停止中なら gain を復元してから play
        function startSoundCancelFade(sound, originalVolume) {
            if (sound._fadeActive) {
                if (sound._fadeTimer) { sound._fadeTimer.remove(); sound._fadeTimer = null; }
                if (sound._fadeTween) { sound._fadeTween.stop(); sound._fadeTween = null; }
                if (sound.volumeNode && sound.manager) {
                    const ctx = sound.manager.context;
                    const gain = sound.volumeNode.gain;
                    const t = ctx.currentTime;
                    gain.cancelScheduledValues(t);
                    gain.setValueAtTime(gain.value, t); // 現在値で固定
                    gain.linearRampToValueAtTime(originalVolume, t + 0.05); // 50msで復帰
                } else {
                    sound.setVolume(originalVolume);
                }
                sound._fadeActive = false;
                return; // 既に Playing 状態なので play() 不要
            }
            if (!sound.isPlaying) {
                // play する前に gain を originalVolume に確実にセット（前回 fade で 0 のままになっている）
                if (sound.volumeNode && sound.manager) {
                    const ctx = sound.manager.context;
                    sound.volumeNode.gain.cancelScheduledValues(ctx.currentTime);
                    sound.volumeNode.gain.setValueAtTime(originalVolume, ctx.currentTime);
                }
                sound.play();
            }
        }

        function gameOver(scene, message) {
            // 爆発時にjet音を停止
            if (jetSound.isPlaying) {
                jetSound.stop();
            }

            if (!explosionPlaying) {
                explosionPlaying = true;

                // 爆発アニメーションを作成して再生
                const explosion = scene.add.sprite(scene.spaceship.x, scene.spaceship.y, 'explosion');
                explosion.setDepth(10);
                explosion.play('explode');

                // 爆発音を再生
                scene.explosionSound.play();

                // ジェット噴射・粉塵パーティクルを停止
                scene.jetParticles.up.on = false;
                scene.jetParticles.down.on = false;
                scene.jetParticles.left.on = false;
                scene.jetParticles.right.on = false;
                scene.dustEmitters.forEach(e => e.on = false);

                // 宇宙船・影・ゲージを非表示にする
                scene.spaceship.setVisible(false);
                scene.spaceshipShadow.setVisible(false);
                scene.fuelGaugeBorder.setVisible(false);
                scene.fuelGauge.setVisible(false);

                explosion.on('animationcomplete', () => {
                    explosionPlaying = false;
                    explosion.destroy();
                });

                // ゲームオーバーメッセージを2秒遅らせて表示する
                setTimeout(() => {
                    scene.add.text(scene.spaceship.x, scene.spaceship.y - 50, message, { fontSize: '32px', fill: '#FFF' }).setOrigin(0.5, 0.5).setDepth(11);
                }, 1000); // 2000ミリ秒（2秒）後に実行

                // ゲームのアップデートを爆発アニメーションが終了してから停止する
                setTimeout(() => {
                    scene.scene.pause();
                }, 3000); // 3000ミリ秒（3秒）後に実行

                // setTimeout(() => {
                //     resetGame(scene);
                // }, 3000);

                gameStarted = false; // ゲームが開始されていない状態に戻す
                setTimeout(() => {
                    scene.scene.restart();
                }, 3000);

                // 爆発時にエンプティー音を停止
                if (scene.emptySound.isPlaying) {
                    scene.emptySound.stop();
                }

            }
        }

    </script>

    <div class="button-container">
        <div class="button-row">
            <div class="button" id="left">　◁　</div>
            <div class="button" id="right">　▷　</div>
            <div class="button" id="up">　△　</div>
            <div class="button" id="down">　▽　</div>
        </div>
    </div>

</body>
