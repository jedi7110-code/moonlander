    <meta property="og:type" content="product" />
    <meta property="og:title" content="Moonlander" />
    <meta property="og:description" content="月面に現れた謎の人工物の探査チームからの消息が途絶えた。月面下で未知の脅威が目覚める。生還を賭けた救出作戦。" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Moonlander">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <!-- ブリーフィング用 日本語フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="style.css?v=39">
    <script src="//cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<body oncontextmenu='return false;' oncopy='return false;'>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MG86NXDS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- 8bit/CRT風エフェクト用SVGフィルタ（posterize + 2段ブルーム） -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <filter id="crt-8bit" color-interpolation-filters="sRGB">
            <feComponentTransfer in="SourceGraphic" result="posterized">
                <feFuncR type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncG type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncB type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
            </feComponentTransfer>
            <!-- 明部抽出（かなり明るい部分のみ残す） -->
            <feColorMatrix in="posterized" type="matrix" values="
                1.8 0 0 0 -0.95
                0 1.8 0 0 -0.95
                0 0 1.8 0 -0.95
                0 0 0 1 0" result="bright"/>
            <!-- 近距離ブルーム（シャープな発光コア） -->
            <feGaussianBlur in="bright" stdDeviation="1" result="blurNear"/>
            <!-- 遠距離ハレーション（広がる柔らかい光） -->
            <feGaussianBlur in="bright" stdDeviation="6" result="blurFar"/>
            <!-- ハレーションを加算（8%） -->
            <feComposite in="blurFar" in2="posterized" operator="arithmetic" k1="0" k2="0.08" k3="1" k4="0" result="step1"/>
            <!-- 近距離ブルームを加算（12%） -->
            <feComposite in="blurNear" in2="step1" operator="arithmetic" k1="0" k2="0.12" k3="1" k4="0"/>
        </filter>
    </svg>

    <div id="game-container">
        <div class="crt-overlay crt-subpixel"></div>
        <div class="crt-overlay crt-scanlines"></div>
        <!-- ローディング画面：ゲーム枠内 / opening-title.jpg をモニター背景に表示 -->
        <div id="loading-screen">
            <div class="loading-frame">
                <div class="loading-frame-bg"></div>
                <div class="loading-frame-side l"></div>
                <div class="loading-frame-side r"></div>
                <div class="loading-frame-arm tl"></div>
                <div class="loading-frame-arm tr"></div>
                <div class="loading-frame-arm bl"></div>
                <div class="loading-frame-arm br"></div>
                <div class="loading-text">LOADING</div>
                <div class="loading-gauge"><div class="loading-gauge-fill"></div></div>
            </div>
            <div class="title-screen">
                <img class="title-image" src="assets/title-green.png" alt="Moonlander">
                <div class="title-press">PRESS ENTER</div>
            </div>
            <!-- ミッションブリーフィング（タイトル前に表示。ENTERでスキップ） -->
            <div class="briefing-screen">
                <pre class="briefing-text"></pre>
                <div class="briefing-foot">
                    <div class="briefing-lang">[ J / E ]</div>
                    <div class="briefing-skip">[ PRESS ENTER ]</div>
                </div>
            </div>
        </div>
        <!-- 死亡後のリスタート待機プロンプト -->
        <div id="restart-prompt">PRESS ENTER TO RESTART</div>
        <!-- スタート時の黒フェード切替 -->
        <div id="fade-overlay"></div>
    </div>

    <!-- 捕獲時のグリッチ用：ブラウザ最前面の WebGL オーバーレイ -->
    <canvas id="glitch-overlay"></canvas>

    <script type="module" src="js/main.js?v=9"></script>

    <!-- 横画面スマホ用オンスクリーンコントロール -->
    <div class="touch-controls" id="touch-controls">
        <div class="touch-dpad">
            <button class="touch-btn dpad-up"    id="btn-up"   data-key="ArrowUp">▲</button>
            <button class="touch-btn dpad-left"  id="btn-left" data-key="ArrowLeft">◀</button>
            <button class="touch-btn dpad-right" id="btn-right" data-key="ArrowRight">▶</button>
            <button class="touch-btn dpad-down"  id="btn-down" data-key="ArrowDown">▼</button>
        </div>
        <div class="touch-actions">
            <button class="touch-btn act-beam" id="btn-beam" data-key="Space">BEAM</button>
            <button class="touch-btn act-jump" id="btn-jump" data-key="ArrowUp">JUMP</button>
        </div>
    </div>

</body>

</html>
