<!DOCTYPE html>
<html>

<head prefix="og:http://ogp.me/ns#">
    <title>Moonlander</title>
    <meta name="description" content="20XX年、月面探査クルーからの消息が途絶えた。月面下で、未知の脅威が目覚める。生還を賭けた、たった一人の救出作戦。">
    <meta charset="utf-8">
    <meta property="og:type" content="product" />
    <meta property="og:title" content="Moonlander" />
    <meta property="og:description" content="20XX年、月面探査クルーからの消息が途絶えた。月面下で、未知の脅威が目覚める。生還を賭けた、たった一人の救出作戦。" />
    <meta property="og:site_name" content="Moonlander" />
    <link rel="icon" href="assets/favi.ico">
    <link rel="stylesheet" href="style.css?v=15">
    <script src="//cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
</head>

<body oncontextmenu='return false;' oncopy='return false;'>

    <!-- ローディング画面：>>> と同じ緑ブラケット枠＋ゲージ -->
    <div id="loading-screen">
        <div class="loading-frame">
            <div class="loading-frame-bg"></div>
            <div class="loading-frame-side l"></div>
            <div class="loading-frame-side r"></div>
            <div class="loading-frame-arm tl"></div>
            <div class="loading-frame-arm tr"></div>
            <div class="loading-frame-arm bl"></div>
            <div class="loading-frame-arm br"></div>
            <div class="loading-text">LOADING</div>
            <div class="loading-gauge"><div class="loading-gauge-fill"></div></div>
        </div>
    </div>

    <!-- 8bit/CRT風エフェクト用SVGフィルタ（posterize + 2段ブルーム） -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <filter id="crt-8bit" color-interpolation-filters="sRGB">
            <feComponentTransfer in="SourceGraphic" result="posterized">
                <feFuncR type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncG type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncB type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
            </feComponentTransfer>
            <!-- 明部抽出（かなり明るい部分のみ残す） -->
            <feColorMatrix in="posterized" type="matrix" values="
                1.8 0 0 0 -0.95
                0 1.8 0 0 -0.95
                0 0 1.8 0 -0.95
                0 0 0 1 0" result="bright"/>
            <!-- 近距離ブルーム（シャープな発光コア） -->
            <feGaussianBlur in="bright" stdDeviation="1" result="blurNear"/>
            <!-- 遠距離ハレーション（広がる柔らかい光） -->
            <feGaussianBlur in="bright" stdDeviation="6" result="blurFar"/>
            <!-- ハレーションを加算（8%） -->
            <feComposite in="blurFar" in2="posterized" operator="arithmetic" k1="0" k2="0.08" k3="1" k4="0" result="step1"/>
            <!-- 近距離ブルームを加算（12%） -->
            <feComposite in="blurNear" in2="step1" operator="arithmetic" k1="0" k2="0.12" k3="1" k4="0"/>
        </filter>
    </svg>

    <div id="game-container">
        <div class="crt-overlay crt-subpixel"></div>
        <div class="crt-overlay crt-scanlines"></div>
    </div>

    <!-- 捕獲時のグリッチ用：ブラウザ最前面の WebGL オーバーレイ -->
    <canvas id="glitch-overlay"></canvas>

    <script>
        // 8bitエフェクト用PostFXパイプライン（ピクセル化・減色・スキャンライン）
        const PixelArtPipeline = new Phaser.Class({
            Extends: Phaser.Renderer.WebGL.Pipelines.PostFXPipeline,
            initialize: function PixelArtPipeline(game) {
                Phaser.Renderer.WebGL.Pipelines.PostFXPipeline.call(this, {
                    game: game,
                    renderTarget: true,
                    fragShader: [
                        'precision mediump float;',
                        'uniform sampler2D uMainSampler;',
                        'uniform vec2 uResolution;',
                        'varying vec2 outTexCoord;',
                        'void main() {',
                        '  float pixelSize = 2.0;',
                        '  vec2 px = pixelSize / uResolution;',
                        '  vec2 coord = floor(outTexCoord / px) * px + px * 0.5;',
                        '  vec4 color = texture2D(uMainSampler, coord);',
                        '  float levels = 32.0;',
                        '  color.rgb = floor(color.rgb * levels) / (levels - 1.0);',
                        '  float scan = mod(gl_FragCoord.y, 3.0) < 1.0 ? 0.82 : 1.0;',
                        '  color.rgb *= scan;',
                        '  gl_FragColor = color;',
                        '}'
                    ].join('\n')
                });
            },
            onPreRender: function () {
                this.set2f('uResolution', this.renderer.width, this.renderer.height);
            }
        });

        const config = {
            type: Phaser.WEBGL,
            width: 1400,
            height: 900,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 80 }, // 重力を強く設定
                    debug: false
                }
            },
            pipeline: { 'PixelArt': PixelArtPipeline },
            parent: 'game-container',
            loader: {
                maxParallelDownloads: 100  // ローダーのパラレルダウンロード上限を上げる（Phaser 3.55の停止対策）
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        window.__game = game;

        // ===== 捕獲時グリッチ用のフルスクリーン WebGL オーバーレイ =====
        // ykob/sketch-threejs glitch.html (CodePen GmEzoQ) のシェーダーをそのまま使用
        const GlitchOverlay = (() => {
            let initialized = false;
            let renderer, sceneG, cameraG, uniforms, tex, mesh, rafId = null;
            const overlay = document.getElementById('glitch-overlay');

            const fragmentShader = `
                precision highp float;
                uniform float time;
                uniform vec2 resolution;
                uniform vec2 imageResolution;
                uniform sampler2D tex;
                uniform float strength;
                uniform float darken;
                varying vec2 vUv;

                float random(vec2 c){ return fract(sin(dot(c.xy ,vec2(12.9898,78.233))) * 43758.5453); }
                vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
                vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
                vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
                vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
                float snoise3(vec3 v){
                    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                    vec3 i  = floor(v + dot(v, C.yyy));
                    vec3 x0 = v - i + dot(i, C.xxx);
                    vec3 g = step(x0.yzx, x0.xyz);
                    vec3 l = 1.0 - g;
                    vec3 i1 = min(g.xyz, l.zxy);
                    vec3 i2 = max(g.xyz, l.zxy);
                    vec3 x1 = x0 - i1 + C.xxx;
                    vec3 x2 = x0 - i2 + C.yyy;
                    vec3 x3 = x0 - D.yyy;
                    i = mod289(i);
                    vec4 p = permute(permute(permute(
                              i.z + vec4(0.0, i1.z, i2.z, 1.0))
                            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                    float n_ = 0.142857142857;
                    vec3 ns = n_ * D.wyz - D.xzx;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_);
                    vec4 x = x_ * ns.x + ns.yyyy;
                    vec4 y = y_ * ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4(x.xy, y.xy);
                    vec4 b1 = vec4(x.zw, y.zw);
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                    vec3 p0 = vec3(a0.xy, h.x);
                    vec3 p1 = vec3(a0.zw, h.y);
                    vec3 p2 = vec3(a1.xy, h.z);
                    vec3 p3 = vec3(a1.zw, h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                    m = m * m;
                    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                }

                void main(){
                    // ゲーム canvas をビューポートに収まるよう中央寄せでスケール
                    vec2 ratio = vec2(
                        min((resolution.x / resolution.y) / (imageResolution.x / imageResolution.y), 1.0),
                        min((resolution.y / resolution.x) / (imageResolution.y / imageResolution.x), 1.0)
                    );
                    vec2 baseUv = vec2(
                        vUv.x * ratio.x + (1.0 - ratio.x) * 0.5,
                        vUv.y * ratio.y + (1.0 - ratio.y) * 0.5
                    );

                    vec2 shake = vec2(strength * 8.0 + 0.5) * vec2(
                        random(vec2(time)) * 2.0 - 1.0,
                        random(vec2(time * 2.0)) * 2.0 - 1.0
                    ) / resolution;

                    float y = baseUv.y * resolution.y;
                    float rgbWave = (
                        snoise3(vec3(0.0, y * 0.01, time * 400.0)) * (2.0 + strength * 32.0)
                        * snoise3(vec3(0.0, y * 0.02, time * 200.0)) * (1.0 + strength * 4.0)
                        + step(0.9995, sin(y * 0.005 + time * 1.6)) * 12.0
                        + step(0.9999, sin(y * 0.005 + time * 2.0)) * -18.0
                    ) / resolution.x;
                    float rgbDiff = (6.0 + sin(time * 500.0 + baseUv.y * 40.0) * (20.0 * strength + 1.0)) / resolution.x;
                    float rgbUvX = baseUv.x + rgbWave;
                    float r = texture2D(tex, vec2(rgbUvX + rgbDiff, baseUv.y) + shake).r;
                    float gC = texture2D(tex, vec2(rgbUvX, baseUv.y) + shake).g;
                    float b = texture2D(tex, vec2(rgbUvX - rgbDiff, baseUv.y) + shake).b;

                    float whiteNoise = (random(baseUv + mod(time, 10.0)) * 2.0 - 1.0) * (0.15 + strength * 0.15);

                    float bnTime = floor(time * 20.0) * 200.0;
                    float noiseX = step((snoise3(vec3(0.0, baseUv.x * 3.0, bnTime)) + 1.0) / 2.0, 0.12 + strength * 0.3);
                    float noiseY = step((snoise3(vec3(0.0, baseUv.y * 3.0, bnTime)) + 1.0) / 2.0, 0.12 + strength * 0.3);
                    float bnMask = noiseX * noiseY;
                    float bnUvX = baseUv.x + sin(bnTime) * 0.2 + rgbWave;
                    float bnR = texture2D(tex, vec2(bnUvX + rgbDiff, baseUv.y)).r * bnMask;
                    float bnG = texture2D(tex, vec2(bnUvX, baseUv.y)).g * bnMask;
                    float bnB = texture2D(tex, vec2(bnUvX - rgbDiff, baseUv.y)).b * bnMask;
                    vec4 blockNoise = vec4(bnR, bnG, bnB, 1.0);

                    float bnTime2 = floor(time * 25.0) * 300.0;
                    float noiseX2 = step((snoise3(vec3(0.0, baseUv.x * 2.0, bnTime2)) + 1.0) / 2.0, 0.12 + strength * 0.5);
                    float noiseY2 = step((snoise3(vec3(0.0, baseUv.y * 8.0, bnTime2)) + 1.0) / 2.0, 0.12 + strength * 0.3);
                    float bnMask2 = noiseX2 * noiseY2;
                    float bnR2 = texture2D(tex, vec2(bnUvX + rgbDiff, baseUv.y)).r * bnMask2;
                    float bnG2 = texture2D(tex, vec2(bnUvX, baseUv.y)).g * bnMask2;
                    float bnB2 = texture2D(tex, vec2(bnUvX - rgbDiff, baseUv.y)).b * bnMask2;
                    vec4 blockNoise2 = vec4(bnR2, bnG2, bnB2, 1.0);

                    float waveNoise = (sin(baseUv.y * 1200.0) + 1.0) / 2.0 * (0.15 + strength * 0.2);

                    vec4 col = vec4(r, gC, b, 1.0) * (1.0 - bnMask - bnMask2)
                             + (whiteNoise + blockNoise + blockNoise2 - waveNoise);
                    // フェードアウトは画面が暗くなる方向（darken=1で完全に黒）
                    gl_FragColor = vec4(col.rgb * (1.0 - darken), 1.0);
                }
            `;
            const vertexShader = `
                attribute vec3 position;
                attribute vec2 uv;
                varying vec2 vUv;
                void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }
            `;

            function syncOverlayToGameCanvas() {
                const gameCanvas = game.canvas;
                if (!gameCanvas) return;
                const r = gameCanvas.getBoundingClientRect();
                overlay.style.left = r.left + 'px';
                overlay.style.top = r.top + 'px';
                overlay.style.width = r.width + 'px';
                overlay.style.height = r.height + 'px';
                if (renderer) {
                    renderer.setSize(r.width, r.height, false);
                    uniforms.resolution.value.set(r.width, r.height);
                }
            }

            function init() {
                if (initialized) return;
                if (!window.THREE) { console.warn('THREE.js not loaded'); return; }
                const gameCanvas = game.canvas;
                if (!gameCanvas) return;
                renderer = new THREE.WebGLRenderer({ canvas: overlay, antialias: false, alpha: true });
                const r = gameCanvas.getBoundingClientRect();
                renderer.setSize(r.width, r.height, false);
                sceneG = new THREE.Scene();
                cameraG = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                tex = new THREE.CanvasTexture(gameCanvas);
                tex.minFilter = THREE.NearestFilter;
                tex.magFilter = THREE.NearestFilter;
                uniforms = {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(r.width, r.height) },
                    imageResolution: { value: new THREE.Vector2(gameCanvas.width, gameCanvas.height) },
                    tex: { value: tex },
                    strength: { value: 0 },
                    darken: { value: 0 }
                };
                const mat = new THREE.RawShaderMaterial({ uniforms, vertexShader, fragmentShader });
                mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat);
                sceneG.add(mesh);
                syncOverlayToGameCanvas();
                window.addEventListener('resize', syncOverlayToGameCanvas);
                window.addEventListener('scroll', syncOverlayToGameCanvas, true);
                initialized = true;
            }

            function trigger(duration = 700) {
                init();
                if (!initialized) return;
                syncOverlayToGameCanvas(); // 表示直前に位置を再同期
                overlay.style.opacity = '1';
                overlay.style.display = 'block';
                uniforms.strength.value = 1.0;
                uniforms.time.value = 0;
                const start = performance.now();
                let last = start;
                if (rafId) cancelAnimationFrame(rafId);
                const loop = () => {
                    const now = performance.now();
                    const t = (now - start) / duration;
                    if (t >= 1) {
                        uniforms.strength.value = 0;
                        overlay.style.display = 'none';
                        rafId = null;
                        return;
                    }
                    uniforms.strength.value = 1 - t;
                    uniforms.time.value += (now - last) / 1000;
                    tex.needsUpdate = true;
                    renderer.render(sceneG, cameraG);
                    last = now;
                    rafId = requestAnimationFrame(loop);
                };
                rafId = requestAnimationFrame(loop);
            }

            // 「ザーーー」：strength を最大維持したまま画面が黒くなっていく
            function triggerSustained(holdMs, fadeMs, onComplete) {
                init();
                if (!initialized) { if (onComplete) onComplete(); return; }
                syncOverlayToGameCanvas();
                overlay.style.opacity = '1';
                overlay.style.display = 'block';
                uniforms.strength.value = 1.0;
                uniforms.darken.value = 0;
                uniforms.time.value = 0;
                if (rafId) cancelAnimationFrame(rafId);
                const start = performance.now();
                let last = start;
                const total = holdMs + fadeMs;
                const loop = () => {
                    const now = performance.now();
                    const elapsed = now - start;
                    if (elapsed >= total) {
                        uniforms.darken.value = 0;
                        overlay.style.display = 'none';
                        rafId = null;
                        if (onComplete) onComplete();
                        return;
                    }
                    // hold 中は darken=0、fade 中に 0→1 で画面が黒くなる
                    uniforms.darken.value = elapsed > holdMs ? (elapsed - holdMs) / fadeMs : 0;
                    uniforms.strength.value = 1.0; // 強度キープ
                    uniforms.time.value += (now - last) / 1000;
                    tex.needsUpdate = true;
                    renderer.render(sceneG, cameraG);
                    last = now;
                    rafId = requestAnimationFrame(loop);
                };
                rafId = requestAnimationFrame(loop);
            }

            // 「ザ、ザ」と2回続けて発火
            function triggerDouble(opts) {
                const o = opts || {};
                const initialDelay = o.initialDelay != null ? o.initialDelay : 200;
                const burstDuration = o.burstDuration != null ? o.burstDuration : 250;
                const gap = o.gap != null ? o.gap : 120;
                setTimeout(() => trigger(burstDuration), initialDelay);
                setTimeout(() => trigger(burstDuration), initialDelay + burstDuration + gap);
            }

            // 「ザ、ザ、ザーーー」3連発：最後はサステイン+overlayフェードアウト
            function triggerSequence(opts) {
                const o = opts || {};
                const burstDuration = o.burstDuration != null ? o.burstDuration : 100;
                const gap = o.gap != null ? o.gap : 60;
                const sustainHold = o.sustainHold != null ? o.sustainHold : 250;
                const sustainFade = o.sustainFade != null ? o.sustainFade : 700;
                setTimeout(() => trigger(burstDuration), 0);
                setTimeout(() => trigger(burstDuration), burstDuration + gap);
                setTimeout(() => triggerSustained(sustainHold, sustainFade, o.onComplete),
                    2 * (burstDuration + gap));
            }

            return { trigger, triggerDouble, triggerSequence, triggerSustained };
        })();
        window.GlitchOverlay = GlitchOverlay;

        let cursors;
        let jetSound;

        let gameStarted = false;
        let playthroughCount = 0; // 0=1週目, 1=2週目, ...

        function showTitle(scene) {
            const title = scene.add.image(scene.game.config.width / 2, scene.game.config.height / 2, 'title');
            title.setDisplaySize(800, 500); // タイトル画像のサイズ
            title.setInteractive();

            // タイトル画像をカメラに固定
            title.setScrollFactor(0);

            // 操作キーガイド（タイトル下）
            const keyGuide = scene.add.text(
                scene.game.config.width / 2,
                scene.game.config.height / 2 + 260,
                'USE ARROW KEYS + SPACE'.split('').join(' '),
                {
                    fontSize: '20px',
                    fill: '#88ffaa',
                    fontFamily: "Helvetica, Arial, sans-serif"
                }
            ).setOrigin(0.5).setScrollFactor(0).setDepth(100);

            scene.spaceshipShadow.setAlpha(0);

            function startGame() {
                scene.spaceshipShadow.setAlpha(1);
                // ENTER 開始時の SE：landing.wav（goal キーと共用、開始音 0.15）
                if (scene.goalSound) scene.goalSound.play({ volume: 0.15 });
                scene.tweens.add({
                    targets: [title, keyGuide],
                    alpha: 0,
                    duration: 500,
                    onComplete: () => {
                        title.destroy();
                        keyGuide.destroy();
                    }
                });

                // Phase 1: 母艦から降下（中心を少し行き過ぎて上に戻るビヨーン挙動。スラスター噴射しながら）
                scene.tweens.add({
                    targets: scene.spaceship,
                    y: 150,
                    duration: 4200,
                    ease: 'Back.easeOut',
                    easeParams: [2.4],
                    onUpdate: () => {
                        scene.jetParticles.up.setPosition(scene.spaceship.x, scene.spaceship.y + 25);
                    },
                    onComplete: () => {
                        // 中心到達と同時に操作可能へ（スナップ感を消すため残存モメンタムを付与）
                        scene.jetParticles.up.on = false;
                        fadeStopSound(scene, jetSound, 0.5);
                        scene.spaceship.setVelocityY(-25); // わずかに上向きの残存速度
                        scene.spaceship.setGravityY(80);
                        gameStarted = true;

                        // 燃料ゲージをポップイン表示
                        scene.tweens.add({
                            targets: [scene.fuelGaugeBorder, scene.fuelGauge],
                            alpha: 1,
                            scale: 1,
                            duration: 280,
                            ease: 'Back.easeOut'
                        });
                    }
                });

                // 降下序盤からスラスター点火（早めに噴射を見せる。loopなしで1回だけ再生）
                scene.time.delayedCall(600, () => {
                    scene.jetParticles.up.setPosition(scene.spaceship.x, scene.spaceship.y + 25);
                    scene.jetParticles.up.on = true;
                    if (!jetSound.isPlaying) {
                        // 前回 fade で gain=0 のままになっている可能性があるため復元してから再生
                        if (jetSound.volumeNode && jetSound.manager) {
                            const ctx = jetSound.manager.context;
                            jetSound.volumeNode.gain.cancelScheduledValues(ctx.currentTime);
                            jetSound.volumeNode.gain.setValueAtTime(0.5, ctx.currentTime);
                        }
                        jetSound.play({ loop: false });
                    }
                });
            }

            title.once('pointerup', startGame);

        }

        function create() {
            // テキストを SVG → 画像化してテクスチャ登録
            // 4x解像度で描画→1/4で表示するスーパーサンプリングでクッキリさせる（コントラストはそのまま）
            const SVG_SCALE = 4;
            // テキストを Canvas 2D で描画して PNG dataURL に。
            // SVGデータURIだと@font-faceフォントが反映されないことがあるため Canvas に変更。
            const makeLabelSVG = (text, opts = {}) => {
                const fontSize = (opts.fontSize || 9) * SVG_SCALE;
                const fill = opts.fill || '#cceedd';
                const fontWeight = opts.fontWeight || 'bold';
                const fontStyle = opts.fontStyle || 'normal';
                const fontFamily = opts.fontFamily || "Helvetica, Arial, sans-serif";
                const stroke = opts.stroke;
                const strokeWidth = opts.strokeWidth != null ? opts.strokeWidth * SVG_SCALE : 0;
                const letterSpacing = opts.letterSpacing != null ? opts.letterSpacing * SVG_SCALE : 0;
                const pad = SVG_SCALE * 2 + Math.ceil(strokeWidth);

                // 計測用キャンバスでテキストの実幅を取得
                const measureCanvas = document.createElement('canvas');
                const mctx = measureCanvas.getContext('2d');
                mctx.font = `${fontStyle} ${fontWeight} ${fontSize}px ${fontFamily}`;
                const baseWidth = mctx.measureText(text).width;
                const totalWidth = baseWidth + letterSpacing * Math.max(0, text.length - 1);
                const w = Math.ceil(totalWidth) + pad * 2;
                const h = fontSize + pad * 2;

                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.font = `${fontStyle} ${fontWeight} ${fontSize}px ${fontFamily}`;
                ctx.textBaseline = 'alphabetic';
                ctx.textAlign = 'left';

                let cursorX = pad;
                const baseY = fontSize + pad - SVG_SCALE;
                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (stroke) {
                        ctx.strokeStyle = stroke;
                        ctx.lineWidth = strokeWidth;
                        ctx.lineJoin = 'round';
                        ctx.strokeText(ch, cursorX, baseY);
                    }
                    ctx.fillStyle = fill;
                    ctx.fillText(ch, cursorX, baseY);
                    cursorX += ctx.measureText(ch).width + letterSpacing;
                }
                return canvas.toDataURL('image/png');
            };
            // 失敗テキスト用ヘルパー（プレーンな白文字）
            this.makeFailLabel = (key, text) => {
                if (this.textures.exists(key)) return;
                this.textures.addBase64(key, makeLabelSVG(text, {
                    fontSize: 28,
                    fontWeight: '600',
                    fontFamily: "Helvetica, Arial, sans-serif",
                    fill: '#ffffff',
                    letterSpacing: 0.5
                }));
            };
            // Bebas Neue が読み込まれてから SVG をラスタライズ（フォント未読込だとフォールバック表示になる）
            const generateLabels = () => {
                if (!this.textures.exists('label_rescue')) {
                    this.textures.addBase64('label_rescue', makeLabelSVG('Go rescue the crew', { fontSize: 5, fill: '#cceedd', fontWeight: '600', fontFamily: "Helvetica, Arial, sans-serif", letterSpacing: 0.3 }));
                }
                if (!this.textures.exists('label_returnship')) {
                    this.textures.addBase64('label_returnship', makeLabelSVG('Return to the ship', { fontSize: 5, fill: '#cceedd', fontWeight: '600', fontFamily: "Helvetica, Arial, sans-serif", letterSpacing: 0.3 }));
                }
                this.makeFailLabel('label_missionfailed', 'Mission Failed');
                this.makeFailLabel('label_rescuefailed', 'Rescue Failed');

                // 方向矢印は assets/arrow.svg を直接使う（右向き1個分）。
                // 1〜3個の矢印を横に並べ、左向きは flipX で反転。
                const arrowOpts = { fill: '#88ffaa' }; // label_offtarget の流用元として残す
                // ゴール外着地メッセージ（矢印と同サイズ・赤寄りピンク）
                if (!this.textures.exists('label_offtarget')) {
                    this.textures.addBase64('label_offtarget', makeLabelSVG('Landed too far from target', { ...arrowOpts, fill: '#ff6688' }));
                }
            };
            // Helvetica はシステムフォントなので待機不要
            generateLabels();
            // 4x で描画したビットマップを 1/4 で表示するためのスケール
            this._labelDisplayScale = 1 / SVG_SCALE;

            // ラベル＋矢印を囲む4隅ブラケット（[ ] 風の L字マーク4つ）を描画。
            // anchorX = ラベル/矢印の origin 基準 x、isRight = ラベルが右側に伸びるか。
            this.makeGuideBubble = (anchorX, labelY, arrowY, label, isRight, color, depth) => {
                const STAGES = 3;
                const scale = (this._labelDisplayScale || 0.25) / 6;
                const tex = this.textures.get('arrow_unit');
                const srcW = tex.getSourceImage().width;
                const srcH = tex.getSourceImage().height;
                const arrowVisibleW = srcW * scale * (40 / 60);
                const arrowImgH = srcH * scale;
                const arrowsTotalW = arrowVisibleW * STAGES;
                const labelW = label.displayWidth;
                const labelH = label.displayHeight;
                const contentW = Math.max(labelW, arrowsTotalW);
                const left = isRight ? anchorX : anchorX - contentW;
                const right = isRight ? anchorX + contentW : anchorX;
                const top = labelY - labelH / 2;
                const bottom = arrowY + arrowImgH / 2;
                const padX = 6;
                const padY = 5;
                const bx = left - padX;
                const by = top - padY;
                const bw = (right - left) + padX * 2;
                const bh = (bottom - top) + padY * 2;
                const stroke = 1;
                // ブラケット1辺の長さ（横と縦で同じ長さ。bw/bh のうち短い方の 1/4 程度）
                const arm = Math.max(3, Math.min(8, Math.min(bw, bh) / 4));

                // Graphics を中心 (centerX, centerY) に配置し、ローカル座標 (-bw/2..+bw/2)
                // で描画する。これで scaleX 0→1 のアニメで「中心から左右に開く」演出ができる。
                const cx = bx + bw / 2;
                const cy = by + bh / 2;
                const lx = -bw / 2, rxp = bw / 2;
                const typ = -bh / 2, byp = bh / 2;
                const g = this.add.graphics();
                g.x = cx;
                g.y = cy;
                g.setDepth(depth);
                // 背景：線と同じ色を 10% 透過で塗りつぶし
                g.fillStyle(color, 0.1);
                g.fillRect(lx, typ, bw, bh);
                g.lineStyle(stroke, color, 1);
                // 左右は全長で繋ぐ
                g.lineBetween(lx, typ, lx, byp);
                g.lineBetween(rxp, typ, rxp, byp);
                // 上下は四隅の短い arm のみ
                g.lineBetween(lx, typ, lx + arm, typ);
                g.lineBetween(rxp - arm, typ, rxp, typ);
                g.lineBetween(lx, byp, lx + arm, byp);
                g.lineBetween(rxp - arm, byp, rxp, byp);
                return g;
            };

            // arrow.svg を 1〜3 個並べて方向矢印を作るヘルパー。
            // SVG: viewBox 0-60, 矢印の見える幅は 0-40 (= 全体の 2/3)。
            // 右向き＝そのまま、左向き＝flipX で反転。
            this.makeArrowGroup = (anchorX, anchorY, count, isRight, depth, scale) => {
                const dir = isRight ? 1 : -1;
                const tex = this.textures.get('arrow_unit');
                const srcW = tex.getSourceImage().width;     // 実ラスタ幅
                const imageW = srcW * scale;                 // 表示時の画像本体幅
                const arrowVisibleW = imageW * (40 / 60);    // 並びの間隔（密着）
                // 右向き: anchorX を矢印群の左端に。左向き: anchorX を矢印群の右端に。
                const baseX = isRight ? anchorX : anchorX - imageW;
                const arrows = [];
                for (let i = 0; i < count; i++) {
                    const ax = baseX + dir * arrowVisibleW * i;
                    arrows.push(this.add.image(ax, anchorY, 'arrow_unit')
                        .setOrigin(0, 0.5)
                        .setDepth(depth)
                        .setAlpha(0)
                        .setScale(scale)
                        .setFlipX(!isRight));
                }
                return arrows;
            };

            // 的マーカーの描画ヘルパー
            this.drawLandingMarker = (color) => {
                this.landingMarker.clear();
                this.landingMarker.lineStyle(1, color);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 60, 16);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 35, 10);
                this.landingMarker.lineBetween(this.markerX - 35, this.markerY, this.markerX + 35, this.markerY);
                this.landingMarker.lineBetween(this.markerX, this.markerY - 10, this.markerX, this.markerY + 10);
            };
            this.currentMarkerColor = 0x00ff00;
            this.astronautMode = false;

            // 2週目以降に前回の状態が残らないよう、リスタート時に必ず初期化
            this.astronaut = null;
            this.moonCar = null;
            this.playerClimbing = false;
            this.enemiesRetreating = false;
            this.cameraRising = false;
            this.returningToShip = false;
            this.crewFound = false;
            this.crewFollowing = false;
            this.crews = [];
            this.enemies = [];
            this.lasers = [];
            this.astronautGameOver = false;
            this.chargedFired = false;
            this.beamHoldStart = null;
            this.beamEnergy = 100;
            this.chargeAllowed = false; // 押下時のエネルギーで判定（>=50でtrue）
            this.astronautFacing = null;
            this.astronautVY = 0;
            this.escapeJetSound = null;

            // キーボード入力の設定
            const enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);

            this.add.image(0, 0, 'background').setOrigin(0, 0);

            // 背景画像の幅と高さを取得
            const backgroundImage = this.textures.get('background').getSourceImage();
            const imageWidth = backgroundImage.width;
            const imageHeight = backgroundImage.height;

            // シーンの幅と高さを取得
            const sceneWidth = this.scale.width;
            const sceneHeight = this.scale.height;

            // 背景画像をシーンの中心に配置
            this.add.image(sceneWidth / 2, sceneHeight / 2, 'background').setDisplaySize(imageWidth, imageHeight);
            // 宇宙船の移動範囲を拡張（背景・ゴール位置はそのまま、カメラは自由追従）
            this.physics.world.setBounds(-800, -500, 3000, 1400);
            this.physics.world.gravity.y = 0; // 全体の重力値を設定
            this.fuel = 250; // 燃料の最大値を設定

            // デブリの設定
            this.debrisGroup = this.physics.add.group();
            for (let i = 0; i < Phaser.Math.Between(5, 10); i++) { // デブリのランダム数
                const debrisIndex = Phaser.Math.Between(1, 15); // デブリの表示画像数
                const debris = this.physics.add.sprite(
                    Phaser.Math.Between(0, 2000), // デブリの表示位置の X 座標を 0 から 1400 の範囲に変更
                    Phaser.Math.Between(this.cameras.main.height * 1.5 / 5, this.cameras.main.height * 4 / 5), // デブリの表示位置
                    `debris${debrisIndex}`
                );

                const originalWidth = debris.width;
                const originalHeight = debris.height;
                const newWidth = Phaser.Math.Between(20, 40); //デブリのランダムサイズ
                const newHeight = (newWidth * originalHeight) / originalWidth;

                debris.setDisplaySize(newWidth, newHeight);
                debris.setData('speed', Phaser.Math.FloatBetween(-235, 235)); // デブリの左右のスピードをランダム設定
                debris.setData('rotationSpeed', Phaser.Math.FloatBetween(-5, 5)); // デブリの左右の回転を設定

                this.debrisGroup.add(debris);
            }

            // 燃料ゲージの枠を作成（縦型、宇宙船に追従）
            this.fuelGaugeBorder = this.add.graphics({ lineStyle: { width: 2, color: 0xFFFFFF }, fillStyle: { color: 0xFFFFFF } });
            this.fuelGaugeBorder.strokeRect(0, 0, 8, 50);
            this.fuelGaugeBorder.setDepth(9);
            this.fuelGaugeBorder.setAlpha(0);
            this.fuelGaugeBorder.setScale(0);

            // 燃料ゲージを作成（縦型、宇宙船に追従）
            this.fuelGauge = this.add.graphics({ fillStyle: { color: 0xaf3035 } });
            this.fuelGauge.fillRect(1, 1, 6, 48);
            this.fuelGauge.setDepth(9);
            this.fuelGauge.setAlpha(0);
            this.fuelGauge.setScale(0);


            // 着陸エリアのスプライトを作成（当たり判定用、描画は別スプライトへ）
            this.moon = this.add.sprite(Phaser.Math.Between(100, this.game.config.width - 100), this.game.config.height - 98, 'flag');
            this.physics.add.existing(this.moon, true);
            this.moon.body.allowGravity = false;
            this.moon.displayWidth = 80;
            this.moon.displayHeight = 70;
            this.moon.body.setSize(30, 5, false).setOffset(0, this.moon.displayHeight - 5 + 5);
            this.moon.setVisible(false);

            // 旗の見た目（着陸地点の足元を基準に2倍サイズで上に伸ばす）
            const flagGroundY = this.moon.y + this.moon.displayHeight / 2;
            this.flagVisual = this.add.image(this.moon.x, flagGroundY, 'flag');
            this.flagVisual.setOrigin(0.5, 1);
            this.flagVisual.setDisplaySize(160, 140);

            // 点滅エフェクト（同位置・同サイズで重ね、ふんわりON/OFF）
            this.flagFlash = this.add.image(this.moon.x, flagGroundY, 'flag-flash');
            this.flagFlash.setOrigin(0.5, 1);
            this.flagFlash.setDisplaySize(160, 140);
            this.flagFlash.setDepth(this.flagVisual.depth + 1);

                    // リング内で内側エッジ寄りに偏らせる（t^2 で 0 近辺が濃い）
                    const t = Math.pow(Math.random(), 2);
                    const radius = innerRadius + t * (outerRadius - innerRadius);
                    // 前方扇形（角度 ±60°）+ 銃の向き dir で左右反転

                    particle.x = emitter.x.propertyValue + dx;
                    particle.y = emitter.y.propertyValue + dy;
                }
            });

        function update(time, delta) {
            // 宇宙飛行士操作モード（手動制御、物理エンジン不使用）
            if (this.astronautMode && this.astronaut) {
                const dt = delta / 1000;
                const moveSpeed = 80;
                const gravity = 200;
                const jumpPower = -150;
                const onGround = this.astronaut.y >= this.astronautGroundY;

                // 捕獲後はプレイヤー操作不可（ビーム関連を停止し、レーザーだけ飛び続ける）
                // ※敵の移動・追加捕獲判定は継続させるため return しない
                if (this.astronautGameOver) {
                    if (this.beamTameSound && this.beamTameSound.isPlaying) this.beamTameSound.stop();
                    if (this.beamChargeEmitter) this.beamChargeEmitter.on = false;
                    if (this.lasers) {
                        this.lasers = this.lasers.filter(l => {
                            const dx = l.dir * l.speed * dt;
                            l.beam.x += dx;
                            l.glow.x += dx;
                            if (this.time.now - l.born > l.life) {
                                l.beam.destroy();
                                l.glow.destroy();
                                return false;
                            }
                            return true;
                        });
                    }
                }

                // 左右移動（捕獲後は操作不可）
                const isMoving = !this.astronautGameOver && !this.playerClimbing && (this.cursors.left.isDown || this.cursors.right.isDown);
                const prevFacing = this.astronautFacing;
                if (!this.astronautGameOver && !this.playerClimbing && this.cursors.left.isDown) {
                    this.astronaut.x -= moveSpeed * dt;
                    this.astronaut.setFlipX(false); // 元画像は左向き
                    this.astronautFacing = 'left';
                    // 切替時のアニメ
                    if (prevFacing === 'right' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_flip_RtoL');
                    } else if (prevFacing === 'front' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_front_to_L');
                    }
                } else if (!this.astronautGameOver && !this.playerClimbing && this.cursors.right.isDown) {
                    this.astronaut.x += moveSpeed * dt;
                    this.astronaut.setFlipX(true); // 右向きは左右反転
                    this.astronautFacing = 'right';
                    // 切替時のアニメ
                    if (prevFacing === 'left' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_flip_LtoR');
                    } else if (prevFacing === 'front' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_front_to_R');
                    }
                }

                // 初回の移動で通常ズームへ戻す（ハシゴ降り時のアップからゲームプレイ用ズームへ）
                if (isMoving && this.astronautHasMoved === false) {
                    this.astronautHasMoved = true;
                    this.tweens.add({
                        targets: this.cameras.main,
                        zoom: 2.75,
                        duration: 800,
                        ease: 'Sine.easeInOut'
                    });
                }

                // アニメーション制御（地上で動いているときだけ歩行、空中は開脚で固定）
                // 振り向きアニメ再生中は何も触らない
                const currentAnimKey = this.astronaut.anims.currentAnim ? this.astronaut.anims.currentAnim.key : null;
                const playingTurn = this.astronaut.anims.isPlaying && currentAnimKey &&
                    (currentAnimKey.startsWith('astronaut_turn_'));
                if (!this.playerClimbing && !playingTurn) {
                    if (!onGround) {
                        // ジャンプ中：アニメ停止、開脚ポーズ（L2）で固定
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'player_L2') this.astronaut.setTexture('player_L2');
                    } else if (isMoving) {
                        // 地上で移動中：歩行アニメ
                        if (!this.astronaut.anims.isPlaying || this.astronaut.anims.currentAnim.key !== 'astronaut_walk') {
                            this.astronaut.anims.play('astronaut_walk');
                        }
                    } else if (this.astronautHasMoved) {
                        // 一度動いた後の静止：横向きベースフレーム（0）
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'player_0') this.astronaut.setTexture('player_0');
                    } else {
                        // まだ動いていない状態：正面向き
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'spaceman') this.astronaut.setTexture('spaceman');
                    }
                }
                if (this.astronautMinX !== undefined) {
                    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, this.astronautMinX, this.astronautMaxX);
                    // モノリス接触でビームゲージ満タン
                    const atMonolith = this.astronaut.x <= this.astronautMinX + 0.5
                        || this.astronaut.x >= this.astronautMaxX - 0.5;
                    if (atMonolith) {
                        this.beamEnergy = 100;
                    }
                }

                // 足音（移動中かつ接地時、ランダムで間隔再生）
                if (isMoving && onGround && this.time.now - this.lastFootstepTime > 320) {
                    const step = Phaser.Utils.Array.GetRandom(this.footstepSounds);
                    step.play();
                    this.lastFootstepTime = this.time.now;
                } else if (!isMoving) {
                    this.lastFootstepTime = 0; // 停止時リセットで次の歩き出しが即鳴る
                }

                // ビーム残量の自動回復（宇宙船 or 月面車の近くで急速充電）
                const underShip = this.spaceship && Math.abs(this.astronaut.x - this.spaceship.x) < 30;
                const nearCar = this.moonCar && Math.abs(this.astronaut.x - this.moonCar.x) < 60;
                const regenRate = (underShip || nearCar) ? 90 : 15;
                this.beamEnergy = Math.min(100, this.beamEnergy + regenRate * dt);

                // ビーム残量ゲージ更新（宇宙飛行士上部、色も残量に追従）
                const gx = this.astronaut.x;
                const gy = this.astronaut.y - 14;
                this.beamGaugeBg.setPosition(gx, gy);
                const gaugeRatio = Phaser.Math.Clamp(this.beamEnergy / 100, 0, 1);
                const fillW = 10 * gaugeRatio;
                this.beamGaugeFill.setPosition(gx - (10 - fillW) / 2, gy);
                this.beamGaugeFill.width = fillW;
                const gr = Math.round(0xff * (1 - gaugeRatio));
                const gg = Math.round(0xff * gaugeRatio);
                const gb = Math.round(0xcc * gaugeRatio);
                const normalColor = (gr << 16) | (gg << 8) | gb;
                // 長押し中はゲージが点滅（チャージ中表示）
                const charging = this.cursors.space.isDown && this.beamHoldStart && this.chargeAllowed;
                if (charging) {
                    const flashOn = (Math.floor(this.time.now / 80) % 2) === 0;
                    this.beamGaugeFill.fillColor = flashOn ? 0xffffff : normalColor;
                } else {
                    this.beamGaugeFill.fillColor = normalColor;
                }
                if (charging && !this.chargedFired && !this.beamTameSound.isPlaying) {
                    this.beamTameSound.play();
                } else if ((!charging || this.chargedFired) && this.beamTameSound.isPlaying) {
                    this.beamTameSound.stop();
                }

                // ビームチャージ中、銃口前方の半円状エリアに明滅粒がランダム出現
                // チャージ進行で最大半径が縮み、近くほど粒が密集する
                if (this.beamChargeEmitter) {
                    const chargeHoldMs = this.beamHoldStart ? this.time.now - this.beamHoldStart : 0;
                    const isChargingParticles = charging && !this.chargedFired && chargeHoldMs > 300;
                    if (isChargingParticles) {
                        const pdir = this.astronautFacing === 'left' ? -1 : 1;
                        const focusX = this.astronaut.x + pdir * 7;
                        const focusY = this.astronaut.y - 3;
                        this._chargeFocus.x = focusX;
                        this._chargeFocus.y = focusY;
                        this._chargeDir = pdir;
                        this._chargeProgress = Phaser.Math.Clamp((chargeHoldMs - 300) / 1200, 0, 1);
                        this.beamChargeEmitter.setPosition(focusX, focusY);
                        this.beamChargeEmitter.on = true;
                    } else {
                        this.beamChargeEmitter.on = false;
                    }
                }

                // スペース押下：チャージ計測開始（ここでは発射しない）
                if (!this.astronautGameOver && !this.playerClimbing && this.astronautFacing && Phaser.Input.Keyboard.JustDown(this.cursors.space)) {
                    this.beamHoldStart = this.time.now;
                    this.chargedFired = false;
                    // 押下時のエネルギーでチャージ可否をロック（回復による途中チャージ可能化を防ぐ）
                    this.chargeAllowed = this.beamEnergy >= 50;
                }
                // スペース離した瞬間：チャージが発火してなければ通常ビーム
                if (!this.astronautGameOver && !this.playerClimbing && Phaser.Input.Keyboard.JustUp(this.cursors.space)) {
                    if (this.astronautFacing && this.beamHoldStart && !this.chargedFired && this.beamEnergy >= 5) {
                        const ratio = Phaser.Math.Clamp(this.beamEnergy / 100, 0, 1);
                        const dir = this.astronautFacing === 'left' ? -1 : 1;
                        const startX = this.astronaut.x + dir * 6;
                        const startY = this.astronaut.y - 3;
                        const r = Math.round(0xff * (1 - ratio));
                        const g = Math.round(0xff * ratio);
                        const b = Math.round(0xcc * ratio);
                        const beamColor = (r << 16) | (g << 8) | b;
                        const beamLen = 6 + 14 * ratio;
                        const glowLen = 4 + 10 * ratio;
                        const beam = this.add.rectangle(startX, startY, beamLen, 1, beamColor);
                        beam.setDepth(9);
                        const glow = this.add.rectangle(startX, startY, glowLen, 1, 0xffffff);
                        glow.setDepth(10);
                        const power = ratio >= 0.67 ? 3 : ratio >= 0.34 ? 2 : 1;
                        this.lasers.push({ beam, glow, dir, speed: 500, born: this.time.now, life: 1200, power });
                        this.beamSound.play();
                        this.beamEnergy = Math.max(0, this.beamEnergy - 22);
                    }
                    this.beamHoldStart = null;
                }

                // 長押し1.5秒 + 押下時に既にエネルギー50以上 → チャージビーム（画面端まで貫通）
                if (!this.astronautGameOver && !this.playerClimbing && this.astronautFacing && this.cursors.space.isDown && this.beamHoldStart
                    && !this.chargedFired && this.time.now - this.beamHoldStart >= 1500 && this.chargeAllowed) {
                    this.chargedFired = true;
                    const dir = this.astronautFacing === 'left' ? -1 : 1;
                    const startX = this.astronaut.x + dir * 6;
                    const startY = this.astronaut.y - 3;
                    // 画面端までの距離
                    const camW = this.cameras.main.width / this.cameras.main.zoom;
                    const beamLen = camW;
                    const beam = this.add.rectangle(startX, startY, beamLen, 1, 0x00ffff);
                    beam.setOrigin(dir < 0 ? 1 : 0, 0.5);
                    beam.setDepth(9);
                    const glow = this.add.rectangle(startX, startY - 0.5, beamLen, 0.5, 0xffffff);
                    glow.setOrigin(dir < 0 ? 1 : 0, 0.5);
                    glow.setDepth(10);
                    this.lasers.push({ beam, glow, dir, speed: 0, born: this.time.now, life: 250, power: 6, charged: true, hitSet: new Set() });
                    this.beamSound.play();
                    this.beamEnergy = Math.max(0, this.beamEnergy - 50);

                    // ビーム経路にキラキラ残像（1pxドットが時差でチカチカ）
                    const sparkleCount = 50;
                    for (let i = 0; i < sparkleCount; i++) {
                        const t = i / sparkleCount;
                        const sx = startX + dir * beamLen * t + Phaser.Math.Between(-2, 2);
                        const sy = startY + Phaser.Math.Between(-3, 3);
                        const sparkle = this.add.rectangle(sx, sy, 1, 1, 0xffffff);
                        sparkle.setDepth(11);
                        sparkle.setAlpha(0);
                        this.tweens.add({
                            targets: sparkle,
                            alpha: 1,
                            duration: 60,
                            delay: Phaser.Math.Between(50, 500),
                            yoyo: true,
                            hold: Phaser.Math.Between(100, 400),
                            repeat: Phaser.Math.Between(0, 2),
                            onComplete: () => sparkle.destroy()
                        });
                    }
                }

                // レーザー更新＋標的との衝突判定
                if (this.lasers) {
                    this.lasers = this.lasers.filter(l => {
                        const dx = l.dir * l.speed * dt;
                        l.beam.x += dx;
                        l.glow.x += dx;
                        // 当たり判定（地底人）。チャージビームは小さい敵を貫通
                        let hit = false;
                        if (this.enemies && this.enemies.length) {
                            const beamBounds = l.beam.getBounds();
                            this.enemies = this.enemies.filter(e => {
                                const emergedEnough = !e.emerging || e.y <= this.groundFeetY + e.displayHeight * 2 / 3;
                                const canHit = emergedEnough && Phaser.Geom.Intersects.RectangleToRectangle(beamBounds, e.getBounds());
                                if (!canHit) return true;
                                // チャージビーム：各敵に1回だけダメージ（フレーム跨ぎで重複ヒット防止）
                                if (l.charged) {
                                    if (l.hitSet && l.hitSet.has(e)) return true;
                                } else if (hit) {
                                    return true; // 通常ビームは1体のみ
                                }
                                if (l.charged && l.hitSet) l.hitSet.add(e);
                                e.hp -= l.power;
                                this.beamHitSound.play();
                                hit = true;
                                if (e.hp <= 0) {
                                    const abSize = e.isBoss ? 90 : 45;
                                    const ab = this.add.sprite(e.x, e.y - 5, 'bloodAlien');
                                    ab.setDisplaySize(abSize, abSize);
                                    ab.setDepth(10);
                                    ab.play('bloodAlienSplat');
                                    if (e.shadow) e.shadow.destroy();
                                    e.destroy();
                                    this.enemyKills++;
                                    if (this.enemyKills % 5 === 0) this.bossesDue++;
                                    return false;
                                }
                                this.tweens.add({ targets: e, alpha: 0.3, duration: 80, yoyo: true });
                                return true;
                            });
                        }
                        // チャージビームは貫通するので寿命まで残す、通常は命中で消滅
                        const shouldDestroy = l.charged ? (this.time.now - l.born > l.life) : (hit || this.time.now - l.born > l.life);
                        if (shouldDestroy) {
                            l.beam.destroy();
                            l.glow.destroy();
                            return false;
                        }
                        return true;
                    });
                }

                // ジャンプ（押し始めで初速、離したら上昇を切って強弱をつける）
                if (Phaser.Input.Keyboard.JustDown(this.cursors.up) && onGround && !this.astronautGameOver) {
                    this.astronautVY = jumpPower;
                    // 追従中の仲間も同じ初速でジャンプ（chain感のため段階的にdelay）
                    if (this.crewFollowing && this.crews) {
                        this.crews.forEach((c, idx) => {
                            this.time.delayedCall((idx + 1) * 110, () => {
                                if (!c.captured && c.y >= this.groundFeetY - 0.5) c.vy = jumpPower;
                            });
                        });
                    }
                }
                if (Phaser.Input.Keyboard.JustUp(this.cursors.up) && this.astronautVY < 0) {
                    this.astronautVY *= 0.35;
                    // 仲間も同様に上昇打ち切り（同じdelayでプレイヤーの動きを模倣）
                    if (this.crewFollowing && this.crews) {
                        this.crews.forEach((c, idx) => {
                            this.time.delayedCall((idx + 1) * 110, () => {
                                if (c.vy && c.vy < 0) c.vy *= 0.35;
                            });
                        });
                    }
                }

                // 重力＋位置更新（帰還時・捕獲後はtween任せで物理停止）
                if (!this.returningToShip && !this.astronautGameOver) {
                    this.astronautVY += gravity * dt;
                    this.astronaut.y += this.astronautVY * dt;

                    // 地面で止まる（着地した瞬間に足音）
                    if (this.astronaut.y >= this.astronautGroundY) {
                        this.astronaut.y = this.astronautGroundY;
                        if (!onGround) {
                            Phaser.Utils.Array.GetRandom(this.footstepSounds).play();
                            this.lastFootstepTime = this.time.now;
                        }
                        this.astronautVY = 0;
                    }
                }

                // 影は X方向のみ追従（Yは地面に固定済み）
                if (this.astronaut.shadow) this.astronaut.shadow.x = this.astronaut.x;

                // 地底人の移動＋宇宙飛行士との衝突
                if (this.enemies && this.enemies.length) {
                    const enemySpeed = 50;
                    // 接触判定用の縮小ボックス（透過余白を除外）
                    const shrink = (obj, px, py) => {
                        const b = obj.getBounds();
                        return new Phaser.Geom.Rectangle(b.x + px, b.y + py, b.width - px * 2, b.height - py * 2);
                    };
                    const astroBox = shrink(this.astronaut, 3, 2);
                    // 生存中（=未捕獲）のターゲット候補を集める
                    const liveTargets = [];
                    if (this.astronaut && this.astronaut.visible && !this.astronaut.captured) liveTargets.push(this.astronaut);
                    if (this.crews) this.crews.forEach(c => { if (c.visible && !c.captured) liveTargets.push(c); });

                    for (const e of this.enemies) {
                        // 完全に地上に出るまで（emerge tween 完了まで）は捕獲対象外
                        if (e.emerging) continue;
                        // 出現中・捕獲動作中は移動・方向転換しない
                        if (!e.emerging && !e.capturing) {
                            // 最寄りの未捕獲ターゲットを追う（捕まったキャラには寄って来ない）
                            let targetX = null;
                            let minDist = Infinity;
                            for (const t of liveTargets) {
                                const d = Math.abs(t.x - e.x);
                                if (d < minDist) { minDist = d; targetX = t.x; }
                            }
                            // 主人公が空中の間は方向転換しない（飛び越え後すぐ捕まるのを防止）。
                            // ただしゲームオーバー後は常に最寄り未捕獲を追う。
                            const prevDir = e.lastDir || 1;
                            if ((onGround || this.astronautGameOver) && targetX !== null && !e.turning && !e.emergeTransitioning) {
                                const dx = targetX - e.x;
                                e.lastDir = dx === 0 ? prevDir : Math.sign(dx);
                            }
                            const sign = e.lastDir || 1;
                            // 個体ごとに spawn 時に固定された速度（base ±2 ランダム）
                            const sp = e.speed != null ? e.speed : (e.isBoss ? 30 : enemySpeed);
                            const animPrefix = e.isBoss ? 'bossAlien_' : 'alien_';
                            const walkKey = animPrefix + 'walk';
                            // 振り向き／出現トランジション中は移動・アニメ切替しない
                            if (!e.turning && !e.emergeTransitioning && sign !== prevDir
                                && e.anims.currentAnim && e.anims.currentAnim.key === walkKey) {
                                e.turning = true;
                                e.setFlipX(false); // FL/FR は絶対向き
                                const turnKey = animPrefix + (sign > 0 ? 'turn_LtoR' : 'turn_RtoL');
                                e.anims.play(turnKey);
                                e.once('animationcomplete', () => {
                                    if (!e.active) return;
                                    e.turning = false;
                                    e.setFlipX(e.lastDir > 0);
                                    e.anims.play(walkKey);
                                });
                            } else if (!e.turning && !e.emergeTransitioning) {
                                e.x += sign * sp * dt;
                                if (e.anims.currentAnim && e.anims.currentAnim.key === walkKey) {
                                    e.setFlipX(sign > 0);
                                    // ボスの walk フレームは影との隙間を埋めるため 2px 下げる
                                    if (e.isBoss) e.y = this.groundFeetY + 2;
                                    else e.y = this.groundFeetY;
                                }
                            }
                        }
                        // 影をX方向に追従
                        if (e.shadow) e.shadow.x = e.x;
                        const enemyBox = e.isBoss ? shrink(e, 6, 5) : shrink(e, 2, 3);
                        // 仲間が捕まった場合もゲームオーバー（救出失敗）。ハシゴ登り中も対象
                        // 既に捕獲済みの仲間と、既に捕獲動作中の敵は対象外
                        const hitCrew = !e.capturing && this.crews && this.crews.length
                            ? this.crews.find(c => c.visible && !c.captured && c.landed && Phaser.Geom.Intersects.RectangleToRectangle(shrink(c, 3, 2), enemyBox))
                            : null;
                        if (hitCrew) {
                            const isFirstCapture = !this.astronautGameOver;
                            hitCrew.captured = true;
                            e.capturing = true;
                            // 捕まった仲間はその場で停止（落下・横移動の進行中tweenを切る）
                            this.tweens.killTweensOf(hitCrew);
                            if (hitCrew.anims && hitCrew.anims.isPlaying) hitCrew.anims.stop();
                            // 攻撃モーション（雑魚 A1→A2、ボス A1→A2→A3、最終フレームで停止）
                            e.setFlipX(e.lastDir > 0); // A 系は左向き、右向き時のみ反転
                            e.anims.play(e.isBoss ? 'bossAlien_attack' : 'alien_attack');
                            this.bloodSound.play(); // 各捕獲で鳴らす
                            if (this.deadSound) this.deadSound.play();

                            if (isFirstCapture) {
                                this.astronautGameOver = true;
                                this.crewFollowing = false;
                                this.beamGaugeBg.setVisible(false);
                                this.beamGaugeFill.setVisible(false);
                                if (this.astronaut && this.astronaut.anims && this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                                // 進行中の人間tweenを全停止（捕獲された仲間のtweenは下で新規作成）
                                this.tweens.killTweensOf(this.astronaut);
                                this.crews.forEach(c => this.tweens.killTweensOf(c));
                                this.crews.forEach(c => { if (c.anims && c.anims.isPlaying) c.anims.stop(); });
                                // ぎゅーんとズームイン → ザ・ザ・ザーーーで scene 再起動
                                this.cameras.main.pan(hitCrew.x, hitCrew.y, 600, 'Sine.easeInOut');
                                this.cameras.main.zoomTo(4.5, 600, 'Sine.easeInOut');
                                this.time.delayedCall(600, () => {
                                    if (window.GlitchOverlay) window.GlitchOverlay.triggerSequence({
                                        onComplete: () => this.scene.restart()
                                    });
                                });
                            }

                            // 空中の他の仲間を自然に地面へ落下（重力風のtween）
                            this.crews.forEach(c => {
                                if (c !== hitCrew && !c.captured && c.y < this.groundFeetY - 1) {
                                    const dur = Math.min(400, (this.groundFeetY - c.y) * 8);
                                    this.tweens.add({ targets: c, y: this.groundFeetY, duration: dur, ease: 'Quad.easeIn' });
                                }
                            });
                            // プレイヤーも空中なら自然に地面へ落下（仲間捕獲時に重力停止で空中固定になるバグ対策）
                            if (this.astronaut && this.astronaut.y < this.astronautGroundY - 1) {
                                this.astronautVY = 0;
                                const dur = Math.min(400, (this.astronautGroundY - this.astronaut.y) * 8);
                                this.tweens.add({ targets: this.astronaut, y: this.astronautGroundY, duration: dur, ease: 'Quad.easeIn' });
                            }

                            // 着地後に捕獲アニメ開始（自然な着地）
                            const startCaptureAnim = () => {
                                const captureX = hitCrew.x;
                                const captureY = hitCrew.y - hitCrew.displayHeight / 2;
                                // 重なりは中心一致ではなく約2/3。エイリアンを進行方向の手前側に寄せる
                                const overlapOffset = (e.displayWidth || 33) / 3;
                                const enemyTargetX = hitCrew.x - Math.sign(e.lastDir || 1) * overlapOffset;
                                hitCrew.setDepth(9);
                                hitCrew.setMask(this.groundMask);
                                e.setDepth(10);
                                e.setMask(this.groundMask);

                                const cBubbles = [];
                                const cTotal = 60;
                                for (let i = 0; i < cTotal; i++) {
                                    this.time.delayedCall(i * 33, () => {
                                        if (!hitCrew.captured) return;
                                        const bx = captureX + Phaser.Math.Between(-7, 7);
                                        const by = captureY + Phaser.Math.Between(-8, 8);
                                        const r = Phaser.Math.FloatBetween(0.5, 2);
                                        const b = this.add.circle(bx, by, r, 0x33dd33, Phaser.Math.FloatBetween(0.5, 0.9));
                                        b.setDepth(11);
                                        b.setMask(this.groundMask);
                                        cBubbles.push(b);
                                        this.tweens.add({
                                            targets: b,
                                            x: b.x + Phaser.Math.Between(-2, 2),
                                            y: b.y + Phaser.Math.Between(-2, 2),
                                            scaleX: Phaser.Math.FloatBetween(0.7, 1.3),
                                            scaleY: Phaser.Math.FloatBetween(0.7, 1.3),
                                            duration: Phaser.Math.Between(250, 450),
                                            ease: 'Sine.easeInOut',
                                            yoyo: true,
                                            repeat: -1
                                        });
                                    });
                                }

                                // エイリアンを捕獲点に寄せる（2/3重なりの位置へ）
                                this.tweens.add({
                                    targets: e,
                                    x: enemyTargetX,
                                    duration: 500,
                                    ease: 'Sine.easeOut'
                                });

                                this.time.delayedCall(cTotal * 33 + 300, () => {
                                    // 影を消して緑のシミを地面に残す
                                    if (hitCrew.shadow) { hitCrew.shadow.destroy(); hitCrew.shadow = null; }
                                    spawnDissolveStain(this, captureX, this.groundFeetY);
                                    const sinkY = this.groundFeetY + 50;
                                    // 仲間も一緒に地中へ引きずり込む
                                    this.tweens.add({
                                        targets: [...cBubbles, e, hitCrew],
                                        y: sinkY,
                                        duration: 1000,
                                        ease: 'Sine.easeIn',
                                        onComplete: () => {
                                            cBubbles.forEach(b => b.destroy());
                                            if (e.shadow) e.shadow.destroy();
                                            e.destroy();
                                            hitCrew.destroy();
                                            if (isFirstCapture) {
                                                this.time.delayedCall(2500, () => { this.scene.restart(); });
                                            }
                                        }
                                    });
                                });
                            };

                            // その場で捕獲開始（空中でも待たずに止めて引きずり込む）
                            startCaptureAnim();
                            break; // このフレームで以降の処理は不要
                        }
                        if (!e.capturing && !this.astronaut.captured && this.astronaut.visible && Phaser.Geom.Intersects.RectangleToRectangle(astroBox, enemyBox)) {
                            const isFirstCapture = !this.astronautGameOver;
                            this.astronaut.captured = true;
                            e.capturing = true;
                            // 攻撃モーション（雑魚 A1→A2、ボス A1→A2→A3、最終フレームで停止）
                            e.setFlipX(e.lastDir > 0); // A 系は左向き、右向き時のみ反転
                            e.anims.play(e.isBoss ? 'bossAlien_attack' : 'alien_attack');
                            this.bloodSound.play(); // 各捕獲で鳴らす
                            if (this.deadSound) this.deadSound.play();

                            if (isFirstCapture) {
                                this.astronautGameOver = true;
                                this.crewFollowing = false;
                                this.beamGaugeBg.setVisible(false);
                                this.beamGaugeFill.setVisible(false);
                                if (this.astronaut.anims && this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                                // 進行中の人間tweenを全停止（捕獲演出は下で新規作成）
                                this.tweens.killTweensOf(this.astronaut);
                                if (this.crews) {
                                    this.crews.forEach(c => this.tweens.killTweensOf(c));
                                    this.crews.forEach(c => { if (c.anims && c.anims.isPlaying) c.anims.stop(); });
                                }
                                // ぎゅーんとズームイン → ザ・ザ・ザーーーで scene 再起動
                                this.cameras.main.pan(this.astronaut.x, this.astronaut.y, 600, 'Sine.easeInOut');
                                this.cameras.main.zoomTo(4.5, 600, 'Sine.easeInOut');
                                this.time.delayedCall(600, () => {
                                    if (window.GlitchOverlay) window.GlitchOverlay.triggerSequence({
                                        onComplete: () => this.scene.restart()
                                    });
                                });
                            }

                            // 空中の仲間を自然落下tweenで地面へ
                            if (this.crews) this.crews.forEach(c => {
                                if (!c.captured && c.y < this.groundFeetY - 1) {
                                    const dur = Math.min(400, (this.groundFeetY - c.y) * 8);
                                    this.tweens.add({ targets: c, y: this.groundFeetY, duration: dur, ease: 'Quad.easeIn' });
                                }
                            });

                            // 着地後に捕獲アニメ開始（プレイヤーは重力で自然落下）
                            const startCaptureAnim = () => {
                                const captureX = this.astronaut.x;
                                const captureY = this.astronaut.y;
                                // 重なりは中心一致ではなく約2/3。エイリアンを進行方向の手前側に寄せる
                                const overlapOffset = (e.displayWidth || 33) / 3;
                                const enemyTargetX = this.astronaut.x - Math.sign(e.lastDir || 1) * overlapOffset;
                                this.astronaut.setDepth(10.5);
                                this.astronaut.setMask(this.groundMask);
                                e.setDepth(10);
                                e.setMask(this.groundMask);

                                const bubbles = [];
                                const totalBubbles = 60;
                                for (let i = 0; i < totalBubbles; i++) {
                                    this.time.delayedCall(i * 33, () => {
                                        if (!this.astronaut.captured) return;
                                        const bx = captureX + Phaser.Math.Between(-7, 7);
                                        const by = captureY + Phaser.Math.Between(-8, 8);
                                        const r = Phaser.Math.FloatBetween(0.5, 2);
                                        const b = this.add.circle(bx, by, r, 0x33dd33, Phaser.Math.FloatBetween(0.5, 0.9));
                                        b.setDepth(11);
                                        b.setMask(this.groundMask);
                                        bubbles.push(b);
                                        this.tweens.add({
                                            targets: b,
                                            x: b.x + Phaser.Math.Between(-2, 2),
                                            y: b.y + Phaser.Math.Between(-2, 2),
                                            scaleX: Phaser.Math.FloatBetween(0.7, 1.3),
                                            scaleY: Phaser.Math.FloatBetween(0.7, 1.3),
                                            duration: Phaser.Math.Between(250, 450),
                                            ease: 'Sine.easeInOut',
                                            yoyo: true,
                                            repeat: -1
                                        });
                                    });
                                }

                                // エイリアンを捕獲点に寄せる（2/3重なりの位置へ）
                                this.tweens.add({
                                    targets: e,
                                    x: enemyTargetX,
                                    duration: 500,
                                    ease: 'Sine.easeOut'
                                });

                                // 泡が覆い尽くしたら地中へ
                                this.time.delayedCall(totalBubbles * 33 + 300, () => {
                                    // プレイヤーの影を消して緑のシミに置き換える
                                    if (this.astronaut.shadow) { this.astronaut.shadow.destroy(); this.astronaut.shadow = null; }
                                    spawnDissolveStain(this, captureX, this.groundFeetY);
                                    const sinkY = this.groundFeetY + 50;
                                    this.tweens.add({
                                        targets: [...bubbles, e],
                                        y: sinkY,
                                        duration: 1000,
                                        ease: 'Sine.easeIn',
                                        onComplete: () => {
                                            bubbles.forEach(b => b.destroy());
                                            if (e.shadow) e.shadow.destroy();
                                            e.destroy();
                                            if (isFirstCapture) {
                                                this.time.delayedCall(2500, () => { this.scene.restart(); });
                                            }
                                        }
                                    });
                                    this.tweens.add({
                                        targets: this.astronaut,
                                        y: sinkY,
                                        duration: 1000,
                                        delay: 120,
                                        ease: 'Sine.easeIn'
                                    });
                                });
                            };

                            // プレイヤーが空中なら自然落下tween → 着地後に捕獲アニメ開始
                            if (this.astronaut.y >= this.astronautGroundY) {
                                startCaptureAnim();
                            } else {
                                this.astronautVY = 0; // gravity停止後に残ったVYをクリア
                                const dur = Math.min(400, (this.astronautGroundY - this.astronaut.y) * 8);
                                this.tweens.add({ targets: this.astronaut, y: this.astronautGroundY, duration: dur, ease: 'Quad.easeIn', onComplete: startCaptureAnim });
                            }
                        }
                    }
                }

                // 仲間：車に近づくと2人が車のドア（高さ30px）からぴょんと降りてくる
                if (this.moonCar && !this.crewFound && Math.abs(this.astronaut.x - this.moonCar.x) < 80) {
                    this.crewFound = true;
                    // 仲間が出てくる前のSE → 終わった後にキューを消化
                    if (this.rescueIntroSound) {
                        this.rescueIntroSound.once('complete', () => this.tryPlayRescueLand && this.tryPlayRescueLand());
                        this.rescueIntroSound.play();
                    }
                    const exitDir = this.astronaut.x < this.moonCar.x ? -1 : 1;
                    const doorY = this.groundFeetY - 30;
                    const crewCount = 2 + playthroughCount; // 1週目2人、2週目3人、...
                    for (let i = 0; i < crewCount; i++) {
                        // Sprite で作成（アニメーション再生のため）。元画像は左向き、右降下時は反転
                        // 空中のため開脚ポーズ（L2）で出現
                        const c = this.add.sprite(this.moonCar.x, doorY, 'crew_L2');
                        c.setFlipX(exitDir > 0);
                        c.setDisplaySize(15, 19);
                        c.landed = true; // 出てきた瞬間から捕獲対象
                        c.setOrigin(0.5, 1);
                        c.setDepth(7);
                        // 影は地面に固定（生成時はドア上、降下後は地面）
                        c.shadow = createGroundShadow(this, c.x, this.groundFeetY, 14);
                        this.crews.push(c);
                        this.time.delayedCall(i * 400, () => {
                            // ぴょんと降りる：横に出つつY方向はバウンドで着地
                            this.tweens.add({
                                targets: c,
                                x: this.moonCar.x + exitDir * (30 + i * 12),
                                duration: 600,
                                ease: 'Sine.easeOut'
                            });
                            this.tweens.add({
                                targets: c,
                                y: this.groundFeetY,
                                duration: 350,
                                ease: 'Quad.easeIn', // 重力で加速して落下（プレイヤーと同じ感じ）
                                onComplete: () => {
                                    // 着地：アイドルポーズに（landed=true は追従開始時に一括で立てる。
                                    // 着地フレームで捕獲される競合・他仲間のゴースト化を防止）
                                    c.setTexture('crew_0');
                                    // 着地時のSE（rescue-2/3/4 のランダム1つ）。
                                    // 「会話」感を出すため、最初の1人の着地でのみ返事して残りはスキップ。
                                    if (!this.rescueResponded) {
                                        this.rescueResponded = true;
                                        this.rescueLandQueue++;
                                        if (this.tryPlayRescueLand) this.tryPlayRescueLand();
                                    }
                                }
                            });
                        });
                    }
                    this.time.delayedCall(400 + 600 + 200, () => {
                        this.crewFollowing = true;

                        // 宇宙船方向の >>> + 「Return to the ship」ラベル表示（1週目のみ）
                        if (this.spaceship && playthroughCount === 0) {
                            const isRight = this.spaceship.x > this.astronaut.x;
                            const arrow = isRight ? '>' : '<';
                            const arrows = [arrow, arrow + arrow, arrow + arrow + arrow];
                            const offsetX = (isRight ? 1 : -1) * 25;
                            const originX = isRight ? 0 : 1;
                            const labelY = this.astronaut.y - 34;
                            const arrowY = this.astronaut.y - 26;
                            const ARROW_LOOPS = 3;
