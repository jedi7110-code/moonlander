<body oncontextmenu='return false;' oncopy='return false;'>

    <!-- 8bit/CRT風エフェクト用SVGフィルタ（posterize + 2段ブルーム） -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <filter id="crt-8bit" color-interpolation-filters="sRGB">
            <feComponentTransfer in="SourceGraphic" result="posterized">
                <feFuncR type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncG type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
                <feFuncB type="discrete" tableValues="0 0.016 0.032 0.048 0.063 0.079 0.095 0.111 0.127 0.143 0.159 0.175 0.19 0.206 0.222 0.238 0.254 0.27 0.286 0.302 0.317 0.333 0.349 0.365 0.381 0.397 0.413 0.429 0.444 0.46 0.476 0.492 0.508 0.524 0.54 0.556 0.571 0.587 0.603 0.619 0.635 0.651 0.667 0.683 0.698 0.714 0.73 0.746 0.762 0.778 0.794 0.81 0.825 0.841 0.857 0.873 0.889 0.905 0.921 0.937 0.952 0.968 0.984 1"/>
            </feComponentTransfer>
            <!-- 明部抽出（かなり明るい部分のみ残す） -->
            <feColorMatrix in="posterized" type="matrix" values="
                1.8 0 0 0 -0.95
                0 1.8 0 0 -0.95
                0 0 1.8 0 -0.95
                0 0 0 1 0" result="bright"/>
            <!-- 近距離ブルーム（シャープな発光コア） -->
            <feGaussianBlur in="bright" stdDeviation="1" result="blurNear"/>
            <!-- 遠距離ハレーション（広がる柔らかい光） -->
            <feGaussianBlur in="bright" stdDeviation="6" result="blurFar"/>
            <!-- ハレーションを加算（8%） -->
            <feComposite in="blurFar" in2="posterized" operator="arithmetic" k1="0" k2="0.08" k3="1" k4="0" result="step1"/>
            <!-- 近距離ブルームを加算（12%） -->
            <feComposite in="blurNear" in2="step1" operator="arithmetic" k1="0" k2="0.12" k3="1" k4="0"/>
        </filter>
    </svg>

    <div id="game-container">
        <div class="crt-overlay crt-subpixel"></div>
        <div class="crt-overlay crt-scanlines"></div>
    </div>

    <script>
        // 8bitエフェクト用PostFXパイプライン（ピクセル化・減色・スキャンライン）
        const PixelArtPipeline = new Phaser.Class({
            Extends: Phaser.Renderer.WebGL.Pipelines.PostFXPipeline,
            initialize: function PixelArtPipeline(game) {
                Phaser.Renderer.WebGL.Pipelines.PostFXPipeline.call(this, {
                    game: game,
                    renderTarget: true,
                    fragShader: [
                        'precision mediump float;',
                        'uniform sampler2D uMainSampler;',
                        'uniform vec2 uResolution;',
                        'varying vec2 outTexCoord;',
                        'void main() {',
                        '  float pixelSize = 2.0;',
                        '  vec2 px = pixelSize / uResolution;',
                        '  vec2 coord = floor(outTexCoord / px) * px + px * 0.5;',
                        '  vec4 color = texture2D(uMainSampler, coord);',
                        '  float levels = 32.0;',
                        '  color.rgb = floor(color.rgb * levels) / (levels - 1.0);',
                        '  float scan = mod(gl_FragCoord.y, 3.0) < 1.0 ? 0.82 : 1.0;',
                        '  color.rgb *= scan;',
                        '  gl_FragColor = color;',
                        '}'
                    ].join('\n')
                });
            },
            onPreRender: function () {
                this.set2f('uResolution', this.renderer.width, this.renderer.height);
            }
        });

        const config = {
            type: Phaser.WEBGL,
            width: 1400,
            height: 900,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 80 }, // 重力を強く設定
                    debug: false
                }
            },
            pipeline: { 'PixelArt': PixelArtPipeline },
            parent: 'game-container',
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        window.__game = game;

        let cursors;
        let jetSound;

        let gameStarted = false;
        let playthroughCount = 0; // 0=1週目, 1=2週目, ...

        function showTitle(scene) {
            const title = scene.add.image(scene.game.config.width / 2, scene.game.config.height / 2, 'title');
            title.setDisplaySize(800, 500); // タイトル画像のサイズ
            title.setInteractive();

            // タイトル画像をカメラに固定
            title.setScrollFactor(0);


            scene.spaceshipShadow.setAlpha(0);

            function startGame() {
                scene.spaceshipShadow.setAlpha(1);
                scene.tweens.add({
                    targets: title,
                    alpha: 0,
                    duration: 500,
                    onComplete: () => {
                        title.destroy();
                    }
                });
                scene.titleSound.play();

                // Phase 1: 母艦から降下（中心を少し行き過ぎて上に戻るビヨーン挙動。スラスター噴射しながら）
                scene.tweens.add({
                    targets: scene.spaceship,
                    y: 150,
                    duration: 4200,
                    ease: 'Back.easeOut',
                    easeParams: [2.4],
                    onUpdate: () => {
                        scene.jetParticles.up.setPosition(scene.spaceship.x, scene.spaceship.y + 25);
                    },
                    onComplete: () => {
                        // 中心到達と同時に操作可能へ（スナップ感を消すため残存モメンタムを付与）
                        scene.jetParticles.up.on = false;
                        fadeStopSound(scene, jetSound, 0.5);
                        scene.spaceship.setVelocityY(-25); // わずかに上向きの残存速度
                        scene.spaceship.setGravityY(80);
                        gameStarted = true;

                        // 燃料ゲージをポップイン表示
                        scene.tweens.add({
                            targets: [scene.fuelGaugeBorder, scene.fuelGauge],
                            alpha: 1,
                            scale: 1,
                            duration: 280,
                            ease: 'Back.easeOut'
                        });
                    }
                });

                // 降下序盤からスラスター点火（早めに噴射を見せる。loopなしで1回だけ再生）
                scene.time.delayedCall(600, () => {
                    scene.jetParticles.up.setPosition(scene.spaceship.x, scene.spaceship.y + 25);
                    scene.jetParticles.up.on = true;
                    if (!jetSound.isPlaying) {
                        // 前回 fade で gain=0 のままになっている可能性があるため復元してから再生
                        if (jetSound.volumeNode && jetSound.manager) {
                            const ctx = jetSound.manager.context;
                            jetSound.volumeNode.gain.cancelScheduledValues(ctx.currentTime);
                            jetSound.volumeNode.gain.setValueAtTime(0.5, ctx.currentTime);
                        }
                        jetSound.play({ loop: false });
                    }
                });
            }

            title.once('pointerup', startGame);
            scene.input.keyboard.once('keydown-ENTER', startGame);
        }

        function restartGame(scene) {
            gameStarted = false;
            scene.spaceship.setVisible(true);
            scene.spaceship.setPosition(scene.game.config.width / 2, -280);
            scene.spaceship.setVelocity(0);
            scene.spaceship.setAcceleration(0);
            scene.spaceship.setGravityY(80);
            scene.scene.resume(); // ゲームシーンを再開
            scene.scene.restart();

            // 燃料ゲージをリセット
            scene.fuel = 200; // 燃料を最大値に戻す
        }

        function preload() {
            this.load.image('background', 'assets/background.jpg');
            this.load.image('pod', 'assets/pod.png');
            this.load.image('spaceship', 'assets/spaceship.png');
            this.load.image('spacemy', 'assets/spacemy.png');
            this.load.image('spaceman', 'assets/player-f.png');
            this.load.image('spaceman_B', 'assets/player-b.png');
            this.load.image('spaceman_BL', 'assets/player-bl.png');
            this.load.image('spaceman_BR', 'assets/player-br.png');
            this.load.image('spaceman_FL', 'assets/player-fl.png');
            this.load.image('spaceman_FR', 'assets/player-fr.png');
            this.load.image('spaceman_L', 'assets/player-l.png');
            this.load.image('spaceman_R', 'assets/player-r.png');
            this.load.image('player_0', 'assets/player-0.png');
            this.load.image('player_L1', 'assets/player-l1.png');
            this.load.image('player_L2', 'assets/player-l2.png');
            this.load.image('player_L3', 'assets/player-l3.png');
            this.load.image('player_R1', 'assets/player-r1.png');
            this.load.image('player_R2', 'assets/player-r2.png');
            this.load.image('player_R3', 'assets/player-r3.png');
            this.load.image('spaceshipshadow', 'assets/spaceshipshadow.png');
            this.load.image('flag', 'assets/flag.png');
            this.load.image('flag-flash', 'assets/flag-flash.png');
            this.load.spritesheet('explosion', 'assets/explosion.png', { frameWidth: 256, frameHeight: 256 });
            this.load.image('title', 'assets/title.png');
            this.load.audio('title', 'assets/sound/title.wav'); // ビープ音
            this.load.audio('goal', 'assets/sound/goal.wav'); // ランディング音
            this.load.audio('explosion', 'assets/sound/explosion.wav'); // 爆発音
            this.load.audio('jet', 'assets/sound/jet.wav'); // ジェット音
            this.load.audio('empty', 'assets/sound/empty.wav'); // エンプティー音
            this.load.audio('end', 'assets/sound/end.wav'); // ミッション失敗音
            this.load.audio('beam', 'assets/sound/beam.wav'); // ビーム発射音
            this.load.audio('beamhit', 'assets/sound/beamhit.wav'); // ビーム命中音
            this.load.audio('beam-tame', 'assets/sound/beam-tame.wav'); // ビームチャージ音
            this.load.audio('blood', 'assets/sound/blood.wav'); // 被弾音
            this.load.audio('hatchopen', 'assets/sound/hatchopen.wav'); // ハッチ開
            this.load.audio('escape-injection', 'assets/sound/escape-injection.wav'); // 脱出点火
            this.load.audio('escape-jet', 'assets/sound/escape-jet.wav'); // 脱出ジェット
            this.load.image('alien_L', 'assets/alien1-l.png'); // 地底人（左向き）
            this.load.image('alien_R', 'assets/alien1-r.png'); // 地底人（右向き）
            this.load.image('mooncar', 'assets/moon-car.png'); // 大破した月面探査車
            this.load.image('crew', 'assets/crew-f.png'); // 救出する仲間（正面）
            this.load.image('crew_L', 'assets/crew-l.png'); // 仲間（左向き）
            this.load.image('crew_R', 'assets/crew-r.png'); // 仲間（右向き）
            this.load.image('boss_L', 'assets/boss-l.png'); // ボス（左向き）
            this.load.image('boss_R', 'assets/boss-r.png'); // ボス（右向き）
            this.load.spritesheet('blood', 'assets/blood-p.png', { frameWidth: 512, frameHeight: 512 }); // 被弾エフェクト
            this.load.spritesheet('bloodAlien', 'assets/blood-a.png', { frameWidth: 512, frameHeight: 512 }); // エイリアン撃破エフェクト
            for (let i = 1; i <= 5; i++) {
                this.load.audio(`footsteps${i}`, `assets/sound/footsteps${i}.wav`);
            }

            for (let i = 1; i <= 15; i++) {
                const paddedIndex = i.toString().padStart(2, '0');
                this.load.image(`debris${i}`, `assets/debris${paddedIndex}.png`); //デブリ
            }
        }

        function create() {
            // 的マーカーの描画ヘルパー
            this.drawLandingMarker = (color) => {
                this.landingMarker.clear();
                this.landingMarker.lineStyle(1, color);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 60, 16);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 35, 10);
                this.landingMarker.lineBetween(this.markerX - 35, this.markerY, this.markerX + 35, this.markerY);
                this.landingMarker.lineBetween(this.markerX, this.markerY - 10, this.markerX, this.markerY + 10);
            };
            this.currentMarkerColor = 0x00ff00;
            this.astronautMode = false;

            // 2週目以降に前回の状態が残らないよう、リスタート時に必ず初期化
            this.astronaut = null;
            this.moonCar = null;
            this.playerClimbing = false;
            this.enemiesRetreating = false;
            this.cameraRising = false;
            this.returningToShip = false;
            this.crewFound = false;
            this.crewFollowing = false;
            this.crews = [];
            this.enemies = [];
            this.lasers = [];
            this.astronautGameOver = false;
            this.chargedFired = false;
            this.beamHoldStart = null;
            this.beamEnergy = 100;
            this.chargeAllowed = false; // 押下時のエネルギーで判定（>=50でtrue）
            this.astronautFacing = null;
            this.astronautVY = 0;
            this.escapeJetSound = null;

            // キーボード入力の設定
            const enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);

            this.add.image(0, 0, 'background').setOrigin(0, 0);

            // 背景画像の幅と高さを取得
            const backgroundImage = this.textures.get('background').getSourceImage();
            const imageWidth = backgroundImage.width;
            const imageHeight = backgroundImage.height;

            // シーンの幅と高さを取得
            const sceneWidth = this.scale.width;
            const sceneHeight = this.scale.height;

            // 背景画像をシーンの中心に配置
            this.add.image(sceneWidth / 2, sceneHeight / 2, 'background').setDisplaySize(imageWidth, imageHeight);
            // 宇宙船の移動範囲を拡張（背景・ゴール位置はそのまま、カメラは自由追従）
            this.physics.world.setBounds(-800, -500, 3000, 1400);
            this.physics.world.gravity.y = 0; // 全体の重力値を設定
            this.fuel = 250; // 燃料の最大値を設定

            // デブリの設定
            this.debrisGroup = this.physics.add.group();
            for (let i = 0; i < Phaser.Math.Between(5, 10); i++) { // デブリのランダム数
                const debrisIndex = Phaser.Math.Between(1, 15); // デブリの表示画像数
                const debris = this.physics.add.sprite(
                    Phaser.Math.Between(0, 2000), // デブリの表示位置の X 座標を 0 から 1400 の範囲に変更
                    Phaser.Math.Between(this.cameras.main.height * 1.5 / 5, this.cameras.main.height * 4 / 5), // デブリの表示位置
                    `debris${debrisIndex}`
                );

                const originalWidth = debris.width;
                const originalHeight = debris.height;
                const newWidth = Phaser.Math.Between(20, 40); //デブリのランダムサイズ
                const newHeight = (newWidth * originalHeight) / originalWidth;

                debris.setDisplaySize(newWidth, newHeight);
                debris.setData('speed', Phaser.Math.FloatBetween(-235, 235)); // デブリの左右のスピードをランダム設定
                debris.setData('rotationSpeed', Phaser.Math.FloatBetween(-5, 5)); // デブリの左右の回転を設定

                this.debrisGroup.add(debris);
            }

            // 燃料ゲージの枠を作成（縦型、宇宙船に追従）
            this.fuelGaugeBorder = this.add.graphics({ lineStyle: { width: 2, color: 0xFFFFFF }, fillStyle: { color: 0xFFFFFF } });
            this.fuelGaugeBorder.strokeRect(0, 0, 8, 50);
            this.fuelGaugeBorder.setDepth(9);
            this.fuelGaugeBorder.setAlpha(0);
            this.fuelGaugeBorder.setScale(0);

            // 燃料ゲージを作成（縦型、宇宙船に追従）
            this.fuelGauge = this.add.graphics({ fillStyle: { color: 0xaf3035 } });
            this.fuelGauge.fillRect(1, 1, 6, 48);
            this.fuelGauge.setDepth(9);
            this.fuelGauge.setAlpha(0);
            this.fuelGauge.setScale(0);


            // 着陸エリアのスプライトを作成（当たり判定用、描画は別スプライトへ）
            this.moon = this.add.sprite(Phaser.Math.Between(100, this.game.config.width - 100), this.game.config.height - 98, 'flag');
            this.physics.add.existing(this.moon, true);
            this.moon.body.allowGravity = false;
            this.moon.displayWidth = 80;
            this.moon.displayHeight = 70;
            this.moon.body.setSize(30, 5, false).setOffset(0, this.moon.displayHeight - 5 + 5);
            this.moon.setVisible(false);

            // 旗の見た目（着陸地点の足元を基準に2倍サイズで上に伸ばす）
            const flagGroundY = this.moon.y + this.moon.displayHeight / 2;
            this.flagVisual = this.add.image(this.moon.x, flagGroundY, 'flag');
            this.flagVisual.setOrigin(0.5, 1);
            this.flagVisual.setDisplaySize(160, 140);

            // 点滅エフェクト（同位置・同サイズで重ね、ふんわりON/OFF）
            this.flagFlash = this.add.image(this.moon.x, flagGroundY, 'flag-flash');
            this.flagFlash.setOrigin(0.5, 1);
            this.flagFlash.setDisplaySize(160, 140);
            this.flagFlash.setDepth(this.flagVisual.depth + 1);
            this.flagFlash.setAlpha(0);
            this.tweens.add({
                targets: this.flagFlash,
                alpha: 1,
                duration: 900,
                ease: 'Sine.easeInOut',
                yoyo: true,
                repeat: -1
            });

            // ゴール地面の的（楕円＋十字線）を作成して点滅させる
            this.markerX = this.moon.x + 6;
            this.markerY = this.moon.y + this.moon.displayHeight / 2 + 5;
            this.landingMarker = this.add.graphics();
            this.drawLandingMarker(0x00ff00);
            this.tweens.add({
                targets: this.landingMarker,
                alpha: 0.2,
                duration: 800,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });

            // 宇宙船のスプライトを作成（タイトル中は画面外・上空の母艦付近で待機）
            const spaceshipTexture = Phaser.Math.Between(1, 20) === 1 ? 'spacemy' : 'spaceship';
            this.spaceship = this.physics.add.sprite(this.game.config.width / 2, -280, spaceshipTexture);
            this.spaceship.setCollideWorldBounds(true); // 画面外に出ないように設定
            this.spaceship.setDrag(0); // 慣性の設定
            this.spaceship.setAngularDrag(8); // 慣性の設定
            this.spaceship.setMaxVelocity(100000); // 最大速度の設定
            this.spaceship.setGravityY(80);
            this.spaceship.displayWidth = 50;
            this.spaceship.displayHeight = 50;
            this.spaceship.setDepth(5); // 脱出ポッドより手前に
            const bodyRadius = Math.floor(this.spaceship.width / 3);
            this.spaceship.body.setCircle(bodyRadius);
            this.spaceship.body.setOffset(this.spaceship.width / 2 - bodyRadius, this.spaceship.height / 2 - bodyRadius);
            this.spaceship.defaultTextureName = 'spaceship';

            // 着陸の影を作成
            this.spaceshipShadow = this.add.image(this.spaceship.x, this.moon.y + 47, 'spaceshipshadow');
            this.spaceshipShadow.displayWidth = 50; // 宇宙船と同じサイズに設定
            this.spaceshipShadow.displayHeight = 50; // 宇宙船と同じサイズに設定

            this.cursors = this.input.keyboard.createCursorKeys();
            this.titleSound = this.sound.add('title', { loop: false, volume: 0.05 });
            this.goalSound = this.sound.add('goal', { loop: false, volume: 0.05 });
            this.goalTimer = 0;
            this.explosionSound = this.sound.add('explosion', { loop: false, volume: 1 });
            this.emptySound = this.sound.add('empty', { loop: true, volume: 0.1 });
            this.endSound = this.sound.add('end', { loop: false, volume: 0.3 });
            this.footstepSounds = [];
            for (let i = 1; i <= 5; i++) {
                this.footstepSounds.push(this.sound.add(`footsteps${i}`, { loop: false, volume: 0.2 }));
            }
            this.lastFootstepTime = 0;
            this.beamSound = this.sound.add('beam', { loop: false, volume: 0.35 });
            this.beamHitSound = this.sound.add('beamhit', { loop: false, volume: 0.5 });
            this.beamTameSound = this.sound.add('beam-tame', { loop: true, volume: 0.1 });
            this.bloodSound = this.sound.add('blood', { loop: false, volume: 0.5 });
            jetSound = this.sound.add('jet', { loop: true, volume: 0.5 });
            cursors = this.input.keyboard.createCursorKeys();

            // ジェット噴射用パーティクルテクスチャを生成
            const jetGfx = this.make.graphics({ add: false });
            jetGfx.fillStyle(0xffffff);
            jetGfx.fillCircle(3, 3, 3);
            jetGfx.generateTexture('jetParticle', 6, 6);
            jetGfx.destroy();

            // ビームチャージ用パーティクルテクスチャ（1px 白ドット）
            const chargeGfx = this.make.graphics({ add: false });
            chargeGfx.fillStyle(0xffffff);
            chargeGfx.fillRect(0, 0, 1, 1);
            chargeGfx.generateTexture('chargeParticle', 1, 1);
            chargeGfx.destroy();

            // 粉塵パーティクル用テクスチャ（薄いベージュの丸）
            const dustGfx = this.make.graphics({ add: false });
            dustGfx.fillStyle(0xc8b89a);
            dustGfx.fillCircle(3, 3, 3);
            dustGfx.generateTexture('dustParticle', 6, 6);
            dustGfx.destroy();

            // 粉塵パーティクル用テクスチャ（大きめの煙）
            const dustGfxLarge = this.make.graphics({ add: false });
            dustGfxLarge.fillStyle(0xa8a8a8);
            dustGfxLarge.fillCircle(8, 8, 8);
            dustGfxLarge.generateTexture('dustLarge', 16, 16);
            dustGfxLarge.destroy();

            // 粉塵パーティクルエミッター（中央・左・右から舞い上がる煙）
            const dustParticles = this.add.particles('dustLarge');

            // 粉塵エミッター5つ（左→左中→中央→右中→右）
            const dustAngles = [
                { min: 190, max: 220 },  // 左
                { min: 230, max: 260 },  // 左中
                { min: 280, max: 310 },  // 右中
                { min: 320, max: 350 },  // 右
            ];
            this.dustEmitters = dustAngles.map(angle => {
                return dustParticles.createEmitter({
                    speed: { min: 30, max: 80 },
                    angle: angle,
                    scale: { start: 0.2, end: 1.8 },
                    alpha: { start: 0.4, end: 0 },
                    lifespan: { min: 600, max: 1300 },
                    frequency: 20,
                    quantity: 2,
                    on: false
                });
            });

            // ジェット噴射パーティクルエミッター（方向ごと）
            const emitterConfig = (angle) => ({
                speed: { min: 60, max: 140 },
                angle: angle,
                scale: { start: 0.5, end: 0 },
                alpha: { start: 0.7, end: 0 },
                lifespan: 200,
                frequency: 25,
                quantity: 2,
                on: false
            });

            this.jetParticles = {
                up: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 75, max: 105 })),
                down: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 255, max: 285 })),
                left: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: -15, max: 15 })),
                right: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 165, max: 195 }))
            };

            // ビームチャージ用パーティクルエミッター
            // 銃口の前に半円状に分布、中心近くほど密度高・遠くほど疎。明滅しながらその場で消える
            const chargeParticles = this.add.particles('chargeParticle');
            chargeParticles.setDepth(11);
            this._chargeFocus = { x: 0, y: 0 };
            this._chargeDir = 1;         // 1 or -1（銃の向き）
            this._chargeProgress = 0;    // 0→1（長押し時間の進行度）
            const sceneRef = this;
            this.beamChargeEmitter = chargeParticles.createEmitter({
                x: 0,
                y: 0,
                lifespan: { min: 160, max: 280 }, // 短寿命で明滅感
                scale: { start: 1, end: 1 },
                alpha: { start: 0, end: 0 },      // 下のonUpdateで 0→peak→0
                frequency: 18,
                quantity: 1,
                on: false,
                emitCallback: function (particle, emitter) {
                    // 長押し進行度
                    const progress = sceneRef._chargeProgress;
                    // リング（環状）分布：内側の空洞半径がチャージで縮み、徐々に銃口寄りへ寄せる
                    const outerRadius = 15 - progress * 3; // 15 → 12
                    const innerRadius = (1 - progress) * 10; // 10 → 0（内側が縮んで埋まっていく）
                    // リング内で内側エッジ寄りに偏らせる（t^2 で 0 近辺が濃い）
                    const t = Math.pow(Math.random(), 2);
                    const radius = innerRadius + t * (outerRadius - innerRadius);
                    // 前方扇形（角度 ±60°）+ 銃の向き dir で左右反転
                    const halfFan = Math.PI / 3;
                    const angle = (Math.random() * 2 - 1) * halfFan;
                    const dx = Math.cos(angle) * radius * sceneRef._chargeDir;
                    const dy = Math.sin(angle) * radius;
                    particle.x = emitter.x.propertyValue + dx;
                    particle.y = emitter.y.propertyValue + dy;
                }
            });
            // アルファを寿命の半ばでピークにする明滅カーブ
            this.beamChargeEmitter.alpha.onUpdate = (particle, key, t) => {
                return Math.sin(Math.PI * t);
            };

            // 爆発アニメーションの作成
            this.anims.create({
                key: 'explode',
                frames: this.anims.generateFrameNumbers('explosion', { start: 0, end: 64 }),
                frameRate: 24,
                repeat: 0,
                onUpdate: function (anim, frame, gameObject) {
                    if (frame.prevFrame !== null) {
                        gameObject.setTexture(frame.texture.key, frame.prevFrame.textureSourceIndex);
                    }
                },
                onComplete: function (anim, frame, gameObject) {
                    gameObject.destroy();
                }
            });

            // 被弾（血飛沫）アニメーションの作成
            this.anims.create({
                key: 'bloodSplat',
                frames: this.anims.generateFrameNumbers('blood', { start: 0, end: 5 }),
                frameRate: 14,
                repeat: 0,
                hideOnComplete: true
            });
            // エイリアン撃破（緑血）アニメーション
            this.anims.create({
                key: 'bloodAlienSplat',
                frames: this.anims.generateFrameNumbers('bloodAlien', { start: 0, end: 5 }),
                frameRate: 14,
                repeat: 0,
                hideOnComplete: true
            });

            // 宇宙飛行士の振り向きアニメーション
            // ハシゴ降下後（左向き）: 後ろ → BL → L → FL → 正面
            this.anims.create({
                key: 'astronaut_turn_to_front_L',
                frames: [
                    { key: 'spaceman_B' },
                    { key: 'spaceman_BL' },
                    { key: 'spaceman_L' },
                    { key: 'spaceman_FL' },
                    { key: 'spaceman' }
                ],
                frameRate: 12,
                repeat: 0
            });
            // ハシゴ降下後（右向き）: 後ろ → BR → R → FR → 正面
            this.anims.create({
                key: 'astronaut_turn_to_front_R',
                frames: [
                    { key: 'spaceman_B' },
                    { key: 'spaceman_BR' },
                    { key: 'spaceman_R' },
                    { key: 'spaceman_FR' },
                    { key: 'spaceman' }
                ],
                frameRate: 12,
                repeat: 0
            });
            // ハシゴ登る前（左向き経由）: 正面 → FL → L → BL → 後ろ
            this.anims.create({
                key: 'astronaut_turn_to_back_L',
                frames: [
                    { key: 'spaceman' },
                    { key: 'spaceman_FL' },
                    { key: 'spaceman_L' },
                    { key: 'spaceman_BL' },
                    { key: 'spaceman_B' }
                ],
                frameRate: 12,
                repeat: 0
            });
            // ハシゴ登る前（右向き経由）: 正面 → FR → R → BR → 後ろ
            this.anims.create({
                key: 'astronaut_turn_to_back_R',
                frames: [
                    { key: 'spaceman' },
                    { key: 'spaceman_FR' },
                    { key: 'spaceman_R' },
                    { key: 'spaceman_BR' },
                    { key: 'spaceman_B' }
                ],
                frameRate: 12,
                repeat: 0
            });

            // 横移動中の左右切替アニメ（F を挟まず軽めに）
            // L → R: FL → FR
            this.anims.create({
                key: 'astronaut_turn_flip_LtoR',
                frames: [
                    { key: 'spaceman_FL' },
                    { key: 'spaceman_FR' }
                ],
                frameRate: 18,
                repeat: 0
            });
            // R → L: FR → FL
            this.anims.create({
                key: 'astronaut_turn_flip_RtoL',
                frames: [
                    { key: 'spaceman_FR' },
                    { key: 'spaceman_FL' }
                ],
                frameRate: 18,
                repeat: 0
            });

            // 宇宙飛行士の歩行アニメーション（左向き基準。右向きは flipX で反転）
            // 順序: 0 → L1 → L2 → L1 → 0 → R1 → R2 → R1 の繰り返し（8フレーム）
            this.anims.create({
                key: 'astronaut_walk',
                frames: [
                    { key: 'player_0' },
                    { key: 'player_L1' },
                    { key: 'player_L2' },
                    { key: 'player_L1' },
                    { key: 'player_0' },
                    { key: 'player_R1' },
                    { key: 'player_R2' },
                    { key: 'player_R1' }
                ],
                frameRate: 14,
                repeat: -1
            });

            // コントローラーの作成
            const arrows = ['left', 'up', 'down', 'right']
            const buttons = arrows.map((cursor) => document.getElementById(cursor))
            buttons.forEach((v, i) => {
                v.addEventListener('touchstart', () => this.cursors[arrows[i]].isDown = true);
                v.addEventListener('touchend', () => this.cursors[arrows[i]].isDown = false);
            })

            // カメラの初期位置とズームを設定（タイトル中は固定・宇宙船の最終位置付近）
            this.cameras.main.centerOn(this.spaceship.x, 150);
            this.cameras.main.setZoom(1.2);
            // 8bitエフェクトを全体にかける
            // this.cameras.main.setPostPipeline('PixelArt'); // 一旦OFF（マスクとの干渉）

            // カメラのズームが変更されたときにタイトル画像のスケールを調整するリスナーを追加
            this.cameras.main.addListener('zoomchange', (cam, newZoom) => {
                title.setScale(1 / newZoom);
            });

            showTitle(this);
        }

        function update(time, delta) {
            // 宇宙飛行士操作モード（手動制御、物理エンジン不使用）
            if (this.astronautMode && this.astronaut) {
                const dt = delta / 1000;
                const moveSpeed = 80;
                const gravity = 200;
                const jumpPower = -150;
                const onGround = this.astronaut.y >= this.astronautGroundY;

                // 捕獲後はプレイヤー操作不可（ビーム関連を停止し、レーザーだけ飛び続ける）
                // ※敵の移動・追加捕獲判定は継続させるため return しない
                if (this.astronautGameOver) {
                    if (this.beamTameSound && this.beamTameSound.isPlaying) this.beamTameSound.stop();
                    if (this.beamChargeEmitter) this.beamChargeEmitter.on = false;
                    if (this.lasers) {
                        this.lasers = this.lasers.filter(l => {
                            const dx = l.dir * l.speed * dt;
                            l.beam.x += dx;
                            l.glow.x += dx;
                            if (this.time.now - l.born > l.life) {
                                l.beam.destroy();
                                l.glow.destroy();
                                return false;
                            }
                            return true;
                        });
                    }
                }

                // 左右移動（捕獲後は操作不可）
                const isMoving = !this.astronautGameOver && !this.playerClimbing && (this.cursors.left.isDown || this.cursors.right.isDown);
                const prevFacing = this.astronautFacing;
                if (!this.astronautGameOver && !this.playerClimbing && this.cursors.left.isDown) {
                    this.astronaut.x -= moveSpeed * dt;
                    this.astronaut.setFlipX(false); // 元画像は左向き
                    this.astronautFacing = 'left';
                    // 右→左の切替時、正面経由の向き変更アニメ
                    if (prevFacing === 'right' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_flip_RtoL');
                    }
                } else if (!this.astronautGameOver && !this.playerClimbing && this.cursors.right.isDown) {
                    this.astronaut.x += moveSpeed * dt;
                    this.astronaut.setFlipX(true); // 右向きは左右反転
                    this.astronautFacing = 'right';
                    // 左→右の切替時
                    if (prevFacing === 'left' && onGround) {
                        this.astronaut.anims.play('astronaut_turn_flip_LtoR');
                    }
                }

                // 初回の移動で通常ズームへ戻す（ハシゴ降り時のアップからゲームプレイ用ズームへ）
                if (isMoving && this.astronautHasMoved === false) {
                    this.astronautHasMoved = true;
                    this.tweens.add({
                        targets: this.cameras.main,
                        zoom: 2.7,
                        duration: 800,
                        ease: 'Sine.easeInOut'
                    });
                }

                // アニメーション制御（地上で動いているときだけ歩行、空中は開脚で固定）
                // 振り向きアニメ再生中は何も触らない
                const currentAnimKey = this.astronaut.anims.currentAnim ? this.astronaut.anims.currentAnim.key : null;
                const playingTurn = this.astronaut.anims.isPlaying && currentAnimKey &&
                    (currentAnimKey.startsWith('astronaut_turn_'));
                if (!this.playerClimbing && !playingTurn) {
                    if (!onGround) {
                        // ジャンプ中：アニメ停止、開脚ポーズ（L2）で固定
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'player_L2') this.astronaut.setTexture('player_L2');
                    } else if (isMoving) {
                        // 地上で移動中：歩行アニメ
                        if (!this.astronaut.anims.isPlaying || this.astronaut.anims.currentAnim.key !== 'astronaut_walk') {
                            this.astronaut.anims.play('astronaut_walk');
                        }
                    } else if (this.astronautHasMoved) {
                        // 一度動いた後の静止：横向きベースフレーム（0）
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'player_0') this.astronaut.setTexture('player_0');
                    } else {
                        // まだ動いていない状態：正面向き
                        if (this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                        if (this.astronaut.texture.key !== 'spaceman') this.astronaut.setTexture('spaceman');
                    }
                }
                if (this.astronautMinX !== undefined) {
                    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, this.astronautMinX, this.astronautMaxX);
                    // モノリス接触でビームゲージ満タン
                    const atMonolith = this.astronaut.x <= this.astronautMinX + 0.5
                        || this.astronaut.x >= this.astronautMaxX - 0.5;
                    if (atMonolith) {
                        this.beamEnergy = 100;
                    }
                }

                // 足音（移動中かつ接地時、ランダムで間隔再生）
                if (isMoving && onGround && this.time.now - this.lastFootstepTime > 320) {
                    const step = Phaser.Utils.Array.GetRandom(this.footstepSounds);
                    step.play();
                    this.lastFootstepTime = this.time.now;
                } else if (!isMoving) {
                    this.lastFootstepTime = 0; // 停止時リセットで次の歩き出しが即鳴る
                }

                // ビーム残量の自動回復（宇宙船 or 月面車の近くで急速充電）
                const underShip = this.spaceship && Math.abs(this.astronaut.x - this.spaceship.x) < 30;
                const nearCar = this.moonCar && Math.abs(this.astronaut.x - this.moonCar.x) < 60;
                const regenRate = (underShip || nearCar) ? 90 : 15;
                this.beamEnergy = Math.min(100, this.beamEnergy + regenRate * dt);

                // ビーム残量ゲージ更新（宇宙飛行士上部、色も残量に追従）
                const gx = this.astronaut.x;
                const gy = this.astronaut.y - 14;
                this.beamGaugeBg.setPosition(gx, gy);
                const gaugeRatio = Phaser.Math.Clamp(this.beamEnergy / 100, 0, 1);
                const fillW = 10 * gaugeRatio;
                this.beamGaugeFill.setPosition(gx - (10 - fillW) / 2, gy);
                this.beamGaugeFill.width = fillW;
                const gr = Math.round(0xff * (1 - gaugeRatio));
                const gg = Math.round(0xff * gaugeRatio);
                const gb = Math.round(0xcc * gaugeRatio);
                const normalColor = (gr << 16) | (gg << 8) | gb;
                // 長押し中はゲージが点滅（チャージ中表示）
                const charging = this.cursors.space.isDown && this.beamHoldStart && this.chargeAllowed;
                if (charging) {
                    const flashOn = (Math.floor(this.time.now / 80) % 2) === 0;
                    this.beamGaugeFill.fillColor = flashOn ? 0xffffff : normalColor;
                } else {
                    this.beamGaugeFill.fillColor = normalColor;
                }
                if (charging && !this.chargedFired && !this.beamTameSound.isPlaying) {
                    this.beamTameSound.play();
                } else if ((!charging || this.chargedFired) && this.beamTameSound.isPlaying) {
                    this.beamTameSound.stop();
                }

                // ビームチャージ中、銃口前方の半円状エリアに明滅粒がランダム出現
                // チャージ進行で最大半径が縮み、近くほど粒が密集する
                if (this.beamChargeEmitter) {
                    const chargeHoldMs = this.beamHoldStart ? this.time.now - this.beamHoldStart : 0;
                    const isChargingParticles = charging && !this.chargedFired && chargeHoldMs > 300;
                    if (isChargingParticles) {
                        const pdir = this.astronautFacing === 'left' ? -1 : 1;
                        const focusX = this.astronaut.x + pdir * 7;
                        const focusY = this.astronaut.y - 3;
                        this._chargeFocus.x = focusX;
                        this._chargeFocus.y = focusY;
                        this._chargeDir = pdir;
                        this._chargeProgress = Phaser.Math.Clamp((chargeHoldMs - 300) / 1200, 0, 1);
                        this.beamChargeEmitter.setPosition(focusX, focusY);
                        this.beamChargeEmitter.on = true;
                    } else {
                        this.beamChargeEmitter.on = false;
                    }
                }

                // スペース押下：チャージ計測開始（ここでは発射しない）
                if (!this.astronautGameOver && !this.playerClimbing && this.astronautFacing && Phaser.Input.Keyboard.JustDown(this.cursors.space)) {
                    this.beamHoldStart = this.time.now;
                    this.chargedFired = false;
                    // 押下時のエネルギーでチャージ可否をロック（回復による途中チャージ可能化を防ぐ）
                    this.chargeAllowed = this.beamEnergy >= 50;
                }
                // スペース離した瞬間：チャージが発火してなければ通常ビーム
                if (!this.astronautGameOver && !this.playerClimbing && Phaser.Input.Keyboard.JustUp(this.cursors.space)) {
                    if (this.astronautFacing && this.beamHoldStart && !this.chargedFired && this.beamEnergy >= 5) {
                        const ratio = Phaser.Math.Clamp(this.beamEnergy / 100, 0, 1);
                        const dir = this.astronautFacing === 'left' ? -1 : 1;
                        const startX = this.astronaut.x + dir * 6;
                        const startY = this.astronaut.y - 3;
                        const r = Math.round(0xff * (1 - ratio));
                        const g = Math.round(0xff * ratio);
                        const b = Math.round(0xcc * ratio);
                        const beamColor = (r << 16) | (g << 8) | b;
                        const beamLen = 6 + 14 * ratio;
                        const glowLen = 4 + 10 * ratio;
                        const beam = this.add.rectangle(startX, startY, beamLen, 1, beamColor);
                        beam.setDepth(9);
                        const glow = this.add.rectangle(startX, startY, glowLen, 1, 0xffffff);
                        glow.setDepth(10);
                        const power = ratio >= 0.67 ? 3 : ratio >= 0.34 ? 2 : 1;
                        this.lasers.push({ beam, glow, dir, speed: 500, born: this.time.now, life: 1200, power });
                        this.beamSound.play();
                        this.beamEnergy = Math.max(0, this.beamEnergy - 22);
                    }
                    this.beamHoldStart = null;
                }

                // 長押し1.5秒 + 押下時に既にエネルギー50以上 → チャージビーム（画面端まで貫通）
                if (!this.astronautGameOver && !this.playerClimbing && this.astronautFacing && this.cursors.space.isDown && this.beamHoldStart
                    && !this.chargedFired && this.time.now - this.beamHoldStart >= 1500 && this.chargeAllowed) {
                    this.chargedFired = true;
                    const dir = this.astronautFacing === 'left' ? -1 : 1;
                    const startX = this.astronaut.x + dir * 6;
                    const startY = this.astronaut.y - 3;
                    // 画面端までの距離
                    const camW = this.cameras.main.width / this.cameras.main.zoom;
                    const beamLen = camW;
                    const beam = this.add.rectangle(startX, startY, beamLen, 1, 0x00ffff);
                    beam.setOrigin(dir < 0 ? 1 : 0, 0.5);
                    beam.setDepth(9);
                    const glow = this.add.rectangle(startX, startY - 0.5, beamLen, 0.5, 0xffffff);
                    glow.setOrigin(dir < 0 ? 1 : 0, 0.5);
                    glow.setDepth(10);
                    this.lasers.push({ beam, glow, dir, speed: 0, born: this.time.now, life: 250, power: 6, charged: true, hitSet: new Set() });
                    this.beamSound.play();
                    this.beamEnergy = Math.max(0, this.beamEnergy - 50);

                    // ビーム経路にキラキラ残像（1pxドットが時差でチカチカ）
                    const sparkleCount = 50;
                    for (let i = 0; i < sparkleCount; i++) {
                        const t = i / sparkleCount;
                        const sx = startX + dir * beamLen * t + Phaser.Math.Between(-2, 2);
                        const sy = startY + Phaser.Math.Between(-3, 3);
                        const sparkle = this.add.rectangle(sx, sy, 1, 1, 0xffffff);
                        sparkle.setDepth(11);
                        sparkle.setAlpha(0);
                        this.tweens.add({
                            targets: sparkle,
                            alpha: 1,
                            duration: 60,
                            delay: Phaser.Math.Between(50, 500),
                            yoyo: true,
                            hold: Phaser.Math.Between(100, 400),
                            repeat: Phaser.Math.Between(0, 2),
                            onComplete: () => sparkle.destroy()
                        });
                    }
                }

                // レーザー更新＋標的との衝突判定
                if (this.lasers) {
                    this.lasers = this.lasers.filter(l => {
                        const dx = l.dir * l.speed * dt;
                        l.beam.x += dx;
                        l.glow.x += dx;
                        // 当たり判定（地底人）。チャージビームは小さい敵を貫通
                        let hit = false;
                        if (this.enemies && this.enemies.length) {
                            const beamBounds = l.beam.getBounds();
                            this.enemies = this.enemies.filter(e => {
                                const emergedEnough = !e.emerging || e.y <= this.groundFeetY + e.displayHeight * 2 / 3;
                                const canHit = emergedEnough && Phaser.Geom.Intersects.RectangleToRectangle(beamBounds, e.getBounds());
                                if (!canHit) return true;
                                // チャージビーム：各敵に1回だけダメージ（フレーム跨ぎで重複ヒット防止）
                                if (l.charged) {
                                    if (l.hitSet && l.hitSet.has(e)) return true;
                                } else if (hit) {
                                    return true; // 通常ビームは1体のみ
                                }
                                if (l.charged && l.hitSet) l.hitSet.add(e);
                                e.hp -= l.power;
                                this.beamHitSound.play();
                                hit = true;
                                if (e.hp <= 0) {
                                    const abSize = e.isBoss ? 90 : 45;
                                    const ab = this.add.sprite(e.x, e.y - 5, 'bloodAlien');
                                    ab.setDisplaySize(abSize, abSize);
                                    ab.setDepth(10);
                                    ab.play('bloodAlienSplat');
                                    if (e.shadow) e.shadow.destroy();
                                    e.destroy();
                                    this.enemyKills++;
                                    if (this.enemyKills % 5 === 0) this.bossesDue++;
                                    return false;
                                }
                                this.tweens.add({ targets: e, alpha: 0.3, duration: 80, yoyo: true });
                                return true;
                            });
                        }
                        // チャージビームは貫通するので寿命まで残す、通常は命中で消滅
                        const shouldDestroy = l.charged ? (this.time.now - l.born > l.life) : (hit || this.time.now - l.born > l.life);
                        if (shouldDestroy) {
                            l.beam.destroy();
                            l.glow.destroy();
                            return false;
                        }
                        return true;
                    });
                }

                // ジャンプ（押し始めで初速、離したら上昇を切って強弱をつける）
                if (Phaser.Input.Keyboard.JustDown(this.cursors.up) && onGround && !this.astronautGameOver) {
                    this.astronautVY = jumpPower;
                }
                if (Phaser.Input.Keyboard.JustUp(this.cursors.up) && this.astronautVY < 0) {
                    this.astronautVY *= 0.35;
                }

                // 重力＋位置更新（帰還時・捕獲後はtween任せで物理停止）
                if (!this.returningToShip && !this.astronautGameOver) {
                    this.astronautVY += gravity * dt;
                    this.astronaut.y += this.astronautVY * dt;

                    // 地面で止まる（着地した瞬間に足音）
                    if (this.astronaut.y >= this.astronautGroundY) {
                        this.astronaut.y = this.astronautGroundY;
                        if (!onGround) {
                            Phaser.Utils.Array.GetRandom(this.footstepSounds).play();
                            this.lastFootstepTime = this.time.now;
                        }
                        this.astronautVY = 0;
                    }
                }

                // 影は X方向のみ追従（Yは地面に固定済み）
                if (this.astronaut.shadow) this.astronaut.shadow.x = this.astronaut.x;

                // 地底人の移動＋宇宙飛行士との衝突
                if (this.enemies && this.enemies.length) {
                    const enemySpeed = 45;
                    // 接触判定用の縮小ボックス（透過余白を除外）
                    const shrink = (obj, px, py) => {
                        const b = obj.getBounds();
                        return new Phaser.Geom.Rectangle(b.x + px, b.y + py, b.width - px * 2, b.height - py * 2);
                    };
                    const astroBox = shrink(this.astronaut, 3, 2);
                    // 生存中（=未捕獲）のターゲット候補を集める
                    const liveTargets = [];
                    if (this.astronaut && this.astronaut.visible && !this.astronaut.captured) liveTargets.push(this.astronaut);
                    if (this.crews) this.crews.forEach(c => { if (c.visible && !c.captured) liveTargets.push(c); });

                    for (const e of this.enemies) {
                        // 半分以上出るまでは当たり判定なし
                        if (e.emerging && e.y > this.groundFeetY + e.displayHeight / 2) continue;
                        // 出現中・捕獲動作中は移動・方向転換しない
                        if (!e.emerging && !e.capturing) {
                            // 最寄りの未捕獲ターゲットを追う（捕まったキャラには寄って来ない）
                            let targetX = null;
                            let minDist = Infinity;
                            for (const t of liveTargets) {
                                const d = Math.abs(t.x - e.x);
                                if (d < minDist) { minDist = d; targetX = t.x; }
                            }
                            // 主人公が空中の間は方向転換しない（飛び越え後すぐ捕まるのを防止）。
                            // ただしゲームオーバー後は常に最寄り未捕獲を追う。
                            if ((onGround || this.astronautGameOver) && targetX !== null) {
                                const dx = targetX - e.x;
                                e.lastDir = dx === 0 ? (e.lastDir || 1) : Math.sign(dx);
                            }
                            const sign = e.lastDir || 1;
                            const sp = e.isBoss ? 28 : enemySpeed;
                            e.x += sign * sp * dt;
                            const prefix = e.isBoss ? 'boss_' : 'alien_';
                            e.setTexture(prefix + (sign < 0 ? 'L' : 'R'));
                        }
                        // 影をX方向に追従
                        if (e.shadow) e.shadow.x = e.x;
                        const enemyBox = e.isBoss ? shrink(e, 6, 5) : shrink(e, 2, 3);
                        // 仲間が捕まった場合もゲームオーバー（救出失敗）。ハシゴ登り中も対象
                        // 既に捕獲済みの仲間と、既に捕獲動作中の敵は対象外
                        const hitCrew = !e.capturing && this.crews && this.crews.length
                            ? this.crews.find(c => c.visible && !c.captured && Phaser.Geom.Intersects.RectangleToRectangle(shrink(c, 3, 2), enemyBox))
                            : null;
                        if (hitCrew) {
                            const isFirstCapture = !this.astronautGameOver;
                            hitCrew.captured = true;
                            e.capturing = true;
                            this.bloodSound.play(); // 各捕獲で鳴らす

                            if (isFirstCapture) {
                                this.astronautGameOver = true;
                                this.crewFollowing = false;
                                this.beamGaugeBg.setVisible(false);
                                this.beamGaugeFill.setVisible(false);
                                if (this.astronaut && this.astronaut.anims && this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                                // 進行中の人間tweenを全停止（捕獲された仲間のtweenは下で新規作成）
                                this.tweens.killTweensOf(this.astronaut);
                                this.crews.forEach(c => this.tweens.killTweensOf(c));
                                this.crews.forEach(c => { if (c.anims && c.anims.isPlaying) c.anims.stop(); });
                            }

                            // 空中の他の仲間を自然に地面へ落下（重力風のtween）
                            this.crews.forEach(c => {
                                if (c !== hitCrew && !c.captured && c.y < this.groundFeetY - 1) {
                                    const dur = Math.min(400, (this.groundFeetY - c.y) * 8);
                                    this.tweens.add({ targets: c, y: this.groundFeetY, duration: dur, ease: 'Quad.easeIn' });
                                }
                            });

                            // 着地後に捕獲アニメ開始（自然な着地）
                            const startCaptureAnim = () => {
                                const captureX = hitCrew.x;
                                const captureY = hitCrew.y - hitCrew.displayHeight / 2;
                                hitCrew.setDepth(9);
                                hitCrew.setMask(this.groundMask);
                                e.setDepth(10);
                                e.setMask(this.groundMask);

                                const cBubbles = [];
                                const cTotal = 60;
                                for (let i = 0; i < cTotal; i++) {
                                    this.time.delayedCall(i * 33, () => {
                                        if (!hitCrew.captured) return;
                                        const bx = captureX + Phaser.Math.Between(-7, 7);
                                        const by = captureY + Phaser.Math.Between(-8, 8);
                                        const r = Phaser.Math.FloatBetween(0.5, 2);
                                        const b = this.add.circle(bx, by, r, 0x33dd33, Phaser.Math.FloatBetween(0.5, 0.9));
                                        b.setDepth(11);
                                        b.setMask(this.groundMask);
                                        cBubbles.push(b);
                                        this.tweens.add({
                                            targets: b,
                                            x: b.x + Phaser.Math.Between(-2, 2),
                                            y: b.y + Phaser.Math.Between(-2, 2),
                                            scaleX: Phaser.Math.FloatBetween(0.7, 1.3),
                                            scaleY: Phaser.Math.FloatBetween(0.7, 1.3),
                                            duration: Phaser.Math.Between(250, 450),
                                            ease: 'Sine.easeInOut',
                                            yoyo: true,
                                            repeat: -1
                                        });
                                    });
                                }

                                // エイリアンを捕獲点に寄せる
                                this.tweens.add({
                                    targets: e,
                                    x: captureX,
                                    duration: 500,
                                    ease: 'Sine.easeOut'
                                });

                                this.time.delayedCall(cTotal * 33 + 300, () => {
                                    hitCrew.setVisible(false);
                                    const sinkY = this.groundFeetY + 50;
                                    this.tweens.add({
                                        targets: [...cBubbles, e],
                                        y: sinkY,
                                        duration: 1000,
                                        ease: 'Sine.easeIn',
                                        onComplete: () => {
                                            cBubbles.forEach(b => b.destroy());
                                            if (e.shadow) e.shadow.destroy();
                                            e.destroy();
                                            if (isFirstCapture) {
                                                this.add.text(captureX, captureY - 20, 'Rescue Failed', { fontSize: '20px', fill: '#FFF' }).setOrigin(0.5).setDepth(12);
                                                this.time.delayedCall(2500, () => { this.scene.restart(); });
                                            }
                                        }
                                    });
                                });
                            };

                            // 仲間が空中なら自然落下tween → 着地後に捕獲アニメ開始
                            if (hitCrew.y >= this.groundFeetY - 1) {
                                startCaptureAnim();
                            } else {
                                const dur = Math.min(400, (this.groundFeetY - hitCrew.y) * 8);
                                this.tweens.add({ targets: hitCrew, y: this.groundFeetY, duration: dur, ease: 'Quad.easeIn', onComplete: startCaptureAnim });
                            }
                            break; // このフレームで以降の処理は不要
                        }
                        if (!e.capturing && !this.astronaut.captured && this.astronaut.visible && Phaser.Geom.Intersects.RectangleToRectangle(astroBox, enemyBox)) {
                            const isFirstCapture = !this.astronautGameOver;
                            this.astronaut.captured = true;
                            e.capturing = true;
                            this.bloodSound.play(); // 各捕獲で鳴らす

                            if (isFirstCapture) {
                                this.astronautGameOver = true;
                                this.crewFollowing = false;
                                this.beamGaugeBg.setVisible(false);
                                this.beamGaugeFill.setVisible(false);
                                if (this.astronaut.anims && this.astronaut.anims.isPlaying) this.astronaut.anims.stop();
                                // 進行中の人間tweenを全停止（捕獲演出は下で新規作成）
                                this.tweens.killTweensOf(this.astronaut);
                                if (this.crews) {
                                    this.crews.forEach(c => this.tweens.killTweensOf(c));
                                    this.crews.forEach(c => { if (c.anims && c.anims.isPlaying) c.anims.stop(); });
                                }
                            }

                            // 空中の仲間を自然落下tweenで地面へ
                            if (this.crews) this.crews.forEach(c => {
                                if (!c.captured && c.y < this.groundFeetY - 1) {
                                    const dur = Math.min(400, (this.groundFeetY - c.y) * 8);
                                    this.tweens.add({ targets: c, y: this.groundFeetY, duration: dur, ease: 'Quad.easeIn' });
                                }
                            });

                            // 着地後に捕獲アニメ開始（プレイヤーは重力で自然落下）
                            const startCaptureAnim = () => {
                                const captureX = this.astronaut.x;
                                const captureY = this.astronaut.y;
                                this.astronaut.setDepth(10.5);
                                this.astronaut.setMask(this.groundMask);
                                e.setDepth(10);
                                e.setMask(this.groundMask);

                                const bubbles = [];
                                const totalBubbles = 60;
                                for (let i = 0; i < totalBubbles; i++) {
                                    this.time.delayedCall(i * 33, () => {
                                        if (!this.astronaut.captured) return;
                                        const bx = captureX + Phaser.Math.Between(-7, 7);
                                        const by = captureY + Phaser.Math.Between(-8, 8);
                                        const r = Phaser.Math.FloatBetween(0.5, 2);
                                        const b = this.add.circle(bx, by, r, 0x33dd33, Phaser.Math.FloatBetween(0.5, 0.9));
                                        b.setDepth(11);
                                        b.setMask(this.groundMask);
                                        bubbles.push(b);
                                        this.tweens.add({
                                            targets: b,
                                            x: b.x + Phaser.Math.Between(-2, 2),
                                            y: b.y + Phaser.Math.Between(-2, 2),
                                            scaleX: Phaser.Math.FloatBetween(0.7, 1.3),
                                            scaleY: Phaser.Math.FloatBetween(0.7, 1.3),
                                            duration: Phaser.Math.Between(250, 450),
                                            ease: 'Sine.easeInOut',
                                            yoyo: true,
                                            repeat: -1
                                        });
                                    });
                                }

                                // エイリアンを捕獲点に寄せる
                                this.tweens.add({
                                    targets: e,
                                    x: captureX,
                                    duration: 500,
                                    ease: 'Sine.easeOut'
                                });

                                // 泡が覆い尽くしたら地中へ
                                this.time.delayedCall(totalBubbles * 33 + 300, () => {
                                    const sinkY = this.groundFeetY + 50;
                                    this.tweens.add({
                                        targets: [...bubbles, e],
                                        y: sinkY,
                                        duration: 1000,
                                        ease: 'Sine.easeIn',
                                        onComplete: () => {
                                            bubbles.forEach(b => b.destroy());
                                            if (e.shadow) e.shadow.destroy();
                                            e.destroy();
                                            if (isFirstCapture) {
                                                this.add.text(captureX, captureY - 20, 'Mission Failed', { fontSize: '20px', fill: '#FFF' }).setOrigin(0.5).setDepth(12);
                                                this.time.delayedCall(2500, () => { this.scene.restart(); });
                                            }
                                        }
                                    });
                                    this.tweens.add({
                                        targets: this.astronaut,
                                        y: sinkY,
                                        duration: 1000,
                                        delay: 120,
                                        ease: 'Sine.easeIn'
                                    });
                                });
                            };

                            // プレイヤーが空中なら自然落下tween → 着地後に捕獲アニメ開始
                            if (this.astronaut.y >= this.astronautGroundY) {
                                startCaptureAnim();
                            } else {
                                this.astronautVY = 0; // gravity停止後に残ったVYをクリア
                                const dur = Math.min(400, (this.astronautGroundY - this.astronaut.y) * 8);
                                this.tweens.add({ targets: this.astronaut, y: this.astronautGroundY, duration: dur, ease: 'Quad.easeIn', onComplete: startCaptureAnim });
                            }
                        }
                    }
                }

                // 仲間：車に近づくと2人が車のドア（高さ30px）からぴょんと降りてくる
                if (this.moonCar && !this.crewFound && Math.abs(this.astronaut.x - this.moonCar.x) < 80) {
                    this.crewFound = true;
                    const exitDir = this.astronaut.x < this.moonCar.x ? -1 : 1;
                    const exitTex = exitDir > 0 ? 'crew_R' : 'crew_L';
                    const doorY = this.groundFeetY - 30;
                    const crewCount = 2 + playthroughCount; // 1週目2人、2週目3人、...
                    for (let i = 0; i < crewCount; i++) {
                        const c = this.add.image(this.moonCar.x, doorY, exitTex);
                        c.setDisplaySize(15, 15);
                        c.setOrigin(0.5, 1);
                        c.setDepth(7);
                        // 影は地面に固定（生成時はドア上、降下後は地面）
                        c.shadow = createGroundShadow(this, c.x, this.groundFeetY, 14);
                        this.crews.push(c);
                        this.time.delayedCall(i * 400, () => {
                            // ぴょんと降りる：横に出つつY方向はバウンドで着地
                            this.tweens.add({
                                targets: c,
                                x: this.moonCar.x + exitDir * (30 + i * 12),
                                duration: 600,
                                ease: 'Sine.easeOut'
                            });
                            this.tweens.add({
                                targets: c,
                                y: this.groundFeetY,
                                duration: 600,
                                ease: 'Bounce.easeOut'
                            });
                        });
                    }
                    this.time.delayedCall(400 + 600 + 200, () => {
                        this.crewFollowing = true;
                    });
                }

                // 仲間：P→C1→C2 と鎖状に追従（各自が前走者を追う＝自然な時差）
                // 仲間を連れて宇宙船に戻ったら、2人が先に乗り込み、プレイヤーは最後
                if (!this.returningToShip && this.crewFollowing && this.crews.length > 0
                    && this.spaceship && Math.abs(this.astronaut.x - this.spaceship.x) < 20) {
                    this.returningToShip = true;
                    this.crewFollowing = false;
                    const ladderX = this.spaceship.x - 5;
                    const ladderTop = this.spaceship.y + 20;
                    const ladderBottom = this.spaceship.y + 45;
                    const crews = this.crews.slice();
                    // 待機列の方向（アストロノート進行方向と反対側）
                    const queueDir = this.astronautFacing === 'right' ? -1 : 1;
                    const queueSpacing = 13;
                    const queueY = ladderBottom + this.astronaut.displayHeight / 2;
                    // 仲間を順にハシゴ下まで移動→登って船内へ
                    crews.forEach((c, idx) => {
                        this.time.delayedCall(idx * 900, () => {
                            if (this.astronautGameOver) return;
                            const face = ladderX < c.x ? 'L' : 'R';
                            c.setTexture('crew_' + face);
                            this.tweens.add({
                                targets: c,
                                x: ladderX,
                                y: queueY,
                                duration: 400,
                                ease: 'Sine.easeInOut',
                                onComplete: () => {
                                    c.setTexture('crew');
                                    this.tweens.add({
                                        targets: c,
                                        y: ladderTop - 5,
                                        duration: 1000,
                                        ease: 'Sine.easeInOut',
                                        onComplete: () => c.setVisible(false)
                                    });
                                }
                            });
                            // 後続の仲間は1つ前の待機スロットへシフト
                            for (let j = idx + 1; j < crews.length; j++) {
                                const t = crews[j];
                                const slot = j - idx; // 1,2,3...（ハシゴ直後の位置から）
                                const tx = ladderX + queueDir * queueSpacing * slot;
                                const faceJ = tx < t.x ? 'L' : 'R';
                                t.setTexture('crew_' + faceJ);
                                this.tweens.add({
                                    targets: t,
                                    x: tx,
                                    y: queueY,
                                    duration: 400,
                                    ease: 'Sine.easeInOut',
                                    onComplete: () => t.setTexture('crew')
                                });
                            }
                        });
                    });
                    // 2人が乗り込んだ後、プレイヤーがハシゴを登る
                    const playerStart = crews.length * 900 + 1400;
                    this.time.delayedCall(playerStart, () => {
                        // 捕獲されている場合は登らない（地中から復活してしまうバグ対策）
                        if (this.astronautGameOver) return;
                        this.playerClimbing = true;
                        this.beamGaugeBg.setVisible(false);
                        this.beamGaugeFill.setVisible(false);
                        this.beamHoldStart = null;
                        this.chargeAllowed = false;
                        if (this.beamTameSound.isPlaying) this.beamTameSound.stop();
                        this.astronaut.anims.stop();
                        this.astronaut.setFlipX(false);
                        // ハシゴまで歩いて移動（横向き歩行アニメ）
                        const face = ladderX < this.astronaut.x ? 'L' : 'R';
                        this.astronaut.setFlipX(face === 'R');
                        this.astronaut.anims.play('astronaut_walk');
                        this.tweens.add({
                            targets: this.astronaut,
                            x: ladderX,
                            duration: 400,
                            ease: 'Sine.easeInOut',
                            onComplete: () => {
                                this.astronaut.anims.stop();
                                this.astronaut.setFlipX(false);
                                // 振り向きアニメ：正面→(L or R)→後ろ、降りた時と同じ方向
                                this.astronaut.setTexture('spaceman');
                                const turnDir = this.astronautTurnDir || 'L';
                                this.astronaut.anims.play('astronaut_turn_to_back_' + turnDir);
                                // 振り向き完了後に登り開始
                                this.astronaut.once('animationcomplete-astronaut_turn_to_back_' + turnDir, () => {
                                    this.astronaut.setTexture('spaceman_B');
                                    this.tweens.add({
                                        targets: this.astronaut,
                                        y: ladderTop - 5,
                                        duration: 1000,
                                        ease: 'Sine.easeInOut',
                                        onComplete: () => {
                                        this.astronaut.setVisible(false);
                                        // 登り終えたら徐々にズームアウト（ポッド上昇中も続く）
                                        this.tweens.add({
                                            targets: this.cameras.main,
                                            zoom: 1.8,
                                            duration: 5000,
                                            ease: 'Sine.easeInOut'
                                        });
                                        // 発射前2秒：ハッチ開
                                        this.sound.play('hatchopen', { volume: 0.25 });
                                        // 2秒後：宇宙船上部からポッド打ち上げ
                                        this.time.delayedCall(2000, () => {
                                            // 脱出音：点火とジェットを同時再生
                                            this.sound.play('escape-injection', { volume: 0.8 });
                                            this.escapeJetSound = this.sound.add('escape-jet', { loop: true, volume: 0.6 });
                                            this.escapeJetSound.play();
                                            const podX = this.spaceship.x;
                                            const podY = this.spaceship.y - 10;
                                            const pod = this.add.image(podX, podY, 'pod');
                                            pod.setDisplaySize(24, 24);
                                            pod.setDepth(3); // 宇宙船(5)より下のレイヤーから出現

                                            // エイリアンたちは地中へ散り散りに退却
                                            this.enemiesRetreating = true;
                                            this.enemies.forEach(e => {
                                                e.setMask(this.groundMask);
                                                const rx = e.x + Phaser.Math.Between(-140, 140);
                                                this.tweens.add({
                                                    targets: e,
                                                    x: rx,
                                                    duration: Phaser.Math.Between(1400, 2200),
                                                    ease: 'Sine.easeInOut'
                                                });
                                                this.tweens.add({
                                                    targets: e,
                                                    y: e.y + e.displayHeight + 20,
                                                    delay: Phaser.Math.Between(200, 1000),
                                                    duration: Phaser.Math.Between(900, 1400),
                                                    ease: 'Sine.easeIn',
                                                    onComplete: () => e.destroy()
                                                });
                                            });
                                            this.enemies = [];

                                            // 発射マズル：着陸粉塵と同じ要領で左右へ舞い上がる煙
                                            const muzzle = this.add.particles('dustLarge');
                                            muzzle.setDepth(3); // 宇宙船(5)の背後
                                            const makeSide = (sx, angleRange) => muzzle.createEmitter({
                                                x: sx,
                                                y: podY + 2,
                                                speed: { min: 40, max: 160 },
                                                angle: angleRange,
                                                scale: { start: 0.25, end: 2.2 },
                                                alpha: { start: 0.7, end: 0 },
                                                tint: [0xffffff, 0xeeeeee, 0xdddddd],
                                                lifespan: { min: 700, max: 1400 },
                                                quantity: 1,
                                                on: false
                                            });
                                            const leftEm = makeSide(podX - 10, { min: 155, max: 205 });
                                            const rightEm = makeSide(podX + 10, { min: -25, max: 25 });
                                            leftEm.explode(26);
                                            rightEm.explode(26);
                                            // 炎のチラッとした赤味（少量）
                                            const flame = this.add.particles('jetParticle');
                                            flame.setDepth(3); // 宇宙船(5)の背後
                                            const flameL = flame.createEmitter({
                                                x: podX - 8, y: podY + 2,
                                                speed: { min: 80, max: 200 },
                                                angle: { min: 165, max: 195 },
                                                scale: { start: 0.5, end: 0 },
                                                alpha: { start: 0.9, end: 0 },
                                                tint: [0xff4422, 0xff8833, 0xffcc44],
                                                lifespan: { min: 200, max: 400 },
                                                on: false
                                            });
                                            const flameR = flame.createEmitter({
                                                x: podX + 8, y: podY + 2,
                                                speed: { min: 80, max: 200 },
                                                angle: { min: -15, max: 15 },
                                                scale: { start: 0.5, end: 0 },
                                                alpha: { start: 0.9, end: 0 },
                                                tint: [0xff4422, 0xff8833, 0xffcc44],
                                                lifespan: { min: 200, max: 400 },
                                                on: false
                                            });
                                            flameL.explode(10);
                                            flameR.explode(10);
                                            this.time.delayedCall(1800, () => { muzzle.destroy(); flame.destroy(); });

                                            // 下部の噴射ノズル炎（ポッドに追従し、上昇中は常時噴射）
                                            const nozzle = this.add.graphics();
                                            nozzle.setDepth(3); // 宇宙船(5)の背後
                                            const drawNozzle = () => {
                                                nozzle.clear();
                                                const nx = pod.x;
                                                const ny = pod.y + 12;
                                                const flick = Phaser.Math.FloatBetween(0.8, 1.2);
                                                // 外炎（オレンジ）
                                                nozzle.fillStyle(0xff8822, 0.9);
                                                nozzle.fillTriangle(nx - 5, ny, nx + 5, ny, nx, ny + 14 * flick);
                                                // 内炎（黄）
                                                nozzle.fillStyle(0xffee66, 0.95);
                                                nozzle.fillTriangle(nx - 3, ny, nx + 3, ny, nx, ny + 9 * flick);
                                                // 芯（白）
                                                nozzle.fillStyle(0xffffff, 1);
                                                nozzle.fillTriangle(nx - 1.5, ny, nx + 1.5, ny, nx, ny + 5 * flick);
                                            };
                                            const nozzleTimer = this.time.addEvent({
                                                delay: 30,
                                                loop: true,
                                                callback: drawNozzle
                                            });

                                            // カメラも上昇（ポッドより遅い。消えた後もスーッと余韻で減速）
                                            this.cameraRising = true;
                                            this.tweens.add({
                                                targets: this.cameras.main,
                                                scrollY: this.cameras.main.scrollY - 700,
                                                duration: 3000,
                                                ease: 'Cubic.easeIn',
                                                onComplete: () => {
                                                    this.tweens.add({
                                                        targets: this.cameras.main,
